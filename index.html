  _renderStudyCalendar(container) {
    if (!container) return;
    DB.getMeta('studyLog').then(logRaw => {
      const data = Utils.parseStudyLog(logRaw);
      const today = new Date(); today.setHours(0,0,0,0);
      const yr = today.getFullYear(), mo = today.getMonth();
      const daysInMonth = new Date(yr, mo+1, 0).getDate();
      const firstDay = new Date(yr, mo, 1).getDay();
      const colors = ['var(--surface2)','#c6e48b','#7bc96f','#239a3b','#196127'];
      const dayNames = ['日','一','二','三','四','五','六'];
      let html = `<div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500">${yr}年${mo+1}月</div>`;
      html += '<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;max-width:340px">';
      dayNames.forEach(d => { html += `<div style="font-size:9px;color:var(--text3);text-align:center;padding-bottom:2px">${d}</div>`; });
      for (let i=0;i<firstDay;i++) html += '<div></div>';
      for (let d=1;d<=daysInMonth;d++) {
        const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const mins = data[key] || 0;
        const isFuture = new Date(yr,mo,d) > today;
        const isToday = key === Utils.dateKeyLocal(today);
        const level = isFuture ? 0 : (mins>=60?4:mins>=30?3:mins>=15?2:mins>0?1:0);
        // 今日有学习记录时显示对应颜色，否则用 accent-light 标记今日
        const bg = level > 0 ? colors[level] : (isToday ? 'var(--accent-light)' : colors[0]);
        const border = isToday ? 'border:2px solid var(--accent);' : 'border:1px solid transparent;';
        const txt = level > 2 ? '#fff' : (isToday && level === 0 ? 'var(--accent)' : 'var(--text2)');
        html += `<div title="${key}: ${mins?mins+'分钟':'未学习'}" style="aspect-ratio:1;border-radius:6px;background:${bg};${border}display:flex;align-items:center;justify-content:center;font-size:13px;color:${txt};font-weight:600">${d}</div>`;
      }
      html += '</div>';
      html += '<div style="display:flex;gap:3px;align-items:center;margin-top:6px;font-size:10px;color:var(--text3)">';
      html += '<span>少</span>';
      colors.forEach(cl => { html += `<div style="width:10px;height:10px;border-radius:2px;background:${cl}"></div>`; });
      html += '<span>多</span></div>';
      if (container) container.innerHTML = html;
    });
  },

  renderAdminPanel(params) {
    const el = Pages.createPage('管理员面板');
    const content = document.createElement('div');
    content.className = 'page-content';
    content.style.paddingBottom = '20px';
    el.appendChild(content);

    function parseUA(ua) {
      if (!ua) return '未知设备';
      const res = [];
      if (/HarmonyOS/i.test(ua)) res.push('HarmonyOS ' + (ua.match(/HarmonyOS\s*([\d.]+)/i)?.[1] || ''));
      else if (/Android/i.test(ua)) res.push('Android ' + (ua.match(/Android\s*([\d.]+)/i)?.[1] || ''));
      else if (/iPhone|iPad|iPod/i.test(ua)) res.push('iOS ' + (ua.match(/OS\s*([\d_]+)/)?.[1]?.replace(/_/g,'.') || ''));
      else if (/Windows NT/i.test(ua)) {
        const v = {'10.0':'10/11','6.3':'8.1','6.2':'8','6.1':'7'};
        const nt = ua.match(/Windows NT\s*([\d.]+)/i)?.[1] || '';
        res.push('Windows ' + (v[nt] || nt));
      } else if (/Mac OS X/i.test(ua)) res.push('macOS');
      else if (/Linux/i.test(ua)) res.push('Linux');
      if (/wv\)/i.test(ua) || /WebView/i.test(ua)) {
        const cv = ua.match(/Chrome\/([\d]+)/)?.[1];
        res.push('WebView' + (cv ? '/'+cv : ''));
      } else if (/Chrome\/([\d]+)/i.test(ua)) res.push('Chrome/'+ua.match(/Chrome\/([\d]+)/)[1]);
      else if (/Firefox\/([\d]+)/i.test(ua)) res.push('Firefox/'+ua.match(/Firefox\/([\d]+)/)[1]);
      else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) res.push('Safari');
      return res.join(' · ') || ua.slice(0,80);
    }

    async function load() {
      content.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">
        <div class="spinner"></div><div style="margin-top:12px">验证权限中...</div></div>`;
      try {
        const user = await Pages._lbCurrentUser();
        if (!(await Pages._lbIsAdmin(user))) {
          content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger)">❌ 无管理员权限</div>';
          return;
        }

        // 尝试获取数据，自动降级到简单字段
        let submissions = [], leaderboard = [], profiles = [];
        const errors = [];

        // leaderboard：先尝试全字段，失败则用最小字段
        try {
          leaderboard = await Pages._lbFetch('/rest/v1/leaderboard?select=user_id,username,points,study_duration,total_questions,correct_questions,updated_at&order=points.desc&limit=200', {
            headers: { Prefer: 'count=none' }
          });
          if (!Array.isArray(leaderboard)) leaderboard = [];
        } catch(e) {
          try {
            leaderboard = await Pages._lbFetch('/rest/v1/leaderboard?select=user_id,username,points&order=points.desc&limit=200', {
              headers: { Prefer: 'count=none' }
            });
            if (!Array.isArray(leaderboard)) leaderboard = [];
          } catch(e2) { errors.push('排行榜: ' + e2.message); }
        }

        // submissions：尝试获取，失败降级
        try {
          submissions = await Pages._lbFetch('/rest/v1/submissions?select=id,user_id,username,total,correct,wrong,duration,avg_time,points,ip_address,user_agent,is_suspected,created_at&order=created_at.desc&limit=200', {
            headers: { Prefer: 'count=none' }
          });
          if (!Array.isArray(submissions)) submissions = [];
        } catch(e) {
          try {
            submissions = await Pages._lbFetch('/rest/v1/submissions?select=id,user_id,username,total,correct,wrong,duration,avg_time,points,created_at&order=created_at.desc&limit=200', {
              headers: { Prefer: 'count=none' }
            });
            if (!Array.isArray(submissions)) submissions = [];
          } catch(e2) { errors.push('提交记录: ' + e2.message); }
        }

        try {
          profiles = await Pages._lbFetch('/rest/v1/profiles?select=id,username,status,ban_reason,banned_until,banned_at&limit=500', {
            headers: { Prefer: 'count=none' }
          });
          if (!Array.isArray(profiles)) profiles = [];
        } catch(e) {
          try {
            profiles = await Pages._lbFetch('/rest/v1/profiles?select=id,username&limit=500', {
              headers: { Prefer: 'count=none' }
            });
            if (!Array.isArray(profiles)) profiles = [];
          } catch(_) { profiles = []; }
        }

        const latestSubByUser = {};
        submissions.forEach(s => {
          if (!latestSubByUser[s.user_id] || s.created_at > latestSubByUser[s.user_id].created_at)
            latestSubByUser[s.user_id] = s;
        });
        const profileMap = {};
        profiles.forEach(p => { profileMap[p.id] = p; });
        const suspected = submissions.filter(s => s.is_suspected);
        const uniqueUsers = new Set(submissions.map(s => s.user_id)).size;
        const bannedUsers = profiles
          .filter(p => p && (p.status === 'banned' || String(p.username || '').startsWith('__BANNED__')))
          .map(p => ({
            ...p,
            displayName: p.username || leaderboard.find(lb => lb.user_id === p.id)?.username || latestSubByUser[p.id]?.username || p.id
          }));
        const bannedIdSet = new Set(bannedUsers.map(p => p.id));

        content.innerHTML = `
          ${errors.length ? `<div class="card" style="padding:12px;margin-bottom:10px;background:var(--warn-light);border:1px solid var(--warn)">
            <div style="font-size:13px;font-weight:600;color:var(--warn);margin-bottom:4px">⚠️ 部分数据无法获取（RLS 权限不足）</div>
            <div style="font-size:11px;color:var(--text2);line-height:1.7">${errors.map(e=>Utils.esc(e)).join('<br>')}
            <br>请在 Supabase 控制台为相关表添加管理员 SELECT 策略：<br>

  async _adminViewUser(uid, username, btn) {
    try {
      // 获取该用户所有提交记录
      let subs = [];
      try {
        subs = await Pages._lbFetch(`/rest/v1/submissions?user_id=eq.${uid}&select=*&order=created_at.desc&limit=50`);
      } catch(e) {
        subs = await Pages._lbFetch(`/rest/v1/submissions?user_id=eq.${uid}&select=id,user_id,username,total,correct,wrong,duration,avg_time,points,ip_address,user_agent,is_suspected,created_at&order=created_at.desc&limit=50`);
      }
      if (!Array.isArray(subs)) subs = [];
      const totalDone = subs.reduce((sum, s) => sum + Number(s.total || 0), 0);
      const totalCorrect = subs.reduce((sum, s) => sum + Number(s.correct || 0), 0);
      const totalWrong = subs.reduce((sum, s) => sum + Number(s.wrong || 0), 0);
      const totalPoints = subs.reduce((sum, s) => sum + Number(s.points || 0), 0);
      function parseUA(ua) {
        if (!ua) return '—';
        const android = ua.match(/Android\s([\d.]+)/i);
        const chrome = ua.match(/Chrome\/([\d.]+)/);
        const wv = ua.match(/wv\)/) || ua.match(/WebView/i);
        const parts = [];
        if (android) parts.push(`Android ${android[1]}`);
        if (wv && chrome) parts.push(`WebView/${chrome[1]}`);
        else if (chrome) parts.push(`Chrome/${chrome[1]}`);
        return parts.join(' | ') || ua.slice(0, 80);
      }
      const ov = document.createElement('div');
      ov.className = 'modal-overlay';
      ov.innerHTML = `
        <div class="modal-sheet" style="max-height:80vh;overflow-y:auto">
          <div class="modal-handle"></div>
          <div class="modal-title" style="margin-bottom:12px">👤 ${Utils.esc(username)}</div>
          ${subs.length ? `<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;font-size:12px;color:var(--text2);line-height:1.8">
            做题次数: <b>${subs.length}</b> | 做题总数: <b>${totalDone}</b> | 答对: <span style="color:var(--success)">${totalCorrect}</span> | 答错: <span style="color:var(--danger)">${totalWrong}</span> | 积分: <b>${totalPoints}</b>
          </div>` : ''}
          ${subs.length ? '' : `<div style="padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;font-size:13px;color:var(--text3);text-align:center">暂无可显示的提交记录，可能是 RLS 策略或 submissions 表字段与当前页面不一致。</div>`}
          ${subs.map(s => `
            <div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;font-size:12px;color:var(--text2);line-height:1.8">
              <div style="display:flex;justify-content:space-between"><b>${s.is_suspected?'⚠️ 异常':'✅ 正常'}</b><span>${s.created_at ? new Date(s.created_at).toLocaleString('zh') : '-'}</span></div>
              总题: ${s.total||0} | 正确: ${s.correct||0} | 均时: ${Number(s.avg_time||0).toFixed(1)}s | 积分: ${s.points||0}<br>
              IP: ${Utils.esc(s.ip_address||'—')}<br>
              设备: <b>${Utils.esc(parseUA(s.user_agent))}</b><br>
              UA: <span style="font-size:10px;word-break:break-all;opacity:.7">${Utils.esc((s.user_agent||'—'))}</span>
            </div>`).join('')}
          <button class="btn btn-outline btn-block" onclick="Utils.closeModal(this.closest('.modal-overlay'))">关闭</button>
        </div>`;
      ov.onclick = e => { if(e.target===ov) Utils.closeModal(ov); };
      document.body.appendChild(ov);
    } catch(e) { Utils.toast('加载失败：' + e.message); }

  renderStudyCalendar(params) {
    const el = Pages.createPage('学习日历');
    const content = document.createElement('div');
    content.className = 'page-content';
    content.style.paddingBottom = '20px';
    content.style.display = 'flex';
    content.style.justifyContent = 'center';
    el.appendChild(content);

    let viewYear  = new Date().getFullYear();
    let viewMonth = new Date().getMonth(); // 0-based

    async function render() {
      const logRaw = await DB.getMeta('studyLog');
      const data   = Utils.parseStudyLog(logRaw);
      const today  = new Date(); today.setHours(0,0,0,0);
      const todayKey = Utils.dateKeyLocal(today);
      const colors = ['transparent','#c6e48b','#7bc96f','#239a3b','#196127'];
      const dayNames = ['日','一','二','三','四','五','六'];

      // ── 统计 ────────────────────────────────────────────
      const allKeys = Object.keys(data);
      const studyDays  = allKeys.filter(k => data[k] > 0);
      // 本周（周一到今天）
      const weekStart  = new Date(today);
      weekStart.setDate(today.getDate() - (today.getDay() || 7) + 1);
      const thisWeek   = studyDays.filter(k => {
        const d = Utils.parseDateKeyLocal(k);
        return d && d >= weekStart;
      }).length;
      // 本月
      const thisMonth  = studyDays.filter(k => k.startsWith(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`)).length;
      // 今年
      const thisYear   = studyDays.filter(k => k.startsWith(`${today.getFullYear()}`)).length;
      // 总计
      const totalDays  = studyDays.length;
      // 连续天数
      let streak = 0;
      const cur = new Date(today);
      while (true) {
        const k = Utils.dateKeyLocal(cur);
        if (!data[k]) break;
        streak++;
        cur.setDate(cur.getDate()-1);
      }

      // ── 月历 ───────────────────────────────────────────
      const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
      const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
      let calHtml = '<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;text-align:center;max-width:420px;margin:0 auto">';
      dayNames.forEach(d => { calHtml += `<div style="font-size:11px;color:var(--text3);padding-bottom:2px">${d}</div>`; });
      for (let i=0;i<firstDay;i++) calHtml += '<div></div>';

      // 错误码转中文
      function lbErrMsg(e) {
        const m = e.message || '';
        const status = e.status || 0;
        // HTTP 状态码优先判断
        if (status === 400) return '邮箱或密码错误';
        if (status === 401) return '登录已失效，请重新登录';
        if (status === 403) return m.includes('封禁') ? m : '无权限访问';
        if (status === 404) return '资源不存在';
        if (status === 422) return '邮箱已被注册，请直接登录';
        if (status === 429) return '操作太频繁，请稍后再试';
        if (status === 500) return '服务器异常，请稍后再试';
        if (status === 502 || status === 503) return '服务暂时不可用，请稍后再试';
        // 文本关键词匹配（无 status 时）
        if (/invalid.*login|invalid.*credentials|wrong.*password|email.*not.*confirm/i.test(m)) return '邮箱或密码错误';
        if (/email.*invalid|invalid.*email/i.test(m)) return '邮箱格式不正确';
        if (/password.*short|at least/i.test(m)) return '密码至少 6 位';
        if (/already.*registered|User already/i.test(m)) return '该邮箱已注册';
        if (/rate.*limit/i.test(m)) return '操作太频繁，请稍后再试';
        if (/network|fetch|Failed to fetch/i.test(m)) return '网络错误，请检查连接';
        if (/timeout|abort/i.test(m)) return '连接超时，请重试';
        return m.slice(0, 80) || '操作失败';

      content.querySelector('#lb-send-code-btn').onclick = async () => {
        const email = content.querySelector('#lb-reset-email').value.trim();

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { msg.textContent = '邮箱格式不正确'; msg.style.color = 'var(--danger)'; return; }
        msg.textContent = '发送中...'; msg.style.color = 'var(--text3)';
        try {
          let emailOk = true;
          try {
            const rows = await Pages._lbFetch(`/rest/v1/profiles?email=eq.${encodeURIComponent(email)}&select=id`);
            if (Array.isArray(rows) && rows.length === 0) emailOk = false;
          } catch(e) {

          }

          msg.style.color = 'var(--success)';
          startResetCooldown(60);
        } catch(e) {
          msg.textContent = lbErrMsg(e); msg.style.color = 'var(--danger)';
          updateResetCooldown();
        }
      };

      content.querySelector('#lb-reset-btn').onclick = async () => {
        const email = content.querySelector('#lb-reset-email').value.trim();
        const code = content.querySelector('#lb-reset-code').value.trim();
        const password = content.querySelector('#lb-reset-password').value;
        const password2 = content.querySelector('#lb-reset-password2').value;
        const msg = content.querySelector('#lb-auth-msg');
        if (!email || !code || !password || !password2) { msg.textContent = '请填写完整'; msg.style.color = 'var(--danger)'; return; }
        if (password.length < 6) { msg.textContent = '密码至少6位'; msg.style.color = 'var(--danger)'; return; }
        if (password !== password2) { msg.textContent = '两次输入的密码不一致'; msg.style.color = 'var(--danger)'; return; }
        const btn = content.querySelector('#lb-reset-btn');
        btn.disabled = true;
        msg.textContent = '验证中...'; msg.style.color = 'var(--text3)';
        try {
          const verifyRes = await Pages._lbFetch('/auth/v1/verify', {
            method: 'POST',
            body: JSON.stringify({ type: 'recovery', email, token: code })
          });
          const accessToken = verifyRes?.access_token;
          if (!accessToken) throw new Error('验证码无效或已过期');
          const resp = await fetch(LB_SUPABASE_URL + '/auth/v1/user', {
            method: 'PUT',
            headers: {
              apikey: LB_ANON_KEY,
              Authorization: `Bearer ${accessToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password })
          });
          if (!resp.ok) {
            let errMsg = `HTTP ${resp.status}`;
            try { const j = await resp.json(); errMsg = j?.message || j?.error_description || j?.error || errMsg; } catch(e) {}
            throw new Error(errMsg);
          }
          msg.textContent = '密码已重置，请返回登录'; msg.style.color = 'var(--success)';
          content.querySelector('#lb-reset-code').value = '';
          content.querySelector('#lb-reset-password').value = '';
          content.querySelector('#lb-reset-password2').value = '';
          setTimeout(() => {
            showLoginForm();
            content.querySelector('#lb-password')?.focus();
          }, 500);
        } catch(e) {
          msg.textContent = lbErrMsg(e); msg.style.color = 'var(--danger)';
        } finally {
          btn.disabled = false;
        }
      };

      // Register
      content.querySelector('#lb-reg-btn').onclick = async () => {
        const username = content.querySelector('#lb-reg-username').value.trim();
        const email = content.querySelector('#lb-reg-email').value.trim();
        const password = content.querySelector('#lb-reg-password').value;
        const password2 = content.querySelector('#lb-reg-password2').value;
        const msg = content.querySelector('#lb-auth-msg');
        if (!username || !email || !password || !password2) { msg.textContent = '请填写完整'; return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { msg.textContent = '邮箱格式不正确'; return; }
        if (password.length < 6) { msg.textContent = '密码至少6位'; return; }
        if (password !== password2) { msg.textContent = '两次输入的密码不一致'; msg.style.color = 'var(--danger)'; return; }
        msg.textContent = '注册中...'; msg.style.color = 'var(--text3)';
        const btn = content.querySelector('#lb-reg-btn');
        btn.disabled = true;
        try {
          try {
            const existing = await Pages._lbFetch(`/rest/v1/profiles?username=eq.${encodeURIComponent(username)}&select=id`);
            if (existing.length) { msg.textContent = '用户名已被占用'; msg.style.color = 'var(--danger)'; btn.disabled = false; return; }
          } catch(e) {
            if (!String(e.message || '').includes('42P01')) throw e;
          }
          const regRes = await Pages._lbFetch('/auth/v1/signup', {
            method: 'POST', body: JSON.stringify({ email: email.trim(), password, data: { username } })
          });
          if (regRes.access_token) {
            State.lbUser = regRes;
            await DB.setMeta('lbSession', JSON.stringify(regRes));
            const u = await Pages._lbCurrentUser();
            if (u) await Pages._lbEnsureProfile(u);
            try { await Pages._lbSync(true); } catch(e) {}
            // 立即更新"我的"界面
            const mineContentEl = document.getElementById('mine-content');
            if (mineContentEl) Pages._loadMineContent(mineContentEl, { syncRank: true }).catch(() => {});
            renderMain();
            return;
          }
          msg.textContent = '注册成功，请切换到登录页面登录';
          msg.style.color = 'var(--success)';
          btn.disabled = false;
        } catch(e) { msg.textContent = lbErrMsg(e); msg.style.color = 'var(--danger)'; btn.disabled = false; }
      };
    }

            const hrs = Math.floor(item.study_duration / 3600);
            const mins = Math.floor((item.study_duration % 3600) / 60);

          content.querySelector('#lb-loader').style.display = 'block';
        }
        isLoading = false;
      }

      // 滚动加载
      el.addEventListener('scroll', () => {
        if (el.scrollTop + el.clientHeight >= el.scrollHeight - 100) loadMore();
      });
      loadMore();
    }
  },

  async trySubmitScore() {
    if (!State.lbUser) return; // 未登录排行榜则跳过
    try {
      const totalAnswered = (await DB.getMeta('totalAnswered')) || 0;
      const totalRight    = (await DB.getMeta('totalRight'))    || 0;
      const totalWrong    = (await DB.getMeta('totalWrong'))    || 0;
      const studyMinutes  = (await DB.getMeta('studyMinutes'))  || 0;
      const points        = (await DB.getMeta('points'))        || 0;
      if (totalAnswered < 5) return; // 题目太少不上传

      const duration  = studyMinutes * 60;
      const avgTime   = totalAnswered > 0 ? duration / totalAnswered : 0;

      // 前端预检测
      let suspected = false;
      let suspectReason = '';
      if (avgTime === 0 && totalAnswered >= 5) {
        suspected = true; suspectReason = '答题用时为零';
      } else if (avgTime <= 1 && totalAnswered >= 10) {
        suspected = true; suspectReason = `平均答题时间仅 ${avgTime.toFixed(2)}s（≤1秒），疑似作弊`;
      } else if (totalAnswered >= 10 && duration < totalAnswered * 1.8) {
        suspected = true; suspectReason = '总用时过短';
      }
      if (suspected) {
        // 仍然上报到服务端以便管理员看到异常记录，但标记为 suspected
        try {
          await fetch(LB_FUNC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + State.lbUser.access_token },
            body: JSON.stringify({ total: totalAnswered, correct: totalRight, wrong: totalWrong, duration, avgTime, points, studyDuration: duration, forceFlag: suspectReason })
          });
        } catch(e) {}
        return;
      }

      // 查重：提交后由服务端对比，此处客户端做快速检测
      // 若数据库中已存在与本账户积分和时长完全相同的其他账户，疑似多账户
      try {
        const userR2 = await Pages._lbFetch('/auth/v1/user');
        const dupes = await Pages._lbFetch(
          `/rest/v1/leaderboard?points=eq.${points}&study_duration=eq.${duration}&user_id=neq.${userR2.id}&select=user_id`,
          { headers: { 'Range': '0-2', 'Range-Unit': 'items', 'Prefer': 'count=none' } }
        );
        if (Array.isArray(dupes) && dupes.length > 0) {
          // 仍上报但标记
          await fetch(LB_FUNC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + State.lbUser.access_token },
            body: JSON.stringify({ total: totalAnswered, correct: totalRight, wrong: totalWrong, duration, avgTime, points, studyDuration: duration, forceFlag: '积分与学习时长与其他账户完全一致（疑似多账户）' })
          });
          return;
        }
      } catch(e) { /* 查重失败静默，继续正常上报 */ }

      const res = await fetch(LB_FUNC_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + State.lbUser.access_token
        },
        body: JSON.stringify({
          total: totalAnswered, correct: totalRight, wrong: totalWrong,
          duration, avgTime, points, studyDuration: duration
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      // silent sync
    } catch(e) {
      console.warn('trySubmitScore failed:', e.message);
      // 静默失败，不影响做题体验
    }
  },

  async _lbSync(silent = true) {
    try {
      // 先调 Edge Function
      let syncOk = false;
      try {
        await Actions.trySubmitScore();
        syncOk = true;
      } catch(e) {}
      // 如果 Edge Function 不可用，直接写 leaderboard 表（无反作弊校验）
      if (!syncOk) {
        const pts = (await DB.getMeta('points')) || 0;
        const mins = (await DB.getMeta('studyMinutes')) || 0;
        if (pts > 0) {
          const userR = await Pages._lbFetch('/auth/v1/user');
          const prof = await Pages._lbGetProfile(userR.id);
          const uname = prof?.username || Pages._lbFallbackName(userR);
          // 先查是否已有记录，决定 POST 还是 PATCH
          const existing = await Pages._lbFetch(`/rest/v1/leaderboard?user_id=eq.${userR.id}&select=user_id`);
          const payload = { user_id: userR.id, username: uname, points: pts, study_duration: mins * 60, updated_at: new Date().toISOString() };
          if (existing && existing.length > 0) {
            await Pages._lbFetch(`/rest/v1/leaderboard?user_id=eq.${userR.id}`, {
              method: 'PATCH',
              headers: { 'Prefer': 'return=minimal' },
              body: JSON.stringify(payload)
            });
          } else {
            await Pages._lbFetch('/rest/v1/leaderboard', {
              method: 'POST',
              headers: { 'Prefer': 'return=minimal' },
              body: JSON.stringify(payload)
            });
          }
          syncOk = true;
        }
      }
      // Reload my rank after sync
      const userResp = await Pages._lbFetch('/auth/v1/user');
      const uid = userResp.id;
      const myLb = await Pages._lbFetch(`/rest/v1/leaderboard?user_id=eq.${uid}&select=points`);
      if (myLb && myLb.length) {
        const rankEl = document.getElementById('lb-my-rank');
        const ptsEl = document.getElementById('lb-my-pts');
        if (ptsEl) ptsEl.textContent = myLb[0].points + ' 分';
        const higher = await Pages._lbFetch(
          `/rest/v1/leaderboard?points=gt.${myLb[0].points}&select=user_id`,
          { headers: { 'Range': '0-0', 'Range-Unit': 'items', 'Prefer': 'count=none' } }
        );
        if (rankEl) rankEl.textContent = '#' + ((higher.length || 0) + 1);
      }
    } catch(e) {
      if (!silent) Utils.toast('同步失败：' + e.message);
    }
  },
