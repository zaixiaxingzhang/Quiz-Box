<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<!-- 强制阻止浏览器系统深色模式覆盖 -->
<meta name="color-scheme" content="only light">
<title>刷题Box</title>
<script>
  // 同步读取主题，避免首帧白屏/闪烁（在所有样式加载前执行）
  (function(){
    try {
      if (localStorage.getItem('quizapp_darkMode') === 'true') {
        document.documentElement.setAttribute('data-theme','dark');
        // color-scheme meta 可能还没解析到，用 getAttribute 安全设置
        var metas = document.getElementsByTagName('meta');
        for (var i=0;i<metas.length;i++){
          if (metas[i].getAttribute('name')==='color-scheme'){
            metas[i].setAttribute('content','only dark'); break;
          }
        }
      }
    } catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   CSS变量 & 主题
   ========================================================= */
:root {
  --bg: #F5F4F0;
  --bg2: #ECEAE4;
  --card: #FFFFFF;
  --card2: #F9F8F5;
  --surface2: #F1EFEB;
  --border: #E2DFD8;
  --text: #1A1814;
  --text2: #6B6860;
  --text3: #9E9B94;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --accent2: #0D9488;
  --accent2-light: #F0FDFB;
  --danger: #DC2626;
  --danger-light: #FEF2F2;
  --warn: #D97706;
  --warn-light: #FFFBEB;
  --success: #16A34A;
  --success-light: #F0FDF4;
  --appbar: #FFFFFF;
  --appbar-border: #E8E5DE;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow2: 0 4px 24px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius2: 10px;
  --radius3: 8px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #1C1C1E;
  --bg2: #2C2C2E;
  --card: #252528;
  --card2: #2C2C2E;
  --surface2: #343437;
  --border: #3A3A3C;
  --text: #F5F5F7;
  --text2: #AEAEB2;
  --text3: #636366;
  --accent: #818CF8;
  --accent-light: #1E1B4B;
  --accent2: #2DD4BF;
  --accent2-light: #042F2E;
  --danger: #F87171;
  --danger-light: #2D1515;
  --warn: #FBB928;
  --warn-light: #2D1F00;
  --success: #4ADE80;
  --success-light: #052E16;
  --appbar: #252528;
  --appbar-border: #3A3A3C;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow2: 0 4px 24px rgba(0,0,0,0.6);
}

/* =========================================================
   基础重置
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  font-size: 15px;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; outline: none; -webkit-tap-highlight-color: transparent; }
input, textarea, select { font-family: inherit; color: var(--text); background: transparent; border: none; outline: none; }

/* =========================================================
   页面栈容器
   ========================================================= */
#app {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  background: var(--bg);
}

/* =========================================================
   页面基础样式
   ========================================================= */
.page {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* will-change:transform 已移除：旧 WebView 下会创建新层叠上下文，
     导致 position:fixed 的弹窗相对 .page 定位而非视口，跑到左上角 */
  /* 默认不可见，由JS控制显示 */
}
/* 页面进入动画：从右滑入 */
.page.slide-in {
  animation: slideInRight var(--transition) forwards;
}
/* 页面离开动画：向右滑出 */
.page.slide-out {
  animation: slideOutRight var(--transition) forwards;
}
/* 上层页面退出时，下层页面恢复 */
.page.reveal-back {
  animation: revealBack var(--transition) forwards;
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}
@keyframes slideOutRight {
  from { transform: translateX(0); }
  to   { transform: translateX(100%); }
}
@keyframes revealBack {
  from { transform: translateX(-8%) scale(0.97); opacity: 0.85; }
  to   { transform: translateX(0) scale(1); opacity: 1; }
}
/* 当前页面被压入后台时的效果 */
.page.push-back {
  animation: pushBack var(--transition) forwards;
}
@keyframes pushBack {
  from { transform: translateX(0) scale(1); opacity: 1; }
  to   { transform: translateX(-8%) scale(0.97); opacity: 0.85; }
}

/* =========================================================
   AppBar
   ========================================================= */
.appbar {
  display: flex;
  align-items: center;
  height: 56px;
  padding: 0 4px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.appbar-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.appbar-btn:active { background: var(--bg2); }
.appbar-btn svg { width: 22px; height: 22px; }
.appbar-title {
  flex: 1;
  text-align: left;
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding: 0 4px;
}
.appbar-actions { display: flex; align-items: center; }

/* =========================================================
   搜索栏
   ========================================================= */
.search-bar {
  padding: 8px 14px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.search-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg2);
  border-radius: 10px;
  padding: 0 10px;
  gap: 8px;
}
.search-input-wrap svg { width: 16px; height: 16px; color: var(--text3); flex-shrink: 0; }
.search-input-wrap input {
  flex: 1; height: 36px;
  font-size: 14px;
  color: var(--text);
  background: transparent;
}
.search-input-wrap input::placeholder { color: var(--text3); }
.search-clear { color: var(--text3); padding: 4px; }

/* =========================================================
   滚动内容区
   ========================================================= */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 14px;
  background: var(--bg);
}
.page-content::-webkit-scrollbar { display: none; }

.bottom-nav {
  height: 56px;
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
  color: var(--text3); font-size: 11px; font-weight: 500;
  transition: color 0.2s; user-select: none; -webkit-tap-highlight-color: transparent;
}
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { transition: transform 0.15s; }
.bottom-nav-item.active svg { transform: scale(1.1); }


/* =========================================================
   顶部摘要栏
   ========================================================= */
.summary-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.summary-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.summary-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}
.summary-label {
  font-size: 11px;
  color: var(--text3);
}
.summary-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
}

/* =========================================================
   卡片
   ========================================================= */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  align-items: center;
  padding: 14px 16px 10px;
  gap: 8px;
}
.card-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.card-body { padding: 0 16px 14px; }
.card-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  transition: background 0.12s;
}
.card-row:first-child { border-top: none; }
.card-row:active { background: var(--bg2); }
.card-row-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-row-content { flex: 1; min-width: 0; }
.card-row-title { font-size: 15px; font-weight: 500; color: var(--text); }
.card-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.card-row-arrow { color: var(--text3); }
.card-row-arrow svg { width: 16px; height: 16px; }

/* =========================================================
   首页网格模块
   ========================================================= */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.home-tile {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 14px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 100px;
  position: relative;
  overflow: hidden;
}
.home-tile:active { transform: scale(0.97); box-shadow: var(--shadow2); }
.home-tile-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.home-tile-icon svg { width: 22px; height: 22px; }
.home-tile-title { font-size: 15px; font-weight: 600; color: var(--text); }
.home-tile-sub { font-size: 12px; color: var(--text3); margin-top: -4px; }
.home-tile-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: var(--danger);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  line-height: 1.4;
}

/* =========================================================
   标签/芯片
   ========================================================= */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  gap: 4px;
}
.tag-accent { background: var(--accent-light); color: var(--accent); }
.tag-success { background: var(--success-light); color: var(--success); }
.tag-danger { background: var(--danger-light); color: var(--danger); }
.tag-warn { background: var(--warn-light); color: var(--warn); }
.tag-neutral { background: var(--bg2); color: var(--text2); }

/* =========================================================
   按钮
   ========================================================= */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius2);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  border: none;
}
.btn:active { opacity: 0.8; transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-block { width: 100%; }
.btn svg { width: 18px; height: 18px; }

/* =========================================================
   浮动操作按钮
   ========================================================= */
.fab {
  position: fixed;
  right: 20px; bottom: 24px;
  width: 54px; height: 54px;
  border-radius: 16px;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  cursor: pointer;
  z-index: 100;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.93); }
.fab svg { width: 24px; height: 24px; }

/* =========================================================
   题目卡片（题库列表）
   ========================================================= */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 14px 10px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.q-card:active { background: var(--card2); }
.q-card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}
.q-card-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.q-card-text {
  flex: 1;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  word-break: break-all;
  /* 列表中截断 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.q-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
}
.q-card-stats { font-size: 11px; color: var(--text3); }
.star-btn {
  color: var(--text3);
  transition: color 0.15s, transform 0.15s;
  padding: 4px;
}
.star-btn.starred { color: #F59E0B; }
.star-btn svg { width: 18px; height: 18px; }

/* =========================================================
   做题页面
   ========================================================= */
.quiz-header {
  padding: 10px 14px 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.quiz-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.quiz-count { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.quiz-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 100px;
}
.quiz-body::-webkit-scrollbar { display: none; }
.quiz-type-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 12px;
  background: var(--accent-light);
  color: var(--accent);
}
.quiz-question {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 20px;
}
/* 单选/判断选项 */
.option-list { display: flex; flex-direction: column; }
.option-item + .option-item { margin-top: 10px; }
.option-item {
  display: flex;
  align-items: center;
  padding: 14px 14px;
  background: var(--card);
  border-radius: var(--radius2);
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, background 0.2s;
}
.option-item:active { background: var(--card2); }
.option-letter + * { margin-left: 12px; }
.option-item.selected { border-color: var(--accent); background: var(--accent-light); }
.option-item.correct { border-color: var(--success); background: var(--success-light); }
.option-item.wrong { border-color: var(--danger); background: var(--danger-light); }
.option-letter {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600;
  flex-shrink: 0;
  color: var(--text2);
  transition: background 0.2s, color 0.2s;
}
.option-item.selected .option-letter { background: var(--accent); color: #fff; }
.option-item.correct .option-letter { background: var(--success); color: #fff; }
.option-item.wrong .option-letter { background: var(--danger); color: #fff; }
.option-text { font-size: 15px; color: var(--text); line-height: 1.5; flex: 1; }
/* 填空题 */
.fill-input-wrap {
  background: var(--card);
  border-radius: var(--radius2);
  box-shadow: var(--shadow);
  padding: 14px;
  margin-bottom: 12px;
}
.fill-input {
  width: 100%;
  font-size: 16px;
  color: var(--text);
  background: transparent;
  border-bottom: 2px solid var(--border);
  padding-bottom: 8px;
  transition: border-color 0.2s;
}
.fill-input:focus { border-color: var(--accent); }
/* 解析区 */
.explanation-box {
  background: var(--card2);
  border-radius: var(--radius2);
  padding: 14px;
  margin-top: 16px;
  border-left: 3px solid var(--accent);
}
.explanation-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}
.explanation-text {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  overflow-wrap: break-word;
}
/* 底部操作栏 */
.quiz-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  padding-bottom: 10px;
  background: var(--appbar);
  border-top: 1px solid var(--appbar-border);
  display: flex;
  z-index: 10;
}
.quiz-footer .btn { flex: 1; }
.quiz-footer .btn + .btn { margin-left: 10px; }

/* =========================================================
   考试计时器
   ========================================================= */
.exam-timer {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--warn-light);
  border-radius: 8px;
  color: var(--warn);
  font-size: 14px;
  font-weight: 600;
}
.exam-timer svg { width: 16px; height: 16px; }

/* =========================================================
   统计页面
   ========================================================= */
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 14px; color: var(--text2); }
.stat-val { font-size: 15px; font-weight: 600; color: var(--text); }

/* =========================================================
   积分展示
   ========================================================= */
.points-badge {
  display: flex;
  align-items: center;
  gap: 4px;
}
.points-badge svg { width: 20px; height: 20px; flex-shrink: 0; }

/* =========================================================
   过滤/标签条
   ========================================================= */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 8px 14px;
  overflow-x: auto;
  background: var(--appbar);
  border-bottom: 1px solid var(--appbar-border);
  flex-shrink: 0;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  background: var(--bg2);
  color: var(--text2);
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.filter-chip.active {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
}

/* =========================================================
   模态框/弹出层
   ========================================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  padding: 0;
  animation: fadeIn 0.2s ease;
}
/* 仅在支持 backdrop-filter 的 WebView 上启用模糊，旧版自动降级为纯半透明 */
@supports (-webkit-backdrop-filter: blur(4px)) or (backdrop-filter: blur(4px)) {
  .modal-overlay {
    background: rgba(0,0,0,0.35);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
}
.modal-overlay { justify-content: center; }
.modal-overlay.center { align-items: center; padding: 20px; }
@keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.modal-sheet {
  width: 100%;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 18px;
  padding-bottom: 20px;
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height: 80vh;
  overflow-y: auto;
}
.modal-sheet::-webkit-scrollbar { display: none; }
.modal-dialog {
  width: 100%;
  background: var(--card);
  border-radius: 16px;
  padding: 20px 18px;
  animation: scaleIn 0.2s cubic-bezier(0.4,0,0.2,1);

/* ── Modal close animations ────────────────────────────────── */
@keyframes slideDown   { from { transform: translateY(0); }        to { transform: translateY(105%); } }
@keyframes scaleOut    { from { transform: scale(1); opacity: 1; } to { transform: scale(.92); opacity: 0; } }
@keyframes fadeOutBg   { from { opacity: 1; }                      to { opacity: 0; } }
.modal-overlay.closing               { animation: fadeOutBg .25s ease forwards; pointer-events: none; }
.modal-overlay.closing .modal-sheet  { animation: slideDown .25s cubic-bezier(.4,0,.2,1) forwards; }
.modal-overlay.closing .modal-dialog { animation: scaleOut  .2s  cubic-bezier(.4,0,.2,1) forwards; }

/* ── Table styles for AI / rendered content ─────────────────── */
.ai-msg table, .rendered-content table {
  border-collapse: collapse; width: 100%;
  font-size: 13px; margin: 8px 0; overflow: hidden; border-radius: 6px;
}
.ai-msg td, .ai-msg th,
.rendered-content td, .rendered-content th {
  border: 1px solid var(--border); padding: 6px 10px; text-align: left;
}
.ai-msg th, .rendered-content th {
  background: var(--surface2); font-weight: 600;
}
.ai-msg tr:nth-child(even), .rendered-content tr:nth-child(even) {
  background: var(--bg2);
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes scaleIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 16px;
}
.modal-handle {

  margin: 0 auto 16px;

.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;

.form-input:focus { border-color: var(--accent); outline: none; }
.form-textarea {
  min-height: 80px;
  resize: vertical;
}
select.form-input { appearance: none; }

   ========================================================= */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 14px;
  text-align: center;
}
.empty-state svg { color: var(--text3); }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 14px; color: var(--text3); }

/* =========================================================

   ========================================================= */
.batch-bar {
  display: flex;

  padding: 10px 14px;
  background: var(--accent);
  gap: 10px;
  flex-shrink: 0;

  color: #fff;
  font-size: 13px;
  font-weight: 500;
}

/* =========================================================
   多选 checkbox（批量模式）
   ========================================================= */
.checkbox-wrap {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.checkbox-wrap.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.checkbox-wrap.checked::after {
  content: '';
  width: 12px; height: 8px;
  border-bottom: 2.5px solid #fff;
  border-left: 2.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

/* =========================================================
   成绩/结果页
   ========================================================= */
.result-score {
  text-align: center;
  padding: 30px 20px 20px;

  width: 120px; height: 120px;

.result-sub { font-size: 14px; color: var(--text2); }

/* =========================================================
   Toast
   ========================================================= */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 9999;
  pointer-events: none;
  white-space: nowrap;
  animation: toastIn 0.2s ease, toastOut 0.3s ease 1.7s forwards;

@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* =========================================================
   数据存储模块 (IndexedDB + localStorage回退)
   ========================================================= */
const DB = (() => {
  const DB_NAME = 'QuizAppDB';
  const DB_VERSION = 3;
  let db = null;
  let useLS = false; // 是否回退到localStorage

  // IndexedDB初始化
  async function init() {
    return new Promise((resolve) => {
      try {
        if (!window.indexedDB) { useLS = true; resolve(); return; }
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('folders'))
            db.createObjectStore('folders', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('questions'))
            db.createObjectStore('questions', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('meta'))
            db.createObjectStore('meta', { keyPath: 'key' });
          if (!db.objectStoreNames.contains('images'))
            db.createObjectStore('images', { keyPath: 'name' });
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); };
        req.onerror   = () => { useLS = true; resolve(); };
        req.onblocked = () => { useLS = true; resolve(); }; // 防止版本升级时阻塞
      } catch(e) { useLS = true; resolve(); }
    });
  }

  // IndexedDB通用操作
  function idbGet(store, key) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(key);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  function idbGetAll(store) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => res(req.result);

  function idbPut(store, val) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).put(val);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  function idbDelete(store, key) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');

      req.onerror = () => rej(req.error);
    });
  }

      else { f.id = Date.now(); list.push(f); }
      lsSet('folders', list); return f.id;

    return idbPut('folders', f);

      lsSet('folders', lsGet('folders', []).filter(x => x.id !== id));

    await idbDelete('folders', id);

  }
  function closeConnection() { try { if (db) { db.close(); db = null; } } catch(e) {} }
  return { init, getFolders, saveFolder, deleteFolder, getQuestions, getAllQuestions, saveQuestion, deleteQuestion, getMeta, setMeta, saveImage, getImage, getAllImageNames, _closeConnection: closeConnection };

        lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;

        tx += (midX - lastMidX) + (midX - window.innerWidth/2) * (1 - dist/lastDist);
        ty += (midY - lastMidY) + (midY - window.innerHeight/2) * (1 - dist/lastDist);
        scale = newScale;

  // 从数组按权重随机抽取
  srsUpdate(q, grade) {
    const now = Date.now();
    let ef  = q.srsEase     != null ? q.srsEase     : 2.5;
    let ivl = q.srsInterval != null ? q.srsInterval : 0;
    let lvl = q.srsLevel    != null ? q.srsLevel    : 0;
    if (grade >= 3) {
      if (lvl === 0)      ivl = 1440;
      else if (lvl === 1) ivl = 5760;
      else                ivl = Math.round(ivl * ef);
      lvl++;
      ef = ef + 0.1 - (5 - grade) * (0.08 + (5 - grade) * 0.02);
      ef = Math.max(1.3, parseFloat(ef.toFixed(3)));
    } else {
      ivl = 10; lvl = 0;
      ef  = Math.max(1.3, parseFloat((ef - 0.2).toFixed(3)));
    }
    return {
      srsLevel: lvl, srsInterval: ivl, srsEase: ef,
      srsLastReview: now, srsNextReview: now + ivl * 60000,
      wrongCount: grade < 3 ? (q.wrongCount||0)+1 : (q.wrongCount||0),
      rightCount: grade >= 3 ? (q.rightCount||0)+1 : (q.rightCount||0),
    };
  },
  srsSample(items, n) {
    const now = Date.now();
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    const due    = shuffle(items.filter(x => x.srsNextReview && x.srsNextReview <= now));
    const fresh  = shuffle(items.filter(x => !x.srsNextReview));
    const notDue = items.filter(x => x.srsNextReview && x.srsNextReview > now)
                        .sort((a, b) => a.srsNextReview - b.srsNextReview);
    // 保证新题（fresh）始终有机会出现：
    // due 最多占 60% 名额，剩余 40% 优先给 fresh，再用 notDue 填满
    const total    = Math.min(n, items.length);
    const dueCap   = Math.min(due.length,   Math.ceil(total * 0.6));
    const freshCap = Math.min(fresh.length, total - dueCap);
    const picked   = [
      ...due.slice(0, dueCap),
      ...fresh.slice(0, freshCap),
    ];
    // 还没填满就继续加 notDue，再加剩余 due
    const rest = [
      ...notDue,
      ...due.slice(dueCap),
      ...fresh.slice(freshCap),
    ];
    const result = [...picked, ...rest].slice(0, total);
    // 最后整体随机洗牌，避免 due 永远排在前面
    return shuffle(result);
  },
  unseenSample(items, n) {
    const unseen = items.filter(x => !x.rightCount && !x.wrongCount).sort(() => Math.random()-0.5);
    const seen   = items.filter(x =>  x.rightCount ||  x.wrongCount).sort(() => Math.random()-0.5);
    return [...unseen, ...seen].slice(0, Math.min(n, items.length));
  },

    if (mode === 'unseen') return Utils.unseenSample(items, n);

  /* =========================================================
     填空题智能比对算法
     支持：顺序无关、标点/空格忽略、多答案数组、模糊容错
     ========================================================= */
  matchFill(userRaw, correctRaw, mode) {
    if (!userRaw || !correctRaw) return false;
    // mode: 'exact' 精准匹配，默认 'fuzzy' 关键词匹配

    // 支持多答案：correctRaw 可以是字符串或数组
    if (Array.isArray(correctRaw)) {
      return correctRaw.some(ans => Utils.matchFill(userRaw, ans, mode));
    }

    // 标准化：去首尾空白、全角转半角、转小写
    function normalize(s) {
      return s.trim()
        .toLowerCase()
        .replace(/[\uff01-\uff5e]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
        .replace(/\u3000/g, ' ');
    }

    const user    = normalize(userRaw);
    const correct = normalize(correctRaw);

    // ══ 精准模式：去首尾空格和全角后完全一致才算对 ══
    if (mode === 'exact') {
      return user === correct;
    }

    // ══ 关键词模式（原逻辑） ══

    // 去除所有标点、空格，只留汉字和字母数字
    function stripAll(s) {
      return s.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
    }
    // 按常见分隔符拆词
    function tokenize(s) {
      return s.split(/[,，、\/\\；;:\s]+/).map(t => t.trim()).filter(Boolean);
    }
    // 字符排序
    function sortChars(s) { return s.split('').sort().join(''); }
    // Levenshtein 编辑距离
    function editDist(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, (_, i) => [i]);
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
            : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      return dp[m][n];
    }

    const uStrip = stripAll(user);
    const cStrip = stripAll(correct);
    if (user === correct) return true;
    if (uStrip === cStrip) return true;
    if (uStrip.length === cStrip.length && sortChars(uStrip) === sortChars(cStrip)) return true;

    const uTokens = tokenize(uStrip.length ? uStrip : user);
    const cTokens = tokenize(cStrip.length ? cStrip : correct);
    if (uTokens.length > 0 && cTokens.length > 0) {
      const matched = new Set();
      let allMatched = true;
      for (const ct of cTokens) {
        let found = false;
        for (let i = 0; i < uTokens.length; i++) {
          if (matched.has(i)) continue;
          const ut = uTokens[i];
          const maxDist = ct.length <= 2 ? 0 : ct.length <= 4 ? 1 : 2;
          if (ut === ct || editDist(ut, ct) <= maxDist) { matched.add(i); found = true; break; }
        }
        if (!found) { allMatched = false; break; }
      }
      if (allMatched && matched.size === cTokens.length) return true;
      const uJoin = uTokens.join(''), cJoin = cTokens.join('');
      if (uJoin === cJoin) return true;
      if (sortChars(uJoin) === sortChars(cJoin)) return true;
    }
    const threshold = cStrip.length <= 3 ? 1 : cStrip.length <= 7 ? 2 : 3;
    if (editDist(uStrip, cStrip) <= threshold) return true;
    return false;
  },

  syncStatusBar(isDark) {
    // 更新 theme-color meta（浏览器环境）
    let meta = document.querySelector('meta[name="theme-color"]');
    if (!meta) {
      meta = document.createElement('meta');
      meta.name = 'theme-color';
      document.head.appendChild(meta);
    }
    meta.content = isDark ? '#1C1C1E' : '#FFFFFF';
    // 通知 Android：同时更新状态栏图标颜色 + 状态栏/导航栏背景色
    if (window.AndroidBridge) {
      try { window.AndroidBridge.setStatusBarDark(isDark); } catch(_) {}
      try { window.AndroidBridge.syncBarColors(isDark); } catch(_) {}
    }
  },
};

  async getLibStatus() {

  async loadLibs(onProgress) {
    const results = [];
    for (let i = 0; i < AI.LIBS.length; i++) {
      const lib = AI.LIBS[i];
      if (onProgress) onProgress(i, AI.LIBS.length, lib.name);
      const cached = await DB.getMeta('aiLib_' + lib.key).catch(() => null);
      if (cached) { results.push({ ...lib, ok: true, cached: true }); continue; }
      try {
        let text = null;
        for (const url of [lib.url, lib.fb]) {
          try {
            const r = await fetch(url);
            if (r.ok) { text = await r.text(); break; }
          } catch {}
        }
        if (!text) throw new Error('两个 CDN 均失败');
        await DB.setMeta('aiLib_' + lib.key, text);
        results.push({ ...lib, ok: true, cached: false });
      } catch(e) {
        results.push({ ...lib, ok: false, error: e.message });

  async getConfig() {
    const url   = await DB.getMeta('aiApiUrl')  || '';

  },
  isConfigured(cfg) {

  },
  buildPrompt(q) {
    // 用原始选项顺序，解析内容用选项文本不用字母，保证保存后仍正确
    let p = `题目：${q.question}\n`;

    if (q.type === '单选') {
      const opts = q.options || [];
      opts.forEach((o, i) => { p += `${String.fromCharCode(65+i)}. ${o}\n`; });
      const ansIdx = q.answer.charCodeAt(0) - 65;
      const ansText = opts[ansIdx] || q.answer;
      if (q.explanation) p += `参考解析：${q.explanation}\n`;
      p += `正确答案是「${ansText}」，请解释为什么选择该选项，并逐一说明其他每个选项错误的原因。不要用"选A/B/C/D"这样的字母表述，直接说选项内容。`;

    } else if (q.type === '多选') {
      const opts = q.options || [];
      opts.forEach((o, i) => { p += `${String.fromCharCode(65+i)}. ${o}\n`; });
      const ansLetters = Array.isArray(q.answer) ? q.answer : (q.answer||'').split('').filter(ch => /[A-Z]/.test(ch));
      const ansTexts = ansLetters.map(l => opts[l.charCodeAt(0)-65] || l).join('、');
      if (q.explanation) p += `参考解析：${q.explanation}\n`;
      p += `正确答案是「${ansTexts}」，请解释为什么选择这些选项，并逐一说明未选选项错误的原因。不要用"选A/B/C/D"这样的字母表述，直接说选项内容。`;

    } else if (q.type === '判断') {
      if (q.explanation) p += `参考解析：${q.explanation}\n`;
      p += `正确答案是「${q.answer}」，请解释这道判断题为什么是${q.answer}的。`;

    } else if (q.type === '填空') {
      const answerList = q.answers && q.answers.length > 1
        ? q.answers.join(' / ')
        : q.answer;
      if (q.explanation) p += `参考解析：${q.explanation}\n`;
      p += `正确答案是「${answerList}」，请解释这道填空题的答案，说明其含义和来源。`;
    }

    return p;
  },
  async ask(q, displayOpts) {
    const result = await AI.askStream(
      [
        { role: 'system', content: '你是刷题解析助手。解释答案时如需引导搜索，用 link("关键词") 格式。' },
        { role: 'user', content: AI.buildPrompt(q, displayOpts) }
      ],
      () => {},  // 忽略流式回调
      null
    );
    return result.full || result;
  },
  async askStream(messages, onChunk, onAbort) {
    const cfg = await AI.getConfig();
    if (!AI.isConfigured(cfg)) throw new Error('AI 未配置，请先在设置中开启并填写 API 信息');
    let url = cfg.url.trim();
    if (/\/v1\/?$/.test(url)) url = url.replace(/\/v1\/?$/, '/v1/chat/completions');
    const controller = new AbortController();
    if (onAbort) onAbort(controller); // 暴露 abort 控制器
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.key}` },
      body: JSON.stringify({ model: cfg.model, messages, stream: true }),
      signal: controller.signal
    });
    if (!resp.ok) { const t = await resp.text().catch(()=>''); throw new Error(`API ${resp.status}: ${t.slice(0,200)}`); }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let thinkBuf = '';
    let inThink = false;
    let thinkDone = false;
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === 'data: [DONE]') continue;
        if (trimmed.startsWith('data: ')) {
          try {
            const json = JSON.parse(trimmed.slice(6));
            // 处理思考内容（reasoning_content 字段，DeepSeek-R1 等）
            const thinkDelta = json?.choices?.[0]?.delta?.reasoning_content || '';
            const delta = json?.choices?.[0]?.delta?.content || '';
            if (thinkDelta) {
              thinkBuf += thinkDelta;
              if (!thinkDone) onChunk(full, thinkBuf, false); // 传递思考中状态
            }
            if (delta) {
              if (thinkBuf && !thinkDone) thinkDone = true; // 思考阶段结束
              full += delta;
              onChunk(full, thinkBuf, thinkDone || !thinkBuf);
            }
          } catch {}
        }
      }
    }
    return { full, think: thinkBuf };
  },
  // 统一渲染：Markdown + LaTeX + link("xx") → HTML
  renderFull(rawText) {
    if (!rawText) return '';

    // Step0: 解码 HTML 实体（用 textarea trick 完整解码所有实体，包括 &#39; &#x27; 等）
    try {
      const _ta = document.createElement('textarea');
      _ta.innerHTML = rawText;
      rawText = _ta.value;
    } catch(_) {
      rawText = rawText
        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&#x27;/g, "'")
        .replace(/&#(\d+);/g, (_,n) => String.fromCharCode(+n))
        .replace(/&#x([0-9a-f]+);/gi, (_,h) => String.fromCharCode(parseInt(h,16)));
    }

    // Step1: 提取 link("xx") 占位，防止被 Markdown 处理掉
    const linkPlaceholders = [];
    let text = rawText.replace(/link\(["']([^"')]+)["']\)/g, (_, kw) => {
      const idx = linkPlaceholders.length;
      linkPlaceholders.push(kw);
      return `«LINK${idx}»`;
    });

    // Step2: 提取 LaTeX 占位（防止被 marked 转义）
    const latexPlaceholders = [];
    const latexPatterns = [
      { re: /\$\$([\s\S]+?)\$\$/g,    display: true  },
      { re: /\\\[([\s\S]+?)\\\]/g,  display: true  },
      { re: /\$([^$\n]+?)\$/g,           display: false },
      { re: /\\\(([\s\S]+?)\\\)/g,  display: false },
    ];
    for (const { re, display } of latexPatterns) {
      text = text.replace(re, (_, expr) => {
        const idx = latexPlaceholders.length;
        latexPlaceholders.push({ expr: expr.trim(), display });
        return `␀LATEX${idx}␀`;
      });
    }

    // Step3: Markdown 渲染
    let html = text;
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true });
      html = marked.parse(text);
    } else {
      // 内置轻量 Markdown 降级：不需要任何库
      html = Utils.esc(text)
        // 代码块
        .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre style="background:var(--surface2);padding:10px;border-radius:8px;overflow-x:auto;margin:6px 0"><code>$1</code></pre>')
        // 行内代码
        .replace(/`([^`]+)`/g, '<code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
        // 表格（简单支持 | 分隔）
        .replace(/^\|(.+)\|\s*\n\|[-| :]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (_, header, rows) => {
          const ths = header.split('|').map(s => s.trim()).filter(Boolean).map(s => `<th style="border:1px solid var(--border);padding:4px 8px;background:var(--surface2)">${s}</th>`).join('');
          const trs = rows.trim().split('\n').map(row => {
            const tds = row.split('|').map(s => s.trim()).filter(Boolean).map(s => `<td style="border:1px solid var(--border);padding:4px 8px">${s}</td>`).join('');
            return `<tr>${tds}</tr>`;
          }).join('');
          return `<table style="border-collapse:collapse;font-size:13px;margin:8px 0;width:100%"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
        })
        // 标题
        .replace(/^### (.+)$/gm, '<h3 style="font-size:14px;font-weight:700;margin:10px 0 4px;color:var(--text)">$1</h3>')
        .replace(/^## (.+)$/gm,  '<h2 style="font-size:15px;font-weight:700;margin:10px 0 4px;color:var(--text)">$1</h2>')
        .replace(/^# (.+)$/gm,   '<h1 style="font-size:16px;font-weight:700;margin:10px 0 4px;color:var(--text)">$1</h1>')
        // 分割线
        .replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')
        // 粗体 / 斜体
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,         '<em>$1</em>')
        // 有序列表
        .replace(/((?:^\d+\. .+\n?)+)/gm, m => '<ol style="margin:4px 0 6px 18px">' + m.replace(/^\d+\. (.+)$/gm, '<li>$1</li>') + '</ol>')
        // 无序列表
        .replace(/((?:^[-*] .+\n?)+)/gm, m => '<ul style="margin:4px 0 6px 18px">' + m.replace(/^[-*] (.+)$/gm, '<li>$1</li>') + '</ul>')
        // 换行
        .replace(/\n/g, '<br>');
    }

    // Step4: 代码块语法高亮
    if (typeof hljs !== 'undefined') {
      html = html.replace(/<code(?:\s+class="language-(\w+)")?>([\s\S]*?)<\/code>/g, (_, lang, code) => {
        const decoded = code.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"');
        try {
          const result = lang
            ? hljs.highlight(decoded, { language: lang, ignoreIllegals: true }).value
            : hljs.highlightAuto(decoded).value;
          return `<code class="hljs${lang?' language-'+lang:''}">${result}</code>`;
        } catch { return _; }
      });
    }

    // Step5: 还原 LaTeX
    html = html.replace(/␀LATEX(\d+)␀/g, (_, i) => {
      const { expr, display } = latexPlaceholders[+i];
      try {
        return typeof katex !== 'undefined'
          ? katex.renderToString(expr, { displayMode: display, throwOnError: false })
          : (display ? `$$${expr}$$` : `$${expr}$`);
      } catch { return display ? `$$${expr}$$` : `$${expr}$`; }
    });

    // Step6: 还原 link()
    html = html.replace(/«LINK(\d+)»/g, (_, i) => {
      const kw = linkPlaceholders[+i];
      const linkUrl = 'https://www.baidu.com/s?wd=' + encodeURIComponent(kw);
      return '<span data-link-url="' + Utils.esc(linkUrl) + '" onclick="var u=this.dataset.linkUrl;if(window.AndroidBridge&&window.AndroidBridge.openUrl)window.AndroidBridge.openUrl(u);else window.open(u,\'_blank\')" style="color:var(--accent);text-decoration:underline;cursor:pointer">' + Utils.esc(kw) + '</span>';
    });

    return html;
  },
  renderText(rawText) {
    if (typeof rawText !== 'string') rawText = String(rawText ?? '');
    return AI.renderFull ? AI.renderFull(rawText) : Utils.esc(rawText).replace(/\n/g, '<br>');
  },
  // Build messages array, including image if present
  async buildMessages(q, displayOpts) {
    const textPrompt = AI.buildPrompt(q, displayOpts);
    const imgSrc = q.image ? Utils.getImageSrc(q.image) : null;
    const userContent = (imgSrc && imgSrc.startsWith('blob:'))
      ? [
          { type: 'text', text: textPrompt },
          { type: 'image_url', image_url: { url: await AI._blobToBase64(imgSrc) } }
        ]
      : textPrompt;
    return [
      { role: 'system', content: '你是刷题解析助手。当前界面已加载 Markdown、KaTeX（数学公式）、highlight.js（代码高亮）渲染库，请放心使用对应格式。数学公式用 $...$ 或 $$...$$，代码用 ```语言 包裹，引导搜索用 link("关键词") 格式。若题目附带图片请仔细观察图片内容再作答，切勿脱离图片凭答案猜测。若未收到图片则明确说明"未收到图片，无法分析图像内容"。' },
      { role: 'user', content: userContent }
    ];
  },
  async _blobToBase64(blobUrl) {
    try {
      const resp = await fetch(blobUrl);
      const blob = await resp.blob();
      return await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.onerror = rej;
        reader.readAsDataURL(blob);
      });
    } catch { return blobUrl; }
  },
  showModal(q, displayOpts) {
    AI.injectLibs().catch(() => {});
    // 历史记录挂在题目对象上，关窗再开继续接着聊（保留未完成回复）
    const isResume = !!(q._aiHistory && q._aiHistory.length > 2);
    // 首次创建 history（异步初始化，先设空壳）
    if (!q._aiHistory) {
      q._aiHistory = null; // 占位，稍后异步填充
    }

    const ov = document.createElement('div');
    ov.className = 'modal-overlay';
    ov.innerHTML = `
      <div class="modal-sheet" style="max-height:85vh;display:flex;flex-direction:column;gap:0">
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-shrink:0">
          <div class="modal-title" style="margin:0;flex:1">🤖 AI 解析</div>
          <span id="ai-think-badge" style="display:none;font-size:11px;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:10px;flex-shrink:0">💭 思考中...</span>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${Utils.esc(q.question.slice(0,50))}${q.question.length>50?'…':''}</div>
        <div id="ai-body" style="flex:1;overflow-y:scroll;font-size:14px;color:var(--text);line-height:1.8;padding-right:4px;min-height:60px;scrollbar-width:thin;scrollbar-color:var(--border) transparent"></div>
        <div style="flex-shrink:0;margin-top:10px">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <input id="ai-followup" class="form-input" placeholder="继续追问..." style="flex:1;padding:8px 10px;font-size:13px">
            <button id="ai-send" class="btn btn-primary" style="padding:8px 14px;font-size:13px">发送</button>
          </div>
          <button class="btn btn-outline btn-block" style="font-size:13px" id="ai-close-btn">关闭</button>
        </div>
      </div>`;
    ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
    document.body.appendChild(ov);
    ov.querySelector('#ai-close-btn').onclick = () => Utils.closeModal(ov);

    const aiBody = ov.querySelector('#ai-body');
    const followupInput = ov.querySelector('#ai-followup');
    const sendBtn = ov.querySelector('#ai-send');
    const thinkBadge = ov.querySelector('#ai-think-badge');

    function appendBubble(role, text, loading = false) {
      const isAI = role === 'assistant';
      const bubble = document.createElement('div');
      bubble.style.cssText = `margin-bottom:10px;${isAI ? '' : 'text-align:right'}`;
      bubble.innerHTML = `<div class="${isAI?'ai-msg':''}" style="${isAI?'display:block;width:100%':'display:inline-block;max-width:88%'};padding:8px 12px;border-radius:${isAI?'4px 12px 12px 12px':'12px 4px 12px 12px'};background:${isAI?'var(--surface2)':'var(--accent-light)'};color:var(--text);font-size:13px;line-height:1.7;text-align:left;${isAI?'':'white-space:pre-wrap'}">${loading ? '<span style="color:var(--text3)">⏳ 等待回复...</span>' : (isAI ? AI.renderText(text) : Utils.esc(text))}</div>`;
      aiBody.appendChild(bubble);
      aiBody.scrollTop = aiBody.scrollHeight;
      return bubble;
    }

    function isAtBottom() { return aiBody.scrollHeight - aiBody.scrollTop - aiBody.clientHeight < 40; }
    function scrollToBottom() { aiBody.scrollTop = aiBody.scrollHeight; }

    let currentAbortCtrl = null;

    async function sendMessage(userText) {
      sendBtn.disabled = true;
      followupInput.disabled = true;
      if (userText) {
        q._aiHistory.push({ role: 'user', content: userText });
        appendBubble('user', userText);
        scrollToBottom();
      }
      const loadBubble = appendBubble('assistant', '', true);
      scrollToBottom();
      const innerDiv = loadBubble.querySelector('div');
      // 显示思考标记（流开始前即显示）
      thinkBadge.style.display = '';
      try {
        const result = await AI.askStream(q._aiHistory, (partial, thinkText, thinkFinished) => {
          const atBottom = isAtBottom();
          // 思考状态更新
          if (!thinkFinished && thinkText) {
            thinkBadge.style.display = '';
            thinkBadge.textContent = '💭 思考中...';
          } else {
            thinkBadge.style.display = 'none';
          }
          if (partial) {
            innerDiv.innerHTML = AI.renderText(partial) + '<span style="display:inline-block;width:2px;height:13px;background:var(--accent);margin-left:2px;vertical-align:middle;animation:blink 0.7s step-end infinite"></span>';
          }
          if (atBottom) scrollToBottom();
        }, ctrl => { currentAbortCtrl = ctrl; });
        const reply = result?.full ?? result;
        q._aiHistory.push({ role: 'assistant', content: reply });
        thinkBadge.style.display = 'none';
        innerDiv.innerHTML = AI.renderText(reply);
        updateSaveBtn();
      } catch(e) {
        if (e.name === 'AbortError') {
          // 用户主动关闭，保留已有内容
          thinkBadge.style.display = 'none';
          if (!innerDiv.textContent.trim()) innerDiv.innerHTML = `<span style="color:var(--text3)">（已中断）</span>`;
        } else {
          thinkBadge.style.display = 'none';
          innerDiv.innerHTML = `<span style="color:var(--danger)">❌ ${Utils.esc(e.message)}</span>`;
        }
      } finally {
        currentAbortCtrl = null;
        sendBtn.disabled = false;
        followupInput.disabled = false;
        followupInput.value = '';
      }
    }

    sendBtn.onclick = () => { const txt = followupInput.value.trim(); if (txt) sendMessage(txt); };
    followupInput.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } };

    // 关闭时中止流（保留已生成内容进 history）
    ov.addEventListener('click', () => {
      if (currentAbortCtrl) { try { currentAbortCtrl.abort(); } catch(_) {} }
    }, { capture: true, once: false });

    const saveBar = (() => {
      const bar = document.createElement('div');
      bar.className = 'ai-save-bar';
      bar.style.cssText = 'display:none;margin-bottom:6px';
      bar.innerHTML = `<button id="ai-save-explanation" class="btn btn-block" style="background:var(--success-light);color:var(--success);border:1px solid var(--success);font-size:13px">📝 将AI回复保存为题目解析</button>`;
      ov.querySelector('.modal-sheet > div:last-child').prepend(bar);
      return bar;
    })();

    function updateSaveBtn() {
      const aiMsgs = (q._aiHistory||[]).filter(m => m.role === 'assistant');
      if (!aiMsgs.length) { saveBar.style.display = 'none'; return; }
      saveBar.style.display = '';
      const btn = saveBar.querySelector('#ai-save-explanation');
      btn.onclick = () => {
        if (aiMsgs.length === 1) { doSaveFlow(aiMsgs[0].content); return; }
        const pickerOv = document.createElement('div');
        pickerOv.className = 'modal-overlay center';
        pickerOv.innerHTML = `<div class="modal-dialog" style="max-width:340px;max-height:70vh;display:flex;flex-direction:column">
          <div class="modal-title" style="margin-bottom:8px">选择要保存的 AI 回复</div>
          <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
            ${aiMsgs.map((m,i) => `<div data-idx="${i}" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;background:var(--surface2)">
              <div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:4px">第 ${i+1} 次回复</div>
              <div style="overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${Utils.esc(m.content.slice(0,120))}${m.content.length>120?'…':''}</div>
            </div>`).join('')}
          </div>
          <button class="btn btn-outline btn-block" onclick="Utils.closeModal(this.closest('.modal-overlay'))">取消</button>
        </div>`;
        pickerOv.onclick = e => { if (e.target === pickerOv) Utils.closeModal(pickerOv); };
        document.body.appendChild(pickerOv);
        pickerOv.querySelectorAll('[data-idx]').forEach(card => {
          card.addEventListener('click', () => { Utils.closeModal(pickerOv); doSaveFlow(aiMsgs[+card.dataset.idx].content); });
        });
      };
    }

    async function doSaveFlow(text) {
      if (q.explanation && q.explanation.trim()) {
        const choiceOv = document.createElement('div');
        choiceOv.className = 'modal-overlay center';
        choiceOv.innerHTML = `<div class="modal-dialog" style="max-width:300px">
          <div class="modal-title" style="margin-bottom:8px">已有解析</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:16px">是否覆盖现有解析，还是追加到末尾？</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline flex-1" id="cs-cancel">取消</button>
            <button class="btn btn-outline flex-1" id="cs-append" style="color:var(--accent);border-color:var(--accent)">追加</button>
            <button class="btn btn-primary flex-1" id="cs-overwrite">覆盖</button>
          </div></div>`;
        choiceOv.querySelector('#cs-cancel').onclick = () => Utils.closeModal(choiceOv);
        choiceOv.querySelector('#cs-overwrite').onclick = async () => { Utils.closeModal(choiceOv); await saveExplanation(q, text); };
        choiceOv.querySelector('#cs-append').onclick = async () => { Utils.closeModal(choiceOv); await saveExplanation(q, q.explanation + '\n\n【AI补充】\n' + text); };
        choiceOv.onclick = e => { if (e.target === choiceOv) Utils.closeModal(choiceOv); };
        document.body.appendChild(choiceOv);
      } else { await saveExplanation(q, text); }
    }

    async function saveExplanation(q, text) {
      const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
      freshQ.explanation = text; q.explanation = text;
      await DB.saveQuestion(freshQ);
      document.querySelectorAll('.explanation-text.rendered-content').forEach(el => { el.innerHTML = AI.renderFull(text); });
      document.querySelectorAll('.explanation-box').forEach(box => { box.style.display = ''; const rc = box.querySelector('.explanation-text'); if (rc) rc.innerHTML = AI.renderFull(text); });
      Utils.toast('✅ 已保存为题目解析');
      if (typeof window._currentRenderQ === 'function') window._currentRenderQ();
    }

    // 启动
    (async () => {
      if (isResume && q._aiHistory) {
        (q._aiHistory).forEach(msg => {
          if (msg.role === 'user' && msg !== q._aiHistory[1]) appendBubble('user', msg.content);
          if (msg.role === 'assistant') appendBubble('assistant', msg.content);
        });
        updateSaveBtn();
      } else {
        // 首次：构建含图片的 messages
        const initMsgs = await AI.buildMessages(q, displayOpts);
        q._aiHistory = initMsgs;
        sendMessage(null);
      }
    })();
  }
};

const Nav = {
  // 推入新页面（push-back 与 slide-in 同步进行）
  switchTab(tab) {
    State.activeTab = tab;
    const slider = document.getElementById('tab-slider');
    if (!slider) return;
    if (tab === 'mine') {
      slider.style.transform = 'translateX(-50%)';
      document.getElementById('nav-home')?.classList.remove('active');
      document.getElementById('nav-mine')?.classList.add('active');
      const mineContentEl = document.getElementById('mine-content');
      if (mineContentEl) {
        // 只有内容为空时才完整渲染，避免重新渲染导致滚动位置跳动
        if (!mineContentEl.children.length) {
          Pages._loadMineContent(mineContentEl, { syncRank: true }).catch(() => {});
        } else {
          // 静默后台同步排名，不重建DOM
          Pages._syncMineRank(mineContentEl).catch(() => {});
        }
      }
    } else {
      slider.style.transform = 'translateX(0)';
      document.getElementById('nav-mine')?.classList.remove('active');
      document.getElementById('nav-home')?.classList.add('active');
    }
  },
  push(type, params = {}) {
    const app = document.getElementById('app');
    const topEl = app.querySelector('.page:last-child');

    // 先渲染新页面并加入 DOM（但还在屏幕右侧）
    State.pageStack.push({ type, params });
    const el = Pages.render(type, params);
    el.style.transform = 'translateX(100%)';
    app.appendChild(el);

    // 下一帧同时触发两个动画，保证完全同步
    // 每次 push 追加一条历史，保证每一层都能用系统返回键退回
    history.pushState({ depth: State.pageStack.length }, '', location.href);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // 旧页面：推向左后方
        if (topEl) {
          topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
          topEl.style.transform = 'translateX(-8%) scale(0.97)';
          topEl.style.opacity = '0.85';
          topEl.addEventListener('transitionend', () => {
            topEl.style.transition = '';
          }, { once: true });
        }
        // 新页面：从右滑入
        el.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        el.style.transform = 'translateX(0)';
        el.addEventListener('transitionend', () => {
          el.style.transition = '';
        }, { once: true });
      });
    });

    State.batchMode = false;
    State.batchSelected.clear();
  },
  // 原生层调用：判断是否可以返回
  canPop() {
    // 有开着的弹窗也算"可返回"（优先关弹窗）
    const openModals = Array.from(document.querySelectorAll('.modal-overlay'))
      .filter(m => m.isConnected && !m.classList.contains('closing'));
    if (openModals.length > 0) return true;
    const app = document.getElementById('app');
    return app ? app.querySelectorAll('.page').length > 1 : false;
  },
  // 弹出当前页面（返回上层）
  pop() {
    // 有弹窗先关弹窗
    const openModals = Array.from(document.querySelectorAll('.modal-overlay'))
      .filter(m => m.isConnected && !m.classList.contains('closing'));
    if (openModals.length > 0) {
      Utils.closeModal(openModals[openModals.length - 1]);
      return;
    }
    const app = document.getElementById('app');
    const pages = app.querySelectorAll('.page');
    // 做题页触发退出确认
    const top = pages[pages.length - 1];
    if (top && top._isQuizPage) { top._quit(); return; }

    // 如果只剩一页（即将回到首页），恢复底部导航
    if (pages.length === 0) return;  // 已在首页，不做任何事
    State.pageStack.pop();
    const topEl = pages[pages.length - 1];
    const belowEl = pages[pages.length - 2];

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // 顶层页面滑出到右侧
        topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        topEl.style.transform = 'translateX(100%)';
        topEl.addEventListener('transitionend', () => topEl.remove(), { once: true });
        // 下层页面同步从左后方恢复
        if (belowEl) {
          belowEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
          belowEl.style.transform = 'translateX(0) scale(1)';
          belowEl.style.opacity = '1';
          belowEl.addEventListener('transitionend', () => {
            belowEl.style.transition = '';
          }, { once: true });
        }
      });
    });

    State.batchMode = false;
    State.batchSelected.clear();
    // 返回时刷新上一页（如果有 _refreshFn）和首页摘要
    setTimeout(async () => {
      await Nav.refreshCurrent();
      Nav.refreshHome();
      // 不再重建 mine DOM，只做轻量积分刷新，保留滚动位置
      if (State.pageStack.length === 0) {
        Nav.refreshMine().catch(()=>{});
      }
    }, 350);
  },
  // 返回首页（清除所有子页面）
  home() {
    const app = document.getElementById('app');
    const pages = app.querySelectorAll('.page');
    if (pages.length <= 1) return;
    const topEl = pages[pages.length - 1];
    const base = pages[0];

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // 顶层页面滑出
        topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
        topEl.style.transform = 'translateX(100%)';
        // 底层首页同步恢复
        if (base && base !== topEl) {
          base.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
          base.style.transform = 'translateX(0) scale(1)';
          base.style.opacity = '1';
          base.addEventListener('transitionend', () => { base.style.transition = ''; }, { once: true });
        }
        topEl.addEventListener('transitionend', () => {
          // 移除中间所有页面
          const allPages = app.querySelectorAll('.page');
          for (let i = allPages.length - 1; i >= 1; i--) allPages[i].remove();
          State.pageStack = [];
          State.batchMode = false;
          State.batchSelected.clear();
          Nav.refreshHome();
        }, { once: true });
      });
    });
  },
  // 刷新首页摘要（包括错题徽章）
  async refreshHome() {
    // 优先从 home-root 找（主页在 wrapper 中，非 .page 元素）
    const homeRoot = document.getElementById('home-root');
    const pages = document.getElementById('app')?.querySelectorAll('.page');
    const home = homeRoot || pages?.[0];
    if (!home) return;
    const summary = home.querySelector('.summary-bar');
    if (summary) {
      const d = await Pages.getHomeSummary();
      summary.innerHTML = Pages.renderSummaryHTML(d);
      // 同步更新首页错题徽章
      const wrongTile = [...home.querySelectorAll('.home-tile')].find(t => t.querySelector('.home-tile-title')?.textContent.trim() === '错题');
      if (wrongTile) {
        const badge = wrongTile.querySelector('.home-tile-badge');
        if (d.wrong > 0) {
          if (badge) badge.textContent = d.wrong;
          else {
            const b = document.createElement('span');
            b.className = 'home-tile-badge';
            b.textContent = d.wrong;
            wrongTile.appendChild(b);
          }
        } else if (badge) badge.remove();
      }
    }
  },
  // 刷新当前顶部页面内容（做题后刷新列表）
  async refreshMine() {
    // 只更新积分数字，不重建 DOM，避免做题中「我的」页面抖动
    const ptsEl = document.getElementById('mine-pts-num');
    if (ptsEl) {
      const pts = (await DB.getMeta('points')) || 0;
      ptsEl.textContent = pts;
    }
    // 同时更新首页 summary bar 积分
    const summaryPts = document.querySelector('.points-badge span');
    if (summaryPts) {
      const pts = State.points || (await DB.getMeta('points')) || 0;
      summaryPts.textContent = pts;
    }
  },
  async refreshCurrent() {
    const app = document.getElementById('app');
    const pages = app.querySelectorAll('.page');
    const topEl = pages[pages.length - 1];
    if (!topEl || !topEl._refreshFn) return;
    await topEl._refreshFn();
  }
};

const Pages = {
  // 创建页面骨架（含AppBar）
  createPage(title, extraButtons = '') {
    const el = document.createElement('div');
    el.className = 'page';
    el.innerHTML = `
      <div class="appbar">
        <button class="appbar-btn" id="appbar-back" onclick="Nav.pop()">
          ${Icons.back}
        </button>
        <span class="appbar-title">${Utils.esc(title)}</span>
        <div class="appbar-actions">
          ${extraButtons}
          <button class="appbar-btn" onclick="Actions.importJSON()" title="导入">${Icons.import}</button>
          <button class="appbar-btn" onclick="Actions.exportJSON()" title="导出">${Icons.export}</button>
          <button class="appbar-btn" id="theme-btn" onclick="Actions.toggleTheme()" title="切换主题">
            ${State.darkMode ? Icons.sun : Icons.moon}
          </button>
        </div>
      </div>
    `;
    return el;
  },
  _folderPalette(index = 0) {
    const light = ['#EEF2FF','#F0FDF4','#FFF7ED','#FDF2F8','#F0FDFA','#FEF9C3','#F1F5F9'];
    const dark = ['#1E1B4B','#052E16','#431407','#3B0764','#042F2E','#422006','#1E293B'];
    return {
      light: light[index % light.length],
      dark: dark[index % dark.length]
    };
  },
  _getFolderStyle(folder, folders = []) {
    const idx = Math.max(0, folders.findIndex(x => x.id === folder?.id));
    const fallback = Pages._folderPalette(idx);
    return {
      bgLight: folder?.color || fallback.light,
      bgDark: folder?.colorDark || fallback.dark,
      icon: folder?.icon || ''   // 空字符串 = 纯色块，无图标
    };
  },
  _renderFolderIcon(folder, folders = [], size = 40, fontSize = 18) {
    const style = Pages._getFolderStyle(folder, folders);
    // 自定义图标支持 SVG 和 单字符emoji/汉字，空字符串则只显示颜色块
    const isSvg = typeof style.icon === 'string' && style.icon.trimStart().startsWith('<svg');
    let innerHtml = '';
    if (isSvg) innerHtml = style.icon;
    else if (style.icon) innerHtml = `<span style="font-size:${fontSize}px;font-weight:700;line-height:1">${style.icon}</span>`;
    return `<div class="card-row-icon" style="background:${style.bgLight};width:${size}px;height:${size}px;min-width:${size}px;border-radius:10px;display:flex;align-items:center;justify-content:center" data-dark-bg="${style.bgDark}">${innerHtml}</div>`;
  },
  _getStudyLog(raw) {
    return Utils.parseStudyLog(raw);
  },
  // 统一掌握判定函数（全局复用）
  _isMastered(q) {
    const r = q.rightCount || 0;
    const w = q.wrongCount || 0;
    const lv = q.srsLevel || 0;
    if (r === 0) return false;            // 从未答对
    if (w === 0) return true;             // 只答对过，从未错
    return lv >= 2;                       // 有过错题，但之后连续答对2次已恢复
  },
  _calcSrsBuckets(allQs) {
    const total = allQs.length;
    const masteredList = allQs.filter(q => Pages._isMastered(q));
    const learningList = allQs.filter(q =>
      !Pages._isMastered(q) &&
      ((q.rightCount || 0) > 0 || (q.wrongCount || 0) > 0)
    );
    const mastered = masteredList.length;
    const learning = learningList.length;
    const unseen = Math.max(0, total - mastered - learning);
    return { total, mastered, learning, unseen, masteredList, learningList };
  },
  async _lbFetch(path, opts = {}) {
    if (!LB_SUPABASE_URL || !LB_ANON_KEY) throw new Error('Leaderboard is not configured');
    const doFetch = async (token) => {
      const skipBearer = /^\/auth\/v1\/(signup|token|otp|verify|recover)/.test(path);
      const headers = {
        apikey: LB_ANON_KEY,
        'Content-Type': 'application/json',
        ...(token && !skipBearer ? { Authorization: `Bearer ${token}` } : {}),
        ...(opts.headers || {})
      };
      const res = await fetch(LB_SUPABASE_URL + path, { ...opts, headers });
      return res;
    };

    let res = await doFetch(State.lbUser?.access_token);

    // access_token 过期（401） → 尝试用 refresh_token 换新 token
    if (res.status === 401 && State.lbUser?.refresh_token) {
      try {
        const refreshRes = await fetch(LB_SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
          method: 'POST',
          headers: { apikey: LB_ANON_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: State.lbUser.refresh_token })
        });
        if (refreshRes.ok) {
          const newSession = await refreshRes.json();
          if (newSession.access_token) {
            // 合并新 token 到 State 并持久化
            State.lbUser = { ...State.lbUser, ...newSession };
            await DB.setMeta('lbSession', JSON.stringify(State.lbUser));
            // 用新 token 重试原请求
            res = await doFetch(State.lbUser.access_token);
          }
        }
      } catch(e) { /* refresh 失败则走正常错误流程 */ }
    }

    if (!res.ok) {
      // 只在 401（认证彻底失效，refresh 也失败了）时清除 session
      // 403 = 权限不足（RLS），不代表 token 无效，不清 session
      if (res.status === 401) {
        State.lbUser = null;
        await DB.setMeta('lbSession', null).catch(()=>{});
        try {
          const mineContentEl = document.getElementById('mine-content');
          if (mineContentEl) Pages._loadMineContent(mineContentEl, { syncRank: false }).catch(() => {});
        } catch(e) {}
      }
      let msg = `HTTP ${res.status}`;
      try {
        const j = await res.json();
        msg = j?.message || j?.error_description || j?.error || msg;
      } catch(e) {}
      const err = new Error(msg);
      err.status = res.status;
      throw err;
    }
    if (res.status === 204) return [];
    const txt = await res.text();
    if (!txt) return [];
    try { return JSON.parse(txt); } catch(e) { return txt; }
  },
  async _lbCurrentUser() {
    try { return await Pages._lbFetch('/auth/v1/user'); }
    catch(e) { return null; }
  },
  async _lbGetProfile(uid) {
    if (!uid) return null;
    try {
      let rows;
      try {
        rows = await Pages._lbFetch(`/rest/v1/profiles?id=eq.${uid}&select=id,username,is_admin,status,ban_reason,banned_until,banned_at`);
      } catch(e) {
        if (e.status !== 400) throw e;
        rows = await Pages._lbFetch(`/rest/v1/profiles?id=eq.${uid}&select=id,username,is_admin`);
      }
      const profile = rows?.[0] ? {
        status: 'active',
        ban_reason: null,
        banned_until: null,
        banned_at: null,
        ...rows[0]
      } : null;
      if (!profile) return null;
      if (profile.status === 'banned' && profile.banned_until && !String(profile.banned_until).startsWith('9999-')) {
        const untilTs = new Date(profile.banned_until).getTime();
        if (Number.isFinite(untilTs) && untilTs <= Date.now()) {
          const patch = { status: 'active', ban_reason: null, banned_until: null, banned_at: null };
          if (String(profile.username || '').startsWith('__BANNED__')) patch.username = `User_${uid.slice(0, 6)}`;
          await Pages._lbFetch(`/rest/v1/profiles?id=eq.${uid}`, {
            method: 'PATCH',
            body: JSON.stringify(patch)
          }).catch(() => {});
          return { ...profile, ...patch };
        }
      }
      return profile;
    } catch(e) {
      if (String(e.message || '').includes('42P01')) return null;
      throw e;
    }
  },
  _lbFallbackName(user) {
    if (!user) return 'User';
    if (user.user_metadata?.username) return user.user_metadata.username;
    const email = user.email || '';
    return email.includes('@') ? email.split('@')[0] : (email || 'User');
  },
  async _lbEnsureProfile(user) {
    if (!user?.id) return null;
    let profile = await Pages._lbGetProfile(user.id);
    if (profile) return profile;
    const payload = {
      id: user.id,
      username: Pages._lbFallbackName(user),
      is_admin: false
    };
    if (user?.email) payload.email = user.email;
    try {
      await Pages._lbFetch('/rest/v1/profiles', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(payload)
      });
      profile = await Pages._lbGetProfile(user.id);
      return profile || payload;
    } catch(e) {
      if (payload.email && e?.status === 400 && /email|column/i.test(String(e.message || ''))) {
        const payload2 = { ...payload };
        delete payload2.email;
        try {
          await Pages._lbFetch('/rest/v1/profiles', {
            method: 'POST',
            headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
            body: JSON.stringify(payload2)
          });
          profile = await Pages._lbGetProfile(user.id);
          return profile || payload2;
        } catch(_) {}
      }
      if (String(e.message || '').includes('42P01')) return payload;
      return profile || payload;
    }
  },
  async _lbIsAdmin(user) {
    const profile = await Pages._lbGetProfile(user?.id);
    return !!profile?.is_admin;
  },

    const wrong = qs.filter(q => (q.wrongCount||0) > 0 && !Pages._isMastered(q)).length;
    return { total: qs.length, wrong, points };

  async _syncMineRank(el) {
    if (!State.lbUser) return;
    try {
      // 只查排名，不触发积分同步（避免频繁写入）
      const userResp = await Pages._lbFetch('/auth/v1/user');
      const uid = userResp.id;
      // 缓存 profile
      const prof = await Pages._lbGetProfile(uid).catch(() => null);
      if (prof) await DB.setMeta('lbProfileCache', JSON.stringify(prof)).catch(()=>{});
      // 查排名
      const myLb = await Pages._lbFetch(`/rest/v1/leaderboard?user_id=eq.${uid}&select=points`);
      if (myLb && myLb.length) {
        const pts = myLb[0].points;
        const higher = await Pages._lbFetch(
          `/rest/v1/leaderboard?points=gt.${pts}&select=user_id`,
          { headers: { 'Range': '0-0', 'Range-Unit': 'items', 'Prefer': 'count=none' } }
        );
        const rank = (higher.length || 0) + 1;
        await DB.setMeta('lbRankCache', JSON.stringify({ rank, points: pts, ts: Date.now() })).catch(()=>{});
        const rankEl = el?.querySelector('#mine-rank-num');
        const ptsEl  = el?.querySelector('#mine-pts-num');
        if (rankEl) rankEl.textContent = '#' + rank;
        if (ptsEl)  ptsEl.textContent  = pts;
        if (prof?.username) {
          const avatarEl = el?.querySelector('#mine-avatar');
          const unameEl  = el?.querySelector('#mine-username');
          if (avatarEl) avatarEl.textContent = prof.username[0].toUpperCase();
          if (unameEl)  unameEl.textContent  = prof.username;
        }
      }
    } catch(e) {
      // 403 = RLS不允许，不是认证失败，静默忽略
      if (e.status !== 403) console.warn('mine rank sync:', e.message);
    }
  },

    const ov = document.createElement('div');
    ov.className = 'modal-overlay center';
    ov.innerHTML = `

        <div class="modal-title" style="margin-bottom:12px">修改用户名</div>
        <input class="form-input" id="new-username-input" placeholder="新用户名" value="${Utils.esc(currentName)}" style="margin-bottom:6px">
