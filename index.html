  async _doZipImportFile(file) {
    if (!window.JSZip) {
      Utils.toast('正在加载解压库...');
      await new Promise((res,rej) => { const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    }
    try {
      Utils.toast('解压中...');
      const zip = await JSZip.loadAsync(file);
      const allPaths = Object.keys(zip.files);
      const topNames = [...new Set(allPaths.map(p => p.split('/')[0]))];
      let prefix = '';
      if (topNames.length === 1 && zip.files[topNames[0] + '/']) prefix = topNames[0] + '/';
      const jsonEntry = zip.file(prefix + 'data.json');
      if (!jsonEntry) { Utils.toast('未找到 data.json'); return; }
      const data = JSON.parse(await jsonEntry.async('text'));
      if (!State.imageCache) State.imageCache = new Map();
      let imgCount = 0;
      const imgPfx = prefix + 'images/';
      for (const [path, entry] of Object.entries(zip.files)) {
        if (!entry.dir && path.startsWith(imgPfx)) {
          const imgName = path.slice(imgPfx.length);
          if (!imgName) continue;
          const blob = await entry.async('blob');
          await DB.saveImage(imgName, blob);
          State.imageCache.set(imgName, URL.createObjectURL(blob));
          imgCount++;
        }
      }
      const {count, skipped} = await Actions._processJsonImport(data);
      Utils.toast('✅ 导入 ' + count + ' 道题，' + imgCount + ' 张图片');
    } catch(err) { Utils.toast('导入失败：' + err.message); console.error(err); }
  },

  async _processJsonImport(data) {
    const existingQs = await DB.getAllQuestions();
    const existingMap = {};
    existingQs.forEach(q => {
      const k = (q.question||'').trim()+'||'+String(q.answer||'').trim();
      if (!existingMap[k]) existingMap[k] = q;
    });
    const existingKeys = new Set(Object.keys(existingMap));
    let count = 0, skipped = 0, merged = 0;
    async function importQ(folder, q) {
      const key = (q.question||'').trim()+'||'+String(q.answer||'').trim();
      if (existingKeys.has(key)) {
        const ex = existingQs.find(x => (x.question||'').trim()+'||'+String(x.answer||'').trim() === key);
        if (ex && (q.wrongCount||q.rightCount||q.srsLevel||q.starred||q.note)) {
          ['wrongCount','rightCount','srsLevel','srsInterval','srsEase','srsNextReview','srsLastReview','weight','note'].forEach(k => { if(q[k]) ex[k]=q[k]; });
          if (q.starred) ex.starred = true;
          await DB.saveQuestion(ex);
        }
        skipped++; return;
      }
      existingKeys.add(key);
      await DB.saveQuestion({ folderId:folder.id, type:q.type||'填空', question:q.question||'', options:q.options||null,
        answer:String(q.answer||''), answers:q.answers||(q.answer?[String(q.answer)]:[]),
        explanation:q.explanation||'', note:q.note||'', image:q.image||null,
        wrongCount:q.wrongCount||0, rightCount:q.rightCount||0, srsLevel:q.srsLevel||0,
        srsInterval:q.srsInterval||0, srsEase:q.srsEase||2.5,
        srsNextReview:q.srsNextReview||null, srsLastReview:q.srsLastReview||null,
        weight:q.weight||1, starred:q.starred||false, createdAt:Date.now() });
      count++;
    }
    const allFolders = await DB.getFolders();
    if (data.folders) {
      for (const f of data.folders) {
        let folder = allFolders.find(x => x.name===f.name);
        if (!folder) { const id=await DB.saveFolder({name:f.name,createdAt:Date.now()}); folder={id,name:f.name}; }
        for (const q of (f.questions||[])) await importQ(folder, q);
      }
    } else if (data.questions) {
      let folder = allFolders[0];
      if (!folder) { const id=await DB.saveFolder({name:'导入题库',createdAt:Date.now()}); folder={id}; }
      for (const q of data.questions) await importQ(folder, q);
    }
    const replaceStats = await Actions._askImportStats(data.globalStats);
    await Actions._applyImportStats(data.globalStats, replaceStats);
    const msg = skipped > 0
      ? '✅ 导入 '+count+' 道，跳过 '+skipped+' 道重复题'+(replaceStats?'，学习记录已替换':'')
      : '✅ 成功导入 '+count+' 道题目'+(replaceStats?'，学习记录已替换':'');
    Utils.toast(msg);
    await Nav.refreshHome();
    return {count, skipped};
  },

  async _doLocalImport() {
    // 每次创建新 input，避免复用旧元素导致二次触发
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.onchange = async (e) => {
      const file = e.target.files[0];
      document.body.removeChild(input);
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        let count = 0, skipped = 0;

        // 构建已有题目的去重 key（题目文本+答案）
        const existingQs = await DB.getAllQuestions();
        const existingKeys = new Set(existingQs.map(q => q.question.trim() + '||' + String(q.answer).trim()));

        async function importQuestion(folder, q) {
          const key = (q.question||'').trim() + '||' + String(q.answer||'').trim();
          if (existingKeys.has(key)) {
            // 已有同题：只更新学习记录字段，不重复添加
            const existing = existingQs.find(x => x.question.trim() + '||' + String(x.answer).trim() === key);
            if (existing && (q.wrongCount || q.rightCount || q.srsLevel || q.starred || q.note)) {
              if (q.wrongCount)    existing.wrongCount    = q.wrongCount;
              if (q.rightCount)    existing.rightCount    = q.rightCount;
              if (q.srsLevel)      existing.srsLevel      = q.srsLevel;
              if (q.srsInterval)   existing.srsInterval   = q.srsInterval;
              if (q.srsEase)       existing.srsEase       = q.srsEase;
              if (q.srsNextReview) existing.srsNextReview = q.srsNextReview;
              if (q.srsLastReview) existing.srsLastReview = q.srsLastReview;
              if (q.weight)        existing.weight        = q.weight;
              if (q.starred)       existing.starred       = true;
              if (q.note)          existing.note          = q.note;
              await DB.saveQuestion(existing);
            }
            skipped++;
            return;
          }
          existingKeys.add(key);
          const answers = q.answers && q.answers.length ? q.answers : (q.answer ? [String(q.answer)] : []);
          await DB.saveQuestion({
            folderId: folder.id,
            type: q.type || '填空',
            question: q.question || q.content || '',
            options: q.options,
            answer: String(q.answer || ''),
            answers,
            explanation: q.explanation || '',
            note: q.note || '',
            wrongCount:    q.wrongCount    || 0,
            rightCount:    q.rightCount    || 0,
            srsLevel:      q.srsLevel      || 0,
            srsInterval:   q.srsInterval   || 0,
            srsEase:       q.srsEase       || 2.5,
            srsNextReview: q.srsNextReview || null,
            srsLastReview: q.srsLastReview || null,
            weight:        q.weight        || 1,
            starred:       q.starred       || false,
            createdAt: Date.now(),
          });
          count++;
        }

        if (data.folders) {
          for (const f of data.folders) {
            const allFolders = await DB.getFolders();
            let folder = allFolders.find(x => x.name === f.name);
            if (!folder) {
              const id = await DB.saveFolder({ name: f.name, createdAt: Date.now() });
              folder = { id, name: f.name };
            }
            for (const q of (f.questions || [])) await importQuestion(folder, q);
          }
        } else if (data.questions) {
          const allFolders = await DB.getFolders();
          let folder = allFolders[0];
          if (!folder) {
            const id = await DB.saveFolder({ name: '导入题库', createdAt: Date.now() });
            folder = { id };
          }
          for (const q of data.questions) await importQuestion(folder, q);
        }

        // 询问是否导入学习记录
        const replaceStats = await Actions._askImportStats(data.globalStats);
        await Actions._applyImportStats(data.globalStats, replaceStats);

        const msg = skipped > 0
          ? `✅ 导入 ${count} 道，跳过 ${skipped} 道重复题${replaceStats ? '，学习记录已替换' : ''}`
          : `✅ 成功导入 ${count} 道题目${replaceStats ? '，学习记录已替换' : ''}`;
        Utils.toast(msg);
        await Nav.refreshHome();
      } catch(e) {
        Utils.toast('导入失败，请检查文件格式');
        console.error(e);
      }
    };
    input.click();
  },

  async _doUrlImport() {
    const ov = document.createElement('div');
    ov.className = 'modal-overlay center';
    ov.innerHTML = `
      <div class="modal-dialog" style="max-width:340px">
        <div class="modal-title" style="margin-bottom:8px">🔗 链接导入</div>
        <div style="font-size:12px;color:var(--warn);background:var(--warn-light);border-radius:8px;padding:8px 10px;margin-bottom:12px">
          ⚠️ 支持 <b>JSON</b> 直链或带图题库 <b>ZIP</b> 直链，不支持网页链接
        </div>
        <input class="form-input" id="url-import-input" placeholder="https://example.com/quiz.json 或 quiz.zip" style="margin-bottom:14px">
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline flex-1" onclick="Utils.closeModal(this.closest('.modal-overlay'))">取消</button>
          <button class="btn btn-primary flex-1" id="url-import-ok">连接并检测</button>
        </div>
      </div>`;
    ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
    document.body.appendChild(ov);
    setTimeout(() => ov.querySelector('#url-import-input')?.focus(), 100);

    ov.querySelector('#url-import-ok').onclick = async () => {
      const url = ov.querySelector('#url-import-input').value.trim();
      if (!url) { Utils.toast('请输入URL'); return; }
      if (!url.startsWith('http')) { Utils.toast('请输入完整的 http/https 地址'); return; }
      Utils.closeModal(ov);

      // 显示"正在连接"状态（15s 超时）
      const loading = document.createElement('div');
      loading.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center';
      loading.innerHTML = `<div class="modal-dialog" style="text-align:center;padding:24px 32px;min-width:220px">
        <div style="font-size:32px;margin-bottom:8px">🔗</div>
        <div style="font-size:15px;font-weight:500;color:var(--text)" id="loading-msg">正在尝试连接...</div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px">超时时间 15 秒</div>
      </div>`;
      document.body.appendChild(loading);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      let text, filename;
      try {
        const resp = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!resp.ok) throw new Error('服务器返回 ' + resp.status);

        // 从 URL 提取文件名
        let filename = decodeURIComponent(url.split('/').pop().split('?')[0]) || 'quiz.json';
        if (!filename.endsWith('.json')) filename += '.json';

        loading.querySelector('#loading-msg').textContent = '正在读取文件...';

        // 检测是否是 ZIP 文件（URL 后缀或 content-type）
        const contentType = resp.headers.get('content-type') || '';
        const isZip = url.toLowerCase().includes('.zip') ||
          contentType.includes('zip') || contentType.includes('octet-stream');

        if (isZip) {
          loading.querySelector('#loading-msg').textContent = '正在解析 ZIP...';
          const blob = await resp.blob();
          loading.remove();
          const ok = await Utils.confirm('确认下载', `检测到 ZIP 题库文件：\n📦 ${decodeURIComponent(url.split('/').pop().split('?')[0])}\n\n确认导入？`, '确认导入', false);
          if (!ok) return;
          const fakeFile = new File([blob], url.split('/').pop().split('?')[0] || 'quiz.zip');
          await Actions._doZipImportFile(fakeFile);
          return;
        }

        text = await resp.text();

        // 检验 JSON 格式
        let data;
        try { data = JSON.parse(text); } catch(e) {
          loading.remove();
          Utils.toast('❌ 该链接内容不是有效的 JSON 格式，无法导入');
          return;
        }
        if (!data.folders && !data.questions) {
          loading.remove();
          Utils.toast('❌ JSON 格式不符合题库格式要求');
          return;
        }

        loading.remove();

        // 确认下载弹窗，显示文件名
        const ok = await Utils.confirm(
          '确认下载',
          `检测到文件：
📄 ${filename}

确认下载并导入题库？`,
          '确认下载', false
        );
        if (!ok) return;

        // 导入（含去重 + 全局统计合并）
        let count = 0, skipped = 0;
        const existingQs2 = await DB.getAllQuestions();
        const existingKeys2 = new Set(existingQs2.map(q => q.question.trim() + '||' + String(q.answer).trim()));

        async function importQ2(folder, q) {
          const key = (q.question||'').trim() + '||' + String(q.answer||'').trim();
          if (existingKeys2.has(key)) {
            const ex = existingQs2.find(x => x.question.trim()+'||'+String(x.answer).trim() === key);
            if (ex && (q.wrongCount || q.rightCount || q.srsLevel || q.starred || q.note)) {
              if (q.wrongCount)    ex.wrongCount    = q.wrongCount;
              if (q.rightCount)    ex.rightCount    = q.rightCount;
              if (q.srsLevel)      ex.srsLevel      = q.srsLevel;
              if (q.srsInterval)   ex.srsInterval   = q.srsInterval;
              if (q.srsEase)       ex.srsEase       = q.srsEase;
              if (q.srsNextReview) ex.srsNextReview = q.srsNextReview;
              if (q.srsLastReview) ex.srsLastReview = q.srsLastReview;
              if (q.weight)        ex.weight        = q.weight;
              if (q.starred)       ex.starred       = true;
              if (q.note)          ex.note          = q.note;
              await DB.saveQuestion(ex);
            }
            skipped++; return;
          }
          existingKeys2.add(key);
          const answers = q.answers && q.answers.length ? q.answers : (q.answer ? [String(q.answer)] : []);
          await DB.saveQuestion({
            folderId: folder.id, type: q.type||'填空',
            question: q.question||'', options: q.options,
            answer: String(q.answer||''), answers,
            explanation: q.explanation||'', note: q.note||'',
            wrongCount: q.wrongCount||0, rightCount: q.rightCount||0,
            srsLevel: q.srsLevel||0, srsInterval: q.srsInterval||0,
            srsEase: q.srsEase||2.5, srsNextReview: q.srsNextReview||null,
            srsLastReview: q.srsLastReview||null, weight: q.weight||1,
            starred: q.starred||false, createdAt: Date.now()
          });
          count++;
        }

        if (data.folders) {
          for (const f of data.folders) {
            const flist = await DB.getFolders();
            let folder = flist.find(x => x.name === f.name);
            if (!folder) { const id = await DB.saveFolder({ name: f.name, createdAt: Date.now() }); folder = { id, name: f.name }; }
            for (const q of (f.questions || [])) await importQ2(folder, q);
          }
        } else if (data.questions) {
          const flist = await DB.getFolders();
          let folder = flist[0];
          if (!folder) { const id = await DB.saveFolder({ name: '导入题库', createdAt: Date.now() }); folder = { id }; }
          for (const q of data.questions) await importQ2(folder, q);
        }

        const replaceStats2 = await Actions._askImportStats(data.globalStats);
        await Actions._applyImportStats(data.globalStats, replaceStats2);

        const msg2 = skipped > 0
          ? `✅ 导入 ${count} 道，跳过 ${skipped} 道重复题${replaceStats2 ? '，学习记录已替换' : ''}`
          : `✅ 成功导入 ${count} 道题目${replaceStats2 ? '，学习记录已替换' : ''}`;
        Utils.toast(msg2);
        await Nav.refreshHome();
      } catch(err) {
        clearTimeout(timeoutId);
        loading.remove();
        if (err.name === 'AbortError') {
          Utils.toast('⏱️ 连接超时（15秒），请检查链接是否有效');
        } else {
          Utils.toast('❌ 连接失败：' + (err.message || '网络错误'));
        }
      }
    };
  },

  async _doZipImport() {
    if (!window.JSZip) {
      Utils.toast('正在加载解压库...');
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload = res; s.onerror = () => rej(new Error('加载 JSZip 失败'));
        document.head.appendChild(s);
      });
    }
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.zip';
    input.style.display = 'none';
    document.body.appendChild(input);
    input.onchange = async (e) => {
      const file = e.target.files[0];
      document.body.removeChild(input);
      if (!file) return;
      try {
        Utils.toast('解压中...');
        const zip = await JSZip.loadAsync(file);
        const allPaths = Object.keys(zip.files);
        const topNames = [...new Set(allPaths.map(p => p.split('/')[0]))];
        let prefix = '';
        if (topNames.length === 1 && zip.files[topNames[0] + '/']) {
          prefix = topNames[0] + '/';
        }
        const jsonEntry = zip.file(prefix + 'data.json');
        if (!jsonEntry) { Utils.toast('未找到 data.json，请检查压缩包结构'); return; }
        const jsonText = await jsonEntry.async('text');
        const data = JSON.parse(jsonText);

        let imgCount = 0;
        if (!State.imageCache) State.imageCache = new Map();
        const imgPfx = prefix + 'images/';
        for (const [path, entry] of Object.entries(zip.files)) {
          if (!entry.dir && path.startsWith(imgPfx)) {
            const imgName = path.slice(imgPfx.length);
            if (!imgName) continue;
            const blob = await entry.async('blob');
            await DB.saveImage(imgName, blob);
            State.imageCache.set(imgName, URL.createObjectURL(blob));
            imgCount++;
          }
        }

        const existingQs = await DB.getAllQuestions();
        const existingKeys = new Set(existingQs.map(q => (q.question||'').trim()+'||'+String(q.answer||'').trim()));
        let count = 0, skipped = 0;
        async function doImportQ(folder, q) {
          const key = (q.question||'').trim()+'||'+String(q.answer||'').trim();
          if (existingKeys.has(key)) { skipped++; return; }
          existingKeys.add(key);
          await DB.saveQuestion({
            folderId: folder.id, type: q.type||'填空',
            question: q.question||'', options: q.options||null,
            answer: String(q.answer||''),
            answers: q.answers||(q.answer?[String(q.answer)]:[]),
            explanation: q.explanation||'', note: q.note||'',
            image: q.image||null,
            wrongCount:0, rightCount:0, srsLevel:0, srsInterval:0,
            srsEase:2.5, srsNextReview:null, srsLastReview:null,
            weight:1, starred:false, createdAt:Date.now(),
          });
          count++;
        }
        const allFolders = await DB.getFolders();
        if (data.folders) {
          for (const f of data.folders) {
            let folder = allFolders.find(x => x.name===f.name);
            if (!folder) { const id = await DB.saveFolder({name:f.name,createdAt:Date.now()}); folder={id,name:f.name}; }
            for (const q of (f.questions||[])) await doImportQ(folder, q);
          }
        } else if (data.questions) {
          let folder = allFolders[0];
          if (!folder) { const id = await DB.saveFolder({name:'导入题库',createdAt:Date.now()}); folder={id}; }
          for (const q of data.questions) await doImportQ(folder, q);
        }
        Utils.toast(`✅ 导入 ${count} 道题，${imgCount} 张图片`);
        await Nav.refreshHome();
      } catch(err) {
        Utils.toast('导入失败：' + err.message);
        console.error(err);
      }
    };
    input.click();
  },

  async _askImportStats(gs) {
    if (!gs) return false;
    return new Promise(resolve => {

      ov.innerHTML = `
        <div class="modal-dialog" style="max-width:320px">

  async _applyImportStats(gs, replace) {
    if (!gs || !replace) return;
    // 合法性校验：拒绝明显异常数据
    const pts = Number(gs.points) || 0;
    const ta  = Number(gs.totalAnswered) || 0;
    const tr  = Number(gs.totalRight) || 0;
    const tw  = Number(gs.totalWrong) || 0;
    const sm  = Number(gs.studyMinutes) || 0;
    if (pts < 0 || ta < 0 || tr < 0 || tw < 0 || sm < 0) { Utils.toast('⚠️ 学习记录数据异常，已跳过'); return; }
    if (ta > 0 && Math.abs(tr + tw - ta) > ta * 0.1) { Utils.toast('⚠️ 学习记录数据不一致，已跳过'); return; }
    if (ta > 0 && sm > 0 && sm * 60 / ta < 0.5) { Utils.toast('⚠️ 学习速度异常，已跳过'); return; }
    await DB.setMeta('points',        Math.min(pts, 9999999));
    await DB.setMeta('totalAnswered', Math.min(ta, 9999999));
    await DB.setMeta('totalRight',    Math.min(tr, 9999999));
    await DB.setMeta('totalWrong',    Math.min(tw, 9999999));
    await DB.setMeta('studyMinutes',  Math.min(sm, 9999999));
  },

  // 通用数据导入（已解析的 data 对象）—— 支持嵌套文件夹 parentId
  async _doImportData(data) {
    const existingQs = await DB.getAllQuestions();
    const existingKeys = new Set(existingQs.map(q => (q.question||'').trim()+'||'+String(q.answer||'').trim()));
    let count = 0, skipped = 0;

    // 先建立文件夹名→ID 映射，处理 parentId
    // 第一遍：创建所有文件夹（不带 parentId）
    const allFolders0 = await DB.getFolders();
    const importedFolderIds = {}; // 原文件数组索引 → 实际 DB id
    const foldersByName = {};
    if (data.folders) {
      for (let i = 0; i < data.folders.length; i++) {
        const f = data.folders[i];
        let folder = allFolders0.find(x => x.name === f.name);
        if (!folder) {
          const id = await DB.saveFolder({ name: f.name, createdAt: Date.now(), color: f.color, icon: f.icon });
          folder = { id, name: f.name };
        }
        importedFolderIds[i] = folder.id;
        foldersByName[f.name] = folder.id;
      }
      // 第二遍：设置 parentId（如果导出时保留了）
      for (let i = 0; i < data.folders.length; i++) {
        const f = data.folders[i];
        if (f.parentId != null) {
          // parentId 可能是名字或数字索引
          let parentDbId = null;
          if (typeof f.parentId === 'number' && importedFolderIds[f.parentId] !== undefined) {
            parentDbId = importedFolderIds[f.parentId];
          } else if (typeof f.parentId === 'string' && foldersByName[f.parentId]) {
            parentDbId = foldersByName[f.parentId];
          }
          if (parentDbId && parentDbId !== importedFolderIds[i]) {
            const allF = await DB.getFolders();
            const dbF = allF.find(x => x.id === importedFolderIds[i]);
            if (dbF) { dbF.parentId = parentDbId; await DB.saveFolder(dbF); }
          }
        }
      }
    }

    async function importQ(folderId, q) {
      const key = (q.question||'').trim()+'||'+String(q.answer||'').trim();
      const existing = existingMap[key];
      if (existing) {
        if (q.wrongCount != null) existing.wrongCount = q.wrongCount;
        if (q.rightCount != null) existing.rightCount = q.rightCount;
        if (q.srsLevel != null) existing.srsLevel = q.srsLevel;
        if (q.srsInterval != null) existing.srsInterval = q.srsInterval;
        if (q.srsEase != null) existing.srsEase = q.srsEase;
        if (q.srsNextReview != null) existing.srsNextReview = q.srsNextReview;
        if (q.srsLastReview != null) existing.srsLastReview = q.srsLastReview;
        if (q.weight != null) existing.weight = q.weight;
        if (q.starred !== undefined) existing.starred = !!q.starred;
        await DB.saveQuestion(existing);
        merged++;
        return;
      }
      existingKeys.add(key);
      const newQ = {
        folderId, type: q.type||'填空',
        question: q.question||'', options: q.options||null,
        answer: String(q.answer||''),
        answers: q.answers||(q.answer?[String(q.answer)]:[]),
        explanation: q.explanation||'', note: q.note||'',
        image: q.image||null,
        wrongCount:q.wrongCount||0, rightCount:q.rightCount||0,
        srsLevel:q.srsLevel||0, srsInterval:q.srsInterval||0,
        srsEase:q.srsEase||2.5, srsNextReview:q.srsNextReview||null, srsLastReview:q.srsLastReview||null,
        weight:q.weight||1, starred:!!q.starred, createdAt:Date.now()
      };
      const newId = await DB.saveQuestion(newQ);
      if (!newQ.id && newId) newQ.id = newId;
      existingMap[key] = newQ;
      count++;
    }

    if (data.folders) {
      for (let i = 0; i < data.folders.length; i++) {
        const fid = importedFolderIds[i];
        if (fid) for (const q of (data.folders[i].questions||[])) await importQ(fid, q);
      }
    } else if (data.questions) {
      const allF = await DB.getFolders();
      let folder = allF[0];
      if (!folder) { const id = await DB.saveFolder({name:'导入题库',createdAt:Date.now()}); folder={id}; }
      for (const q of data.questions) await importQ(folder.id, q);
    }
    Utils.toast(merged > 0
      ? `✅ 导入 ${count} 道，更新 ${merged} 道重复题`
      : (skipped > 0
        ? `✅ 导入 ${count} 道，跳过 ${skipped} 道重复题`
        : `✅ 成功导入 ${count} 道题目`));
    await Nav.refreshHome();
  },

      // 后台补全文件大小
      files.forEach(async f => {
        if (typeof f.size === 'number' && f.size > 0) return;
        try {
          const encodedPath = f.path.split('/').map(encodeURIComponent).join('/');
          const metaRes = await fetch(`https://gitee.com/api/v5/repos/fly114514/Quiz-Box/contents/${encodedPath}?ref=main`);
          if (!metaRes.ok) return;
          const meta = await metaRes.json();
          if (typeof meta.size === 'number' && meta.size > 0) {
            f.size = meta.size;
            f.sizeText = Actions._formatBytes(meta.size);
            const sub = content.querySelector(`[data-path="${Utils.esc(f.path)}"] .card-row-sub`);
            if (sub) sub.textContent = `${f.sizeText} · ${f.name.toLowerCase().endsWith('.zip') ? 'ZIP 含图片' : 'JSON'}`;
          }
        } catch(e) {}
      });

      // Bind click
      content.querySelectorAll('[data-path]').forEach(card => {
        card.onclick = async () => {
          const path = card.dataset.path;
          const name = card.dataset.name;
          const isZip = card.dataset.zip === '1';
          // 使用 Gitee Contents API 获取文件（返回 base64，避免 CORS）
          const loading = document.createElement('div');
          loading.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center';
          loading.innerHTML = `<div class="modal-dialog" style="text-align:center;padding:24px 32px">
            <div style="font-size:28px;margin-bottom:10px">${isZip ? '📦' : '📄'}</div>
            <div style="font-size:15px;color:var(--text)">正在下载 ${Utils.esc(name.replace(/\.(json|zip)$/i,''))}...</div>
          </div>`;
          document.body.appendChild(loading);
          try {
            const encodedPath = path.split('/').map(encodeURIComponent).join('/');
            const fileRes = await fetch(`https://gitee.com/api/v5/repos/fly114514/Quiz-Box/contents/${encodedPath}?ref=main`);
            if (!fileRes.ok) throw new Error('HTTP ' + fileRes.status);
            const fileInfo = await fileRes.json();
            // base64 解码
            const binaryStr = atob(fileInfo.content.replace(/\n/g, ''));
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            loading.remove();
            if (isZip) {
              const blob = new Blob([bytes], { type: 'application/zip' });
              const fakeFile = new File([blob], name);
              await Actions._doZipImportFile(fakeFile);
            } else {
              const text = new TextDecoder('utf-8').decode(bytes);
              const data = JSON.parse(text);
              if (!data.folders && !data.questions) throw new Error('不符合题库格式');
              await Actions._doImportData(data);
            }
          } catch(e) {
            loading.remove();
            Utils.toast('导入失败：' + e.message);
          }
        };
      });
    }

    renderList(allFiles);
    el.querySelector('#gitee-help-btn')?.addEventListener('click', () => {
      const ov = document.createElement('div');
      ov.className = 'modal-overlay center';
      ov.innerHTML = `
        <div class="modal-dialog" style="max-width:320px">
          <div style="width:50px;height:50px;border-radius:14px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </div>
          <div class="modal-title" style="text-align:center;margin-bottom:8px">题库仓库说明</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.8;text-align:center;margin-bottom:14px">如果需要上传至官方题库仓库，可联系管理员。</div>
          <button class="btn btn-outline btn-block" onclick="Utils.closeModal(this.closest('.modal-overlay'))">关闭</button>
        </div>`;
      ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
      document.body.appendChild(ov);
    });

    // 搜索
    searchBar.querySelector('#gitee-search').oninput = Utils.debounce(e => {
      const q = e.target.value.trim().toLowerCase();
      renderList(q ? allFiles.filter(f => f.name.toLowerCase().includes(q)) : allFiles);
    }, 200);
  },

  // 导出JSON
  async exportJSON() {
    const folders = await DB.getFolders();
    const allQs = await DB.getAllQuestions();

    // 递归构建文件夹树 HTML
    function buildFolderTreeHtml(parentId, depth) {
      const children = folders.filter(f => (f.parentId || null) === (parentId || null));
      return children.map(f => {
        const cnt = allQs.filter(q => q.folderId === f.id).length;
        const pad = depth * 18;
        return `<div data-fid="${f.id}">
          <div class="export-folder-row" data-fid="${f.id}" style="display:flex;align-items:center;gap:10px;padding:10px 0;padding-left:${pad}px;border-bottom:1px solid var(--border);cursor:pointer">
            <input type="checkbox" id="ef-${f.id}" value="${f.id}" checked style="width:18px;height:18px;pointer-events:none;flex-shrink:0">
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;color:var(--text)">${Utils.esc(f.name)}</div>
              <div style="font-size:12px;color:var(--text3)">${cnt} 题${f.parentId ? ' · 子文件夹' : ''}</div>
            </div>
          </div>
          ${buildFolderTreeHtml(f.id, depth + 1)}
        </div>`;
      }).join('');
    }

    // 获取所有子孙 ID
    function getDescendants(fid) {
      const kids = folders.filter(f => f.parentId === fid);
      return kids.reduce((acc, k) => [...acc, k.id, ...getDescendants(k.id)], []);
    }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-height:85vh;display:flex;flex-direction:column">
        <div class="modal-handle"></div>
        <div class="modal-title" style="margin-bottom:4px;flex-shrink:0">导出设置</div>
        <div style="flex:1;overflow-y:auto">

          <div style="font-size:13px;font-weight:600;color:var(--text);margin:4px 0 6px">选择文件夹</div>
          <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
            <span id="select-all-btn" style="font-size:12px;color:var(--accent);cursor:pointer;padding:2px 6px">全选</span>
            <span style="font-size:12px;color:var(--text3);padding:2px 4px">/</span>
            <span id="deselect-all-btn" style="font-size:12px;color:var(--accent);cursor:pointer;padding:2px 6px">全不选</span>
          </div>
          <div id="export-folders">
            ${buildFolderTreeHtml(null, 0)}
          </div>

          <div id="full-options" style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">附带内容</div>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <input type="checkbox" id="exp-notes" checked style="width:18px;height:18px">
              <div>
                <div style="font-size:14px;color:var(--text)">笔记</div>
                <div style="font-size:12px;color:var(--text3)">导出每道题的个人笔记</div>
              </div>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <input type="checkbox" id="exp-images" style="width:18px;height:18px">
              <div>
                <div style="font-size:14px;color:var(--text)">图片（导出为 zip）</div>
                <div style="font-size:12px;color:var(--text3)">带图题库，包含 images/ 文件夹</div>
              </div>
            </label>
          </div>

          <div id="export-count" style="font-size:13px;color:var(--text3);margin-top:14px;padding:10px;background:var(--surface2);border-radius:8px;text-align:center"></div>
        </div>
        <div style="flex-shrink:0;display:flex;gap:10px;margin-top:12px">
          <button class="btn btn-outline flex-1" onclick="Utils.closeModal(this.closest('.modal-overlay'))">取消</button>
          <button class="btn btn-primary flex-1" id="do-export-btn">导出</button>
        </div>
      </div>`;
    overlay.onclick = e => { if (e.target === overlay) Utils.closeModal(overlay); };
    document.body.appendChild(overlay);

    // 全选/全不选
    overlay.querySelector('#select-all-btn').onclick = () => {
      overlay.querySelectorAll('#export-folders input').forEach(cb => cb.checked = true);
      updateCount();
    };
    overlay.querySelector('#deselect-all-btn').onclick = () => {
      overlay.querySelectorAll('#export-folders input').forEach(cb => cb.checked = false);
      updateCount();
    };

    // 文件夹行点击：自动联动子文件夹
    overlay.querySelectorAll('.export-folder-row').forEach(row => {
      row.addEventListener('click', () => {
        const fid = +row.dataset.fid;
        const cb = row.querySelector('input[type=checkbox]');
        if (!cb) return;
        cb.checked = !cb.checked;
        // 联动所有子孙文件夹
        const desc = getDescendants(fid);
        desc.forEach(did => {
          const dcb = overlay.querySelector(`#ef-${did}`);
          if (dcb) dcb.checked = cb.checked;
        });
        updateCount();
      });
    });

    function updateCount() {
      const selectedIds = new Set([...overlay.querySelectorAll('#export-folders input:checked')].map(el => +el.value));
      const cnt = allQs.filter(q => selectedIds.has(q.folderId)).length;
      const countEl = overlay.querySelector('#export-count');
      if (countEl) countEl.textContent = `共 ${cnt} 道题将被导出`;
    }
    updateCount();

    overlay.querySelector('#do-export-btn').onclick = async () => {
      const selectedIds = new Set([...overlay.querySelectorAll('#export-folders input:checked')].map(el => +el.value));
      if (!selectedIds.size) { Utils.toast('请至少选择一个文件夹'); return; }
      const inclNotes   = overlay.querySelector('#exp-notes').checked;
      const inclImages  = overlay.querySelector('#exp-images').checked;

      const filename = `刷题Box-${new Date().toLocaleDateString('zh').replace(/\//g,'-')}.json`;

      // 构建保留嵌套关系的 folders 数组（只导出选中的，保留 parentId）
      const selectedFolders = folders.filter(f => selectedIds.has(f.id));
      const data = {
        exportTime: new Date().toISOString(),
        folders: selectedFolders.map(f => {
          const out = { name: f.name };
          // 保留 parentId（指向同样被选中的父文件夹）
          if (f.parentId && selectedIds.has(f.parentId)) out.parentId = f.parentId;
          if (f.color) out.color = f.color;
          if (f.icon) out.icon = f.icon;
          out.questions = allQs.filter(q => q.folderId === f.id).map(q => {
            const qout = { type: q.type, question: q.question, answer: q.answer };
            if (q.options && q.options.length) qout.options = q.options;
            if (q.answers && q.answers.length > 1) qout.answers = q.answers;
            if (q.explanation) qout.explanation = q.explanation;
            if (q.image) qout.image = q.image;
            if (inclNotes && q.note) qout.note = q.note;
            return qout;
          });
          return out;
        })
      };

      Utils.closeModal(overlay);
      const json = JSON.stringify(data, null, 2);

      if (inclImages) {
        if (!window.JSZip) {
          Utils.toast('正在加载打包库...');
          await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
        }
        const zip = new JSZip();
        zip.file('data.json', json);
        const imgFolder = zip.folder('images');
        const exportedImgNames = new Set(data.folders.flatMap(f => f.questions.map(q => q.image).filter(Boolean)));
        for (const name of exportedImgNames) {
          const blob = await DB.getImage(name);
          if (blob) imgFolder.file(name, blob);
        }
        const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        const zipName = filename.replace('.json', '.zip');
        if (window.AndroidBridge) { try { window.AndroidBridge.shareFile(zipBlob, zipName); return; } catch(e) {} }
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a'); a.href=url; a.download=zipName;
        document.body.appendChild(a); a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
        Utils.toast('已开始下载 zip'); return;
      }

      if (window.AndroidBridge) { try { window.AndroidBridge.shareFile(json, filename); return; } catch(e) {} }
      const blob = new Blob([json], { type: 'application/json' });
      if (navigator.share && navigator.canShare) {
        try {
          const file = new File([blob], filename, { type: 'application/json' });
          if (navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: '刷题Box' }); Utils.toast('已打开分享'); return; }
        } catch(e) { if (e.name === 'AbortError') return; }
      }
      try {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
        Utils.toast('已开始下载');
      } catch(e) { Utils.toast('导出失败：' + e.message); }
    };
  },

  // 做题中修正答案（支持多答案）
  editAnswerInQuiz(q, onSaved) {
    const allAnswers = q.answers && q.answers.length ? [...q.answers] : [q.answer || ''];
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const buildRows = (answers) => answers.map((a, i) => `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px" data-ans-row="${i}">
        <span style="font-size:13px;color:var(--text3);width:40px;flex-shrink:0">答案${i+1}</span>
        <input class="form-input" style="flex:1" value="${Utils.esc(a)}" data-ans-idx="${i}">
        ${answers.length > 1 ? `<button onclick="this.closest('[data-ans-row]').remove()" style="color:var(--danger);padding:4px;flex-shrink:0">${Icons.close}</button>` : ''}
      </div>`).join('');
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">修正答案</div>
        <div class="modal-sub" style="margin-bottom:14px">修改后立即生效，同步更新题库</div>
        <div id="edit-ans-list">${buildRows(allAnswers)}</div>
        <button id="add-ans-btn" style="color:var(--accent);font-size:14px;padding:4px 0;margin-bottom:14px">+ 添加备选答案</button>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline flex-1" onclick="Utils.closeModal(this.closest('.modal-overlay'))">取消</button>
          <button class="btn btn-primary flex-1" id="save-ans-btn">保存</button>
        </div>
      </div>`;
    overlay._onSaved = onSaved;
    overlay.onclick = (e) => { if (e.target === overlay) Utils.closeModal(overlay); };
    document.body.appendChild(overlay);
    // 添加备选答案
    overlay.querySelector('#add-ans-btn').onclick = () => {
      const list = overlay.querySelector('#edit-ans-list');
      const n = list.querySelectorAll('[data-ans-row]').length;
      const div = document.createElement('div');
      div.setAttribute('data-ans-row', n);
      div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:10px';
      div.innerHTML = `
        <span style="font-size:13px;color:var(--text3);width:40px;flex-shrink:0">答案${n+1}</span>
        <input class="form-input" style="flex:1" placeholder="备选答案" data-ans-idx="${n}">
        <button onclick="this.closest('[data-ans-row]').remove()" style="color:var(--danger);padding:4px;flex-shrink:0">${Icons.close}</button>`;
      list.appendChild(div);
    };
    // 保存
    overlay.querySelector('#save-ans-btn').onclick = async () => {
      const inputs = overlay.querySelectorAll('[data-ans-idx]');
      const answers = [...inputs].map(i => i.value.trim()).filter(Boolean);
      if (!answers.length) { Utils.toast('答案不能为空'); return; }
      const allQs = await DB.getAllQuestions();
      const dbq = allQs.find(x => x.id === q.id);
      if (!dbq) return;
      dbq.answer = answers[0];
      dbq.answers = answers;
      await DB.saveQuestion(dbq);
      Utils.toast('答案已更新');
      overlay._onSaved?.();
      Utils.closeModal(overlay);
    };
  },

  async _moveFolderInto(id, btn) {
    btn.closest('.modal-overlay').remove();
    const folders = await DB.getFolders();
    const me = folders.find(f => f.id === id);
    if (!me) return;
    // 收集所有当前文件夹的子孙ID（不能移动到自己或后代中）
    function getDescendantIds(fid) {
      const kids = folders.filter(f => f.parentId === fid);
      return kids.reduce((acc, k) => [...acc, k.id, ...getDescendantIds(k.id)], []);
    }
    const forbidden = new Set([id, ...getDescendantIds(id)]);
    const candidates = folders.filter(f => !forbidden.has(f.id));
    const ov = document.createElement('div');
    ov.className = 'modal-overlay';
    ov.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" style="margin-bottom:6px">将「${Utils.esc(me.name)}」移动到</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:12px">选择父文件夹，或选「根目录」取消嵌套</div>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto">
          <div class="card-row" data-fid="__root__" style="padding:12px;cursor:pointer;border-top:none;border-radius:10px;background:var(--surface2)${!me.parentId?';border:1.5px solid var(--accent)':''}">
            <span style="font-size:14px;color:var(--text)">📂 根目录（顶级）</span>
            ${!me.parentId ? '<span style="font-size:11px;color:var(--accent);margin-left:auto">当前</span>' : ''}
          </div>
          ${candidates.map(f => `
            <div class="card-row" data-fid="${f.id}" style="padding:12px;cursor:pointer;border-top:none;border-radius:10px;background:var(--surface2)${f.id===me.parentId?';border:1.5px solid var(--accent)':''}">
              <span style="font-size:14px;color:var(--text)">${Utils.esc(f.name)}</span>
              ${f.id===me.parentId ? '<span style="font-size:11px;color:var(--accent);margin-left:auto">当前父级</span>' : ''}
            </div>`).join('')}
        </div>
        <button class="btn btn-outline btn-block" style="margin-top:12px" onclick="Utils.closeModal(this.closest('.modal-overlay'))">取消</button>
      </div>`;
    ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
    ov.querySelectorAll('[data-fid]').forEach(row => {
      row.onclick = async () => {
        const fid = row.dataset.fid;
        me.parentId = fid === '__root__' ? null : +fid;
        await DB.saveFolder(me);
        Utils.closeModal(ov);
        Utils.toast('已移动');
        await Nav.refreshCurrent();
      };
    });
    document.body.appendChild(ov);
  },
  _renameFolder(id, btn) {
    btn.closest('.modal-overlay').remove();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay center';
    overlay.innerHTML = `
      <div class="modal-dialog" style="max-width:340px">
        <div class="modal-title">重命名文件夹</div>

        </div>
      </div>`;

  async _deleteFolder(id, btn) {
    btn.closest('.modal-overlay').remove();
    const folders = await DB.getFolders();
    function getDescendantIds(fid) {
      return folders.filter(f => f.parentId === fid).reduce((a, k) => [...a, k.id, ...getDescendantIds(k.id)], []);
    }
    const childIds = getDescendantIds(id);
    const warnMsg = childIds.length
      ? `确定删除此文件夹及其 ${childIds.length} 个子文件夹和所有题目？不可撤销`
      : '确定删除此文件夹及其所有题目？不可撤销';
    const fDelOk = await Utils.confirm('删除文件夹', warnMsg, '确认删除', true);
    if (!fDelOk) return;
    // 删除所有子文件夹
    for (const cid of childIds) await DB.deleteFolder(cid);
    await DB.deleteFolder(id);
    Utils.toast('已删除');
    await Nav.refreshCurrent();
  },

  // ── 云端学习记录同步 ────────────────────────────────────────────────
  // 需要 Supabase 有 user_stats 表：user_id, data(jsonb), updated_at
  async _buildLocalStats() {
    return {
      points:        (await DB.getMeta('points'))        || 0,
      totalAnswered: (await DB.getMeta('totalAnswered')) || 0,
      totalRight:    (await DB.getMeta('totalRight'))    || 0,
      totalWrong:    (await DB.getMeta('totalWrong'))    || 0,
      studyMinutes:  (await DB.getMeta('studyMinutes'))  || 0,
      studyLog:      (await DB.getMeta('studyLog'))      || '{}',
      syncedAt:      new Date().toISOString(),
    };
  },

  async _applyCloudStats(stats) {
    // 合法性校验
    const pts = Number(stats.points)||0;
    const ta  = Number(stats.totalAnswered)||0;
    const tr  = Number(stats.totalRight)||0;
    const tw  = Number(stats.totalWrong)||0;
    const sm  = Number(stats.studyMinutes)||0;
    if (pts < 0 || ta < 0 || tr < 0 || tw < 0 || sm < 0) throw new Error('数据含负数，拒绝恢复');
    await DB.setMeta('points',        Math.min(pts, 9999999));
    await DB.setMeta('totalAnswered', Math.min(ta,  9999999));
    await DB.setMeta('totalRight',    Math.min(tr,  9999999));
    await DB.setMeta('totalWrong',    Math.min(tw,  9999999));
    await DB.setMeta('studyMinutes',  Math.min(sm,  9999999));
    if (stats.studyLog) await DB.setMeta('studyLog', stats.studyLog);
    await DB.setMeta('lastStatsSyncTime', Date.now());
  },

  // 判断哪套数据"更好"：积分高 OR 答题数更多（取最大值方向）
  _cloudWinsOver(cloudStats, localStats) {
    const cloudScore = (Number(cloudStats.points)||0) * 10 + (Number(cloudStats.totalAnswered)||0) + (Number(cloudStats.studyMinutes)||0);
    const localScore = (Number(localStats.points)||0) * 10 + (Number(localStats.totalAnswered)||0) + (Number(localStats.studyMinutes)||0);
    return cloudScore > localScore;
  },
  _cloudTableMissing(err, table) {
    const msg = String(err?.message || err || '');
    return !!msg && (
      msg.includes(`Could not find the table 'public.${table}'`) ||
      msg.includes('schema cache') ||
      (msg.includes(`/${table}`) && msg.includes('404'))
    );
  },
  async _markCloudFeatureUnavailable(key) {
    await DB.setMeta(`cloudFeatureDisabled:${key}`, true).catch(() => {});
  },
  async _isCloudFeatureUnavailable(key) {
    return !!(await DB.getMeta(`cloudFeatureDisabled:${key}`));
  },
  async _getSyncDeviceId() {
    let id = await DB.getMeta('syncDeviceId');
    if (id) return id;
    id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    await DB.setMeta('syncDeviceId', id);
    return id;
  },
  /* _formatBytes(size) {
    if (!(size > 0)) return '—';
    if (size >= 1048576) return (size / 1048576).toFixed(1) + ' MB';
    if (size >= 1024) return (size / 1024).toFixed(1) + ' KB';
    return size + ' B';
  }, */
  _formatBytes(size) {
    if (!(size > 0)) return '-';
    if (size >= 1048576) return (size / 1048576).toFixed(1) + ' MB';
    if (size >= 1024) return (size / 1024).toFixed(1) + ' KB';
    return size + ' B';
  },

  async syncStatsToCloud(silent = false) {
    if (await Actions._isCloudFeatureUnavailable('user_stats')) {
      if (!silent) Utils.toast('当前云端学习记录功能未配置后端数据表');
      return false;
    }
    if (!State.lbUser) { if (!silent) Utils.toast('请先登录排行榜账号'); return false; }
    if (!silent) await DB.setMeta('skipCloudSync', false);
    try {
      const u = await Pages._lbCurrentUser();
      if (!u) return false;
      const stats = await Actions._buildLocalStats();
      await Pages._lbFetch('/rest/v1/user_stats', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ user_id: u.id, data: stats, updated_at: stats.syncedAt })
      });
      await DB.setMeta('lastStatsSyncTime', Date.now());
      if (!silent) Utils.toast('✅ 学习记录已同步到云端');
      return true;
    } catch(e) {
      if (!silent) Utils.toast('同步失败：' + e.message);
      return false;
    }
  },

  async syncStatsFromCloud(silent = false) {
    if (await Actions._isCloudFeatureUnavailable('user_stats')) return false;
    if (!State.lbUser) { if (!silent) Utils.toast('请先登录排行榜账号'); return false; }
    const skipSync = await DB.getMeta('skipCloudSync');
    if (skipSync && silent) return false;
    try {
      const u = await Pages._lbCurrentUser();
      if (!u) return false;
      const rows = await Pages._lbFetch(`/rest/v1/user_stats?user_id=eq.${u.id}&select=data,updated_at`);

      if (!rows || !rows.length) {
        // 云端无记录 → 上传本地
        await Actions.syncStatsToCloud(true);
        if (!silent) Utils.toast('✅ 本地记录已上传到云端');
        return true;
      }

      const cloudStats = rows[0].data;
      if (!cloudStats) return false;

      const localStats = await Actions._buildLocalStats();

        // 本地更好 → 直接上传覆盖云端
        await Actions.syncStatsToCloud(true);

              <div style="font-weight:700;color:var(--accent)">${cloudPts}</div>
              <div style="font-weight:700;color:var(--accent)">${cloudAns}</div>

          · 超出5分钟自动删除云端数据<br>
          · 文件大小限制 <b>50MB</b><br>
          · 上传数据仅用于跨设备传输，不永久存储
        </div>
        <p id="upload-msg" style="font-size:13px;color:var(--text3);text-align:center;margin-bottom:12px;min-height:18px"></p>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline flex-1" onclick="Utils.closeModal(this.closest('.modal-overlay'))">取消</button>
          <button class="btn btn-primary flex-1" id="upload-confirm-btn">确认上传</button>
        </div>
      </div>`;
    ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
    document.body.appendChild(ov);
    ov.querySelector('#upload-confirm-btn').onclick = async () => {
      const msg = ov.querySelector('#upload-msg');
      const btn = ov.querySelector('#upload-confirm-btn');
      btn.disabled = true; msg.textContent = '准备数据...'; msg.style.color = 'var(--text3)';
      try {
        const u = await Pages._lbCurrentUser();
        if (!u) throw new Error('未登录');
        // 收集题库数据
        const folders = await DB.getFolders();
        const allQs = await DB.getAllQuestions();
        const localStats = await Actions._buildLocalStats();
        const payload = {
          exportTime: new Date().toISOString(),
          globalStats: localStats,
          folders: folders.map(f => ({
            name: f.name, color: f.color, icon: f.icon,
            parentId: f.parentId ? (folders.find(x => x.id === f.parentId)?.name || null) : null,
            questions: allQs.filter(q => q.folderId === f.id).map(q => ({
              type:q.type, question:q.question, answer:q.answer,
              options:q.options||null, answers:q.answers||null,
              explanation:q.explanation||'', note:q.note||'', image:q.image||null,
              wrongCount:q.wrongCount||0, rightCount:q.rightCount||0,
              srsLevel:q.srsLevel||0, srsInterval:q.srsInterval||0, srsEase:q.srsEase||2.5,
              srsNextReview:q.srsNextReview||null, srsLastReview:q.srsLastReview||null,
              weight:q.weight||1, starred:q.starred||false
            }))
          }))
        };
        const json = JSON.stringify(payload);
        const byteSize = new TextEncoder().encode(json).length;
        const MB = byteSize / 1048576;
        if (MB > 50) throw new Error(`题库大小 ${MB.toFixed(1)}MB 超出 50MB 限制`);
        msg.textContent = `数据大小 ${MB.toFixed(2)}MB，上传中...`;
        const expiresAt = new Date(Date.now() + 5 * 60 * 1000).toISOString();
        const deviceId = await Actions._getSyncDeviceId();
        await Pages._lbFetch('/rest/v1/quiz_bank_sync', {
          method: 'POST',
          headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
          body: JSON.stringify({ user_id: u.id, data: JSON.stringify({ deviceId, payload }), expires_at: expiresAt, updated_at: new Date().toISOString() })
        });
        await DB.setMeta('quizBankSyncUploadTime', Date.now());
        Utils.closeModal(ov);
        Utils.toast(`✅ 题库已上传（${MB.toFixed(2)}MB），5分钟内其他设备可同步`);
      } catch(e) {
        msg.textContent = '上传失败：' + e.message; msg.style.color = 'var(--danger)';
        btn.disabled = false;
      }
    };
  },

  async checkQuizBankSync() {
    if (await Actions._isCloudFeatureUnavailable('quiz_bank_sync')) return;
    // 检查是否有可用的题库同步（同账号其他设备上传的）
    if (!State.lbUser) return;
    try {
      const u = await Pages._lbCurrentUser();
      if (!u) return;
      const rows = await Pages._lbFetch(`/rest/v1/quiz_bank_sync?user_id=eq.${u.id}&select=data,expires_at,updated_at`);
      if (!rows || !rows.length) return;
      const row = rows[0];
      const expiry = new Date(row.expires_at);
      if (expiry < new Date()) {
        // 已过期，清理
        await Pages._lbFetch(`/rest/v1/quiz_bank_sync?user_id=eq.${u.id}`, { method: 'DELETE' }).catch(()=>{});
        return;
      }
      let parsed;
      try { parsed = JSON.parse(row.data); } catch(e) { parsed = null; }
      const deviceId = await Actions._getSyncDeviceId();
      const payload = parsed && parsed.payload ? parsed.payload : parsed;
      const sourceDeviceId = parsed && parsed.deviceId ? parsed.deviceId : null;
      if (sourceDeviceId && sourceDeviceId === deviceId) return;
      if (!payload || (!payload.folders && !payload.questions)) return;
      const uploadTime = new Date(row.updated_at).toLocaleString('zh');
      const minutesLeft = Math.round((expiry - new Date()) / 60000);
      // 弹出同步提示
      const ov = document.createElement('div');
      ov.className = 'modal-overlay center';
      ov.style.zIndex = '5000';
      ov.innerHTML = `
        <div class="modal-dialog" style="max-width:320px">
          <div style="text-align:center;margin-bottom:10px">
            <div style="width:52px;height:52px;border-radius:14px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 10px">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
          </div>
          <div class="modal-title" style="text-align:center;margin-bottom:6px">检测到题库同步</div>
          <div style="font-size:13px;color:var(--text2);text-align:center;line-height:1.7;margin-bottom:14px">
            同账号其他设备于 ${uploadTime} 上传了题库<br>剩余 <b style="color:var(--accent)">${minutesLeft}分钟</b>可同步
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline flex-1" onclick="Utils.closeModal(this.closest('.modal-overlay'))">忽略</button>
            <button class="btn btn-primary flex-1" id="sync-bank-btn">立即同步</button>
          </div>
        </div>`;
      ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
      document.body.appendChild(ov);
      ov.querySelector('#sync-bank-btn').onclick = async () => {
        const btn2 = ov.querySelector('#sync-bank-btn');
        btn2.disabled = true; btn2.textContent = '同步中...';
        try {
          await Actions._doImportData(payload);
          // 删除云端数据
          await Pages._lbFetch(`/rest/v1/quiz_bank_sync?user_id=eq.${u.id}`, { method: 'DELETE' }).catch(()=>{});
          Utils.closeModal(ov);
          Utils.toast('✅ 题库同步完成');
        } catch(e) {
          Utils.toast('同步失败：' + e.message);
          btn2.disabled = false; btn2.textContent = '立即同步';
        }
      };
    } catch(e) { /* 静默失败 */ }
  },
};

/* =========================================================
   拦截手机物理返回键 → 返回首页
   ========================================================= */
window.addEventListener('popstate', (e) => {
  // 第一优先级：关闭最顶层弹窗（modal-overlay 可见的那个）
  const openModals = Array.from(document.querySelectorAll('.modal-overlay'))
    .filter(m => m.isConnected && !m.classList.contains('closing'));
  if (openModals.length > 0) {
    // 关最后一个（最顶层）弹窗
    Utils.closeModal(openModals[openModals.length - 1]);
    history.pushState(null, '', location.href);
    return;
  }

  const app = document.getElementById('app');
  const pages = app.querySelectorAll('.page');
  // pages.length === 0 → wrapper在app里（首页），没有pushed子页面
  if (pages.length === 0) {
    history.pushState(null, '', location.href);
    return;
  }
  // 做题页：用退出确认弹窗而非直接 pop
  const top = pages[pages.length - 1];
  if (top && top._isQuizPage) {
    history.pushState(null, '', location.href);
    top._quit(); // 触发退出确认弹窗
    return;
  }
  // 其他页面：正常返回
  history.pushState(null, '', location.href);
  Nav.pop();
});

/* =========================================================
   应用入口
   ========================================================= */
async function main() {
  // 初始化数据库
  await DB.init();
  // 启动时注入已缓存渲染库
  await AI.injectLibs().catch(() => {});
  // 首次进入：自动在后台下载渲染库，失败则提示
  (async () => {
    const libs = await AI.getLibStatus();
    const allReady = libs.every(l => l.ready);
    if (!allReady) {
      // 静默下载
      try {
        const results = await AI.loadLibs(() => {});
        const failed = results.filter(r => !r.ok);
        if (failed.length === 0) {
          await AI.injectLibs();
        } else {
          // 有失败项，弹提示
          const failNames = failed.map(r => r.name).join('、');
          Utils.toast(`⚠️ 渲染库下载未完成（${failNames}），公式可能无法显示。可前往 设置 → 渲染库 手动重试。`);
        }
      } catch(e) {
        Utils.toast('⚠️ 渲染库下载失败，可前往 设置 → 渲染库 手动重试。');
      }
    }
  })();

  // ── 公告检测 ──────────────────────────────────────────────────────────
  (async function checkAnnouncement() {
    // 公告抓取：用 Gitee Contents API（返回JSON，支持跨域），再试 GitHub raw
    const GITEE_API = 'https://gitee.com/api/v5/repos/fly114514/Quiz-Box/contents/Announcement.txt';
    try {
      let text = null;
      const xhrGet = (url) => new Promise((res) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now(), true);
        xhr.timeout = 8000;
        xhr.onload  = () => (xhr.status === 200 && xhr.responseText) ? res(xhr.responseText) : res(null);
        xhr.onerror = () => res(null);
        xhr.ontimeout = () => res(null);
        xhr.send();
      });
      const apiResp = await xhrGet(GITEE_API);
      if (apiResp) {
        try {
          const obj = JSON.parse(apiResp);
          if (obj.content) {
            text = decodeURIComponent(escape(atob(obj.content.replace(/\n/g, ''))));
          }
        } catch(e) { text = null; }
      }
      if (!text) return; // 无公告，静默退出
      // 解析
      const timeMatch = text.match(/Release time[：:]\s*(.+)/);
      const showMatch = text.match(/Show time[：:]\s*(\d+)s/);
      const annMatch  = text.match(/Announcement[：:]\s*([\s\S]+)/);
      if (!timeMatch || !annMatch) return;
      const releaseTime = timeMatch[1].trim();
      const showSec = showMatch ? parseInt(showMatch[1]) : 0;
      const annContent = annMatch[1].trim();
      // 用 releaseTime 作为唯一 key，看是否已显示过
      const seenKey = 'ann_seen_' + releaseTime.replace(/\s+/g,'_');
      const alreadySeen = await DB.getMeta(seenKey);
      if (alreadySeen) return;
      // 显示公告弹窗
      const ov = document.createElement('div');
      ov.className = 'modal-overlay center';
      ov.style.zIndex = '9999';
      ov.innerHTML = `
        <div class="modal-dialog" style="max-width:320px">
          <div style="text-align:center;margin-bottom:10px"><div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#d97706);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(245,158,11,.35)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8.5c0 2.5-1.5 4.5-4 6l-2 1v3H8v-3L6 14C3.5 13 2 11 2 8.5a6 6 0 0 1 6-6h8a6 6 0 0 1 6 6z"/><line x1="12" y1="2" x2="12" y2="4"/></svg></div></div>
          <div class="modal-title" style="text-align:center;margin-bottom:4px">项目公告</div>
          <div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px">${Utils.esc(releaseTime)}</div>
          <div style="font-size:14px;color:var(--text2);line-height:1.8;white-space:pre-wrap;background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:16px">${Utils.esc(annContent)}</div>
          <button id="ann-close-btn" class="btn btn-primary btn-block" ${showSec>0?'disabled':''}>
            ${showSec>0?`知道了（${showSec}s）`:'知道了'}
          </button>
        </div>`;
      document.body.appendChild(ov);
      const btn = ov.querySelector('#ann-close-btn');
      if (showSec > 0) {
        let left = showSec;
        const timer = setInterval(() => {
          left--;
          if (left <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.textContent = '知道了';
          } else {
            btn.textContent = `知道了（${left}s）`;
          }
        }, 1000);
      }
      btn.onclick = async () => {
        await DB.setMeta(seenKey, true);
        Utils.closeModal(ov);
      };
    } catch(e) { /* 网络异常静默失败 */ }
  })();

  // 恢复主题设置
  const savedNoShuffle = await DB.getMeta('optNoShuffle');
  if (savedNoShuffle) State.optNoShuffle = true;
  const savedTheme = await DB.getMeta('darkMode');
  if (savedTheme) {
    State.darkMode = true;
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('meta[name="color-scheme"]').setAttribute('content', 'only dark');
    try { localStorage.setItem('quizapp_darkMode', 'true'); } catch(e){}
  }
  // 通知原生 App 当前主题（用于状态栏图标色）
  Utils.syncStatusBar(State.darkMode);

  // 自动深色模式：启动时检测一次，之后每分钟检测一次
  async function checkAutoDark() {
    const enabled = await DB.getMeta('autoDarkEnabled');
    if (!enabled) return;
    const start = await DB.getMeta('autoDarkStart') || '22:00';
    const end   = await DB.getMeta('autoDarkEnd')   || '07:00';
    const now = new Date();
    const cur = now.getHours() * 60 + now.getMinutes();
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    const s = sh * 60 + sm, e = eh * 60 + em;
    // 跨夜判断：start > end 时（如 22:00-07:00），cur>=s 或 cur<e 才是深色
    const shouldDark = s > e ? (cur >= s || cur < e) : (cur >= s && cur < e);
    if (shouldDark !== State.darkMode) Actions.toggleTheme();
  }
  checkAutoDark();
  setInterval(checkAutoDark, 60000);

  // 渲染首页
  await Pages.renderHome();

  // 后台：已登录则智能同步学习记录 + 检查题库同步
  if (State.lbUser) {
    setTimeout(async () => {
      await Actions.syncStatsFromCloud(true).catch(() => {});
      await Actions.syncStatsToCloud(true).catch(() => {});
      await Actions.checkQuizBankSync().catch(() => {});
    }, 2000);
  }

  // 添加popstate历史记录（防止物理返回键退出）
  history.pushState(null, '', location.href);
}

// 启动
main().catch(console.error);
// 原生 app 传入文件时的处理入口
window.handleIncomingFile = async function(jsonText) {
  try {
    const data = JSON.parse(jsonText);
    const existingQs = await DB.getAllQuestions();
    const existingKeys = new Set(existingQs.map(q => q.question.trim() + '||' + String(q.answer).trim()));
    let count = 0, skipped = 0;
    async function importQ(folder, q) {
      const key = (q.question||'').trim() + '||' + String(q.answer||'').trim();
      if (existingKeys.has(key)) { skipped++; return; }
      existingKeys.add(key);
      const answers = q.answers && q.answers.length ? q.answers : (q.answer ? [String(q.answer)] : []);
      await DB.saveQuestion({ folderId: folder.id, type: q.type||'填空', question: q.question||q.content||'',
        options: q.options, answer: String(q.answer||''), answers, explanation: q.explanation||'',
        note: q.note||'', wrongCount: q.wrongCount||0, rightCount: q.rightCount||0,
        srsLevel: q.srsLevel||0, srsInterval: q.srsInterval||0, srsEase: q.srsEase||2.5,
        srsNextReview: q.srsNextReview||null, srsLastReview: q.srsLastReview||null,
        weight: q.weight||1, starred: q.starred||false, createdAt: Date.now() });
      count++;
    }
    if (data.folders) {
      for (const f of data.folders) {
        const allFolders = await DB.getFolders();
        let folder = allFolders.find(x => x.name === f.name);
        if (!folder) { const id = await DB.saveFolder({ name: f.name, createdAt: Date.now() }); folder = { id, name: f.name }; }
        for (const q of (f.questions||[])) await importQ(folder, q);
      }
    } else if (data.questions) {
      const allFolders = await DB.getFolders();
      let folder = allFolders[0];
      if (!folder) { const id = await DB.saveFolder({ name: '导入题库', createdAt: Date.now() }); folder = { id }; }
      for (const q of data.questions) await importQ(folder, q);
    }
    // 询问是否替换学习记录
    const replaceStats3 = await Actions._askImportStats(data.globalStats);
    await Actions._applyImportStats(data.globalStats, replaceStats3);
    Utils.toast(skipped > 0
      ? `✅ 导入 ${count} 道，跳过 ${skipped} 道重复题${replaceStats3 ? '，学习记录已替换' : ''}`
      : `✅ 成功导入 ${count} 道题目${replaceStats3 ? '，学习记录已替换' : ''}`);
    await Nav.refreshHome();
  } catch(e) {
    Utils.toast('导入失败：文件格式有误');
    console.error(e);
  }
};
