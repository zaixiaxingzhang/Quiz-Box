    if (dsInput) dsInput.addEventListener('change', () => DB.setMeta('autoDarkStart', dsInput.value));
    if (deInput) deInput.addEventListener('change', () => DB.setMeta('autoDarkEnd', deInput.value));
    // 异步加载自动深色设置后更新 UI
    (async () => {
      const enabled = await DB.getMeta('autoDarkEnabled') || false;
      const start   = await DB.getMeta('autoDarkStart') || '22:00';
      const end     = await DB.getMeta('autoDarkEnd')   || '07:00';
      const tog = document.getElementById('auto-dark-toggle');
      const timeSec = document.getElementById('auto-dark-time');
      if (tog) {
        tog.dataset.on = enabled ? '1' : '0';
        tog.style.background = enabled ? 'var(--accent)' : 'var(--border)';
        tog.querySelector('div').style.left = enabled ? '21px' : '3px';
      }
      if (timeSec) timeSec.style.display = enabled ? 'block' : 'none';
      if (dsInput) dsInput.value = start;
      if (deInput) deInput.value = end;
    })();
    content.querySelector('#copy-prompt-btn')?.addEventListener('click', () => {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(promptFull).then(() => Utils.toast('✅ 提示词已复制，粘贴给 AI 即可'));
      } else {
        Utils.toast('请长按选中提示词手动复制');
      }
    });



    // 云端同步状态
    (async () => {
      const sub = content.querySelector('#sync-stats-time');
      if (!sub) return;
      if (!State.lbUser) { sub.textContent = '请先登录排行榜账号'; return; }
      const lastSync = await DB.getMeta('lastStatsSyncTime');
      const skipSync = await DB.getMeta('skipCloudSync');
      if (lastSync) {
        const d = new Date(lastSync);
        sub.textContent = `上次同步：${d.toLocaleString('zh')}${skipSync ? ' · 已暂停自动同步' : ''}`;
      } else {
        sub.textContent = skipSync ? '已暂停自动同步，点击手动上传' : '已登录，点击上传本地记录';
      }
    })();

    // AI 状态摘要
    (async () => {
      const sub = content.querySelector('#ai-status-sub');
      if (!sub) return;
      const cfg = await AI.getConfig();
      if (!cfg.on) sub.textContent = '未开启';
      else if (!cfg.url || !cfg.key || !cfg.model) sub.textContent = 'API 未配置';
      else sub.textContent = `已就绪 · ${cfg.model.split('/').pop()}`;
    })();

    // 渲染库状态 + 点击管理
    (async () => {
      const sub = content.querySelector('#lib-status-sub');
      const row = content.querySelector('#render-libs-row');
      if (!sub || !row) return;
      const libs = await AI.getLibStatus();
      const allReady = libs.every(l => l.ready);
      const readyCount = libs.filter(l => l.ready).length;
      sub.textContent = allReady ? `✅ 已就绪（${readyCount}/${libs.length}）` : `⬜ 未完全加载（${readyCount}/${libs.length}）`;
      sub.style.color = allReady ? 'var(--success)' : 'var(--warn)';

      row.onclick = () => Actions._showRenderLibsManager();
    })();

    return el;
  },

  /* =====================================================
     搜索页
     ===================================================== */
  renderSearch(params) {
    const el = Pages.createPage('搜索');
    // 搜索栏
    const searchDiv = document.createElement('div');
    searchDiv.className = 'search-bar';
    searchDiv.innerHTML = `
      <div class="search-input-wrap">
        ${Icons.search}
        <input type="text" placeholder="搜索题目、选项、解析、笔记..." id="global-search" autofocus>
        <button class="search-clear" id="global-search-clear" style="display:none">${Icons.close}</button>
      </div>
      <div style="display:flex;gap:6px;padding:8px 0 2px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch">
        <button class="filter-chip active" data-sf="all" style="flex-shrink:0">全部</button>
        <button class="filter-chip" data-sf="question" style="flex-shrink:0">题目</button>
        <button class="filter-chip" data-sf="option" style="flex-shrink:0">选项</button>
        <button class="filter-chip" data-sf="explanation" style="flex-shrink:0">解析</button>
        <button class="filter-chip" data-sf="note" style="flex-shrink:0">笔记</button>
      </div>`;
    el.appendChild(searchDiv);
    const content = document.createElement('div');
    content.className = 'page-content';
    el.appendChild(content);

    content.innerHTML = `<div class="empty-state"><div style="color:var(--text3)">${Icons.search}</div><div class="empty-sub">输入关键词搜索题目</div></div>`;

    const searchInput = searchDiv.querySelector('#global-search');
    const clearBtn = searchDiv.querySelector('#global-search-clear');

    let searchLimit = 50;
    let lastResults = [];

    let searchField = 'all'; // 搜索范围
    async function doSearch(query) {
      if (!query) {
        content.innerHTML = `<div class="empty-state"><div style="color:var(--text3)">${Icons.search}</div><div class="empty-sub">输入关键词搜索题目</div></div>`;
        return;
      }
      const allQs = await DB.getAllQuestions();
      const q = query.toLowerCase();
      lastResults = allQs.filter(x => {
        try {
          if (searchField === 'question')    return x.question && x.question.toLowerCase().includes(q);
          if (searchField === 'option')      return x.options && x.options.some(o => o && o.toLowerCase().includes(q));
          if (searchField === 'explanation') return x.explanation && x.explanation.toLowerCase().includes(q);
          if (searchField === 'note')        return x.note && x.note.toLowerCase().includes(q);
          // all
          return (x.question && x.question.toLowerCase().includes(q)) ||
            (x.answer && String(x.answer).toLowerCase().includes(q)) ||
            (x.explanation && x.explanation.toLowerCase().includes(q)) ||
            (x.note && x.note.toLowerCase().includes(q)) ||
            (x.options && x.options.some(o => o && o.toLowerCase().includes(q)));
        } catch(e) { return false; }
      });
      renderResults();
    }

    function renderResults() {
      if (!lastResults.length) {
        content.innerHTML = `<div class="empty-state"><div class="empty-title">无结果</div><div class="empty-sub">换个关键词试试</div></div>`;
        return;
      }
      const shown = lastResults.slice(0, searchLimit);
      const hasMore = lastResults.length > searchLimit;
      content.innerHTML = `
        <div style="display:flex;align-items:center;margin-bottom:10px">
          <span class="fs-13" style="color:var(--text3);flex:1">找到 ${lastResults.length} 条${hasMore?' · 显示前'+searchLimit+'条':''}</span>
          ${lastResults.length > 0 ? `<button id="gs-startall" style="font-size:13px;color:var(--accent);padding:4px 8px">全部练习</button>` : ''}
        </div>
        ${shown.map(q => Pages.renderQCard(q)).join('')}
        ${hasMore ? `<div id="search-more" style="text-align:center;padding:14px;color:var(--accent);font-size:14px;cursor:pointer">显示更多（还有 ${lastResults.length - searchLimit} 条）</div>` : ''}
      `;
      content.querySelector('#search-more')?.addEventListener('click', () => { searchLimit += 50; renderResults(); });
      content.querySelector('#gs-startall')?.addEventListener('click', () => {
        if (lastResults.length) Nav.push('quiz', { questions: lastResults, startIdx: 0, mode: 'practice' });
      });
      content.querySelectorAll('.q-card').forEach(card => {
        card.onclick = (e) => {
          if (e.target.closest('[onclick]')) return;
          const qid = +card.dataset.qid;
          const found = lastResults.find(q => q.id === qid);
          if (found) Actions._showQDetail(found, () => doSearch(searchInput.value.trim()));
        };
      });
    }

    searchInput.oninput = Utils.debounce((e) => {
      const v = e.target.value.trim();
      searchLimit = 50;
      clearBtn.style.display = v ? '' : 'none';
      doSearch(v);
    }, 300);
    clearBtn.onclick = () => { searchInput.value = ''; searchLimit = 50; clearBtn.style.display = 'none'; doSearch(''); };
    searchDiv.querySelectorAll('[data-sf]').forEach(btn => {
      btn.onclick = () => {
        searchDiv.querySelectorAll('[data-sf]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        searchField = btn.dataset.sf;
        searchLimit = 50;
        doSearch(searchInput.value.trim());
      };
    });
    if (params.query) { searchInput.value = params.query; doSearch(params.query); }
    return el;
  },

  /* =====================================================
     做题页面（核心模块）
     支持：practice / review / wrong / exam
     ===================================================== */
  renderQuiz(params) {
    const { questions: _rawQuestions, startIdx = 0, mode = 'practice', timeLimit = 0, hardMode = false } = params;
    // 困难模式：单选题展示为填空（不改原始数据，只在渲染时转换）
    const questions = hardMode ? _rawQuestions.map(q => {
      if (q.type !== '单选') return q;
      // 含"下列"字样的题目不适合填空（"下列哪项…"转填空意义不明确），保持选择题形式
      if (q.question && q.question.includes('下列')) return q;
      const ansIdx = (q.answer || 'A').charCodeAt(0) - 65;
      const ansText = q.options && q.options[ansIdx] != null ? q.options[ansIdx] : q.answer;
      return { ...q, _hardMode: true, type: '填空', answer: ansText, answers: [ansText], fillMode: 'exact', options: undefined };
    }) : _rawQuestions;
    const el = document.createElement('div');
    el.className = 'page';
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el._isQuizPage = true; // 标记为做题页，阻止 popstate 误触返回
    StudyTimer.start(); // 进入做题/考试页面开始计时

    let curIdx = startIdx;
    let answered = false;
    let userAnswer = null;
    let multiSelected = [];
    let answers = new Array(questions.length).fill(null); // 记录作答
    let examTimer = null;

    // 预生成每道选择题的选项乱序（键=原始字母，值=新字母）
    // 同时保存打乱后的 options 数组，避免每次渲染重新打乱
    // 选项乱序（如开启兼容模式则不乱序）
    const _noShuffle = State.optNoShuffle;
    const shuffledOpts = questions.map(q => {
      if (_noShuffle) return null;
      if ((q.type !== '单选' && q.type !== '多选') || !q.options || q.options.length < 2) return null;
      const indices = q.options.map((_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      const newOptions = indices.map(oi => q.options[oi]);
      const oldToNew = {};
      indices.forEach((oldIdx, newIdx) => {
        oldToNew[String.fromCharCode(65 + oldIdx)] = String.fromCharCode(65 + newIdx);
      });
      return { options: newOptions, oldToNew };
    });
    let examSecLeft = timeLimit * 60;
    let examStartTime = Date.now();

    const isExam = mode === 'exam';
    const modeLabel = { practice:'练习', review:'学习', wrong:'错题练习', exam:'考试' }[mode] || '练习';

    // AppBar
    const appbar = document.createElement('div');
    appbar.className = 'appbar';
    appbar.innerHTML = `
      <button class="appbar-btn" onclick="this.closest('.page')._quit()">${Icons.close}</button>
      <span class="appbar-title">${modeLabel}</span>
      <div class="appbar-actions" id="quiz-appbar-right">
        ${isExam && timeLimit > 0 ? `<div class="exam-timer" id="exam-timer">${Icons.clock}<span id="timer-text">${Utils.fmtTime(examSecLeft)}</span></div>` : ''}
      </div>
    `;
    el.appendChild(appbar);

    // 进度条
    const progressDiv = document.createElement('div');
    progressDiv.className = 'quiz-header';
    progressDiv.innerHTML = `
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quiz-progress" style="width:${(curIdx+1)/questions.length*100}%"></div>
      </div>
      <span class="quiz-count" id="quiz-count">${curIdx+1}/${questions.length}</span>
    `;
    el.appendChild(progressDiv);

    // 题目区域
    const body = document.createElement('div');
    body.className = 'quiz-body';
    el.appendChild(body);

    // 底部操作栏
    const footer = document.createElement('div');
    footer.className = 'quiz-footer';
    el.appendChild(footer);

    async function renderQ() {
      const q = questions[curIdx];
      if (!q) return;
      // 考试模式：答案永远不"锁定"，直到点击提交考试
      answered = isExam ? false : answers[curIdx] !== null;
      userAnswer = answers[curIdx];

      // 更新进度（用 el.querySelector 而非 document.getElementById，兼容页面未挂载时）
      const progressFill = el.querySelector('#quiz-progress');
      const countEl = el.querySelector('#quiz-count');
      if (progressFill) progressFill.style.width = `${(curIdx+1)/questions.length*100}%`;
      if (countEl) countEl.textContent = `${curIdx+1}/${questions.length}`;

      // 预加载带图题图片（如果尚未缓存）
      if (q.image) await Utils.preloadImage(q.image);
      const typeColors = { '单选':'var(--accent)', '判断':'var(--success)', '填空':'var(--warn)' };
      let qBody = '';
      // 多选题：userAnswer 存为字母数组
      multiSelected = (q.type === '多选' && Array.isArray(userAnswer)) ? [...userAnswer] : [];

      if (q.type === '单选') {
        const sh = shuffledOpts[curIdx];
        const opts = sh ? sh.options : (q.options || []);
        // 映射：如果有打乱，正确答案字母也要换算
        const correctLetter = sh ? (sh.oldToNew[q.answer] || q.answer) : q.answer;
        const displayAnswer = sh ? (sh.oldToNew[userAnswer] || userAnswer) : userAnswer;
        qBody = `<div class="option-list">
          ${opts.map((o, i) => {
            const letter = String.fromCharCode(65+i);
            let cls = '';
            if (isExam) {
              if (letter === displayAnswer) cls = 'selected';
            } else if (answered) {
              if (letter === correctLetter) cls = 'correct';
              else if (letter === displayAnswer && displayAnswer !== correctLetter) cls = 'wrong';
            } else if (letter === displayAnswer) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${letter}">
              <div class="option-letter">${letter}</div>
              <div class="option-text">${AI.renderFull(o)}</div>
              ${!isExam && answered && letter === correctLetter ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else if (q.type === '多选') {
        const sh = shuffledOpts[curIdx];
        const opts = sh ? sh.options : (q.options || []);
        // 正确答案字母集合（映射到打乱后的字母）
        const origCorrect = Array.isArray(q.answer) ? q.answer : (q.answer||'').split('').filter(ch => /[A-Z]/.test(ch));
        const correctLetters = sh ? origCorrect.map(l => sh.oldToNew[l] || l) : origCorrect;
        // 用户已选（存的是原始字母，显示时转换）
        const displaySelected = sh
          ? multiSelected.map(l => sh.oldToNew[l] || l)
          : multiSelected;
        // userChose check should use displaySelected (already converted above)
        qBody = `

          <div class="option-list" id="multi-opts">
          ${opts.map((o, i) => {
            const letter = String.fromCharCode(65+i);
            const isCorrectOpt = correctLetters.includes(letter);
            const displayAns = sh && Array.isArray(userAnswer)
              ? userAnswer.map(l => sh.oldToNew[l] || l)
              : userAnswer;
            const userChose = answered
              ? (Array.isArray(displayAns) ? displayAns.includes(letter) : (displayAns||'').includes(letter))
              : displaySelected.includes(letter);
            let cls = '';
            if (answered) {
              if (isCorrectOpt) cls = 'correct';
              else if (userChose) cls = 'wrong';
            } else if (userChose) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${letter}" style="position:relative">
              <div class="option-letter">${letter}</div>
              <div class="option-text">${AI.renderFull(o)}</div>
              ${answered && isCorrectOpt ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
          </div>`;
      } else if (q.type === '判断') {
        const opts = ['正确', '错误'];
        qBody = `<div class="option-list">
          ${opts.map(o => {
            let cls = '';
            if (isExam) {
              if (o === userAnswer) cls = 'selected';
            } else if (answered) {
              if (o === q.answer) cls = 'correct';
              else if (o === userAnswer && userAnswer !== q.answer) cls = 'wrong';
            } else if (o === userAnswer) cls = 'selected';
            return `<div class="option-item ${cls}" data-letter="${o}">
              <div class="option-letter">${o === '正确' ? '✓' : '✗'}</div>
              <div class="option-text">${o}</div>
              ${!isExam && answered && o === q.answer ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else {
        // 填空题
        const fillCorrect = answered ? isCorrect(q, userAnswer) : false;
        const fillSkipped = answered && userAnswer === '__skipped__';
        const allAnswers = q.answers && q.answers.length ? q.answers : [q.answer];
        qBody = `
          <div class="fill-input-wrap">
            <input class="fill-input" id="fill-answer" placeholder="输入你的答案..."
              value="${answered ? (userAnswer === '__skipped__' ? '' : Utils.esc(userAnswer||'')) : ''}"
              ${answered ? 'readonly' : ''}>
          </div>
          ${answered ? `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
              <span class="tag ${fillCorrect ? 'tag-success' : fillSkipped ? 'tag-warn' : 'tag-danger'}">
                ${fillCorrect ? '✓ 正确' : fillSkipped ? '？ 不会做' : '✗ 错误'}
              </span>
            </div>
            <div style="background:var(--success-light);border-radius:10px;padding:12px;margin-bottom:8px">
              <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:6px">正确答案</div>
              ${allAnswers.map((a, i) => `
                <div style="font-size:15px;color:var(--text);${i>0?'margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,0.06)':''}">
                  ${i>0?`备选${i}：`:''}${AI.renderFull(a)}
                </div>`).join('')}
            </div>
          ` : ''}
        `;
      }

      // 搜题+笔记+AI按钮（答完或不会做后显示；考试模式答题中禁止，逐题查看时允许）
      const showSearch = answered && !isExam;
      const hasNote = q.note && q.note.trim();
      const aiCfg = await AI.getConfig();
      const showAI = (!isExam || el._viewMode) && answered && AI.isConfigured(aiCfg);
      body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="quiz-type-badge" style="margin-bottom:0">${q.type}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
            ${showSearch ? `<button id="quiz-note-btn" style="display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:12px;border:1px solid ${hasNote?'var(--warn)':'var(--border)'};background:${hasNote?'var(--warn-light)':'var(--surface2)'};color:${hasNote?'var(--warn)':'var(--text3)'}">✏️ ${hasNote?'查看笔记':'记笔记'}</button>` : ''}
            ${showSearch ? `<button id="quiz-search-btn" style="display:flex;align-items:center;gap:3px;color:var(--accent);font-size:12px;padding:3px 8px;border:1px solid var(--accent-light);border-radius:12px;background:var(--accent-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>&nbsp;搜题</button>` : ''}
            ${showAI ? `<button id="quiz-ai-btn" style="display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:12px;border:1px solid #8b5cf6;background:#f5f3ff;color:#7c3aed">🤖&nbsp;问AI</button>` : ''}
          </div>
        </div>
        <div class="quiz-question">${AI.renderFull(q.question)}</div>
        ${q.image && Utils.getImageSrc(q.image) ? `<div style="margin:6px 0 12px;text-align:center"><img src="${Utils.getImageSrc(q.image)}" onclick="Utils.showImageFullscreen(this.src)" style="max-width:100%;max-height:260px;border-radius:10px;object-fit:contain;cursor:zoom-in"></div>` : ''}
        ${qBody}
        ${answered && q.explanation ? `
          <div class="explanation-box">
            <div class="explanation-title">💡 解析</div>
            <div class="explanation-text rendered-content">${AI.renderFull(q.explanation)}</div>
          </div>` : ''}
      `;
      if (showSearch) {
        body.querySelector('#quiz-search-btn')?.addEventListener('click', () => {
          const searchUrl = 'https://www.baidu.com/s?wd=' + encodeURIComponent(q.question);
          if (window.AndroidBridge && window.AndroidBridge.openUrl) {
            window.AndroidBridge.openUrl(searchUrl);
          } else {
            window.open(searchUrl, '_blank');
          }
        });
        body.querySelector('#quiz-note-btn')?.addEventListener('click', () => {
          Actions._showNoteEditor(q, () => renderQ());
        });
      }
      if (showAI) {
        body.querySelector('#quiz-ai-btn')?.addEventListener('click', () => AI.showModal(q));
      }

      // 选项点击
      if (!answered || isExam) {
        body.querySelectorAll('.option-item').forEach(opt => {
          opt.onclick = () => {
            const displayLetter = opt.dataset.letter;
            const sh = shuffledOpts[curIdx];
            let letter = displayLetter;
            if (sh) {
              letter = Object.keys(sh.oldToNew).find(k => sh.oldToNew[k] === displayLetter) || displayLetter;
            }
            if (q.type === '多选') {
              if (multiSelected.includes(letter)) {
                multiSelected = multiSelected.filter(l => l !== letter);
                opt.classList.remove('selected');
              } else {
                multiSelected.push(letter);
                opt.classList.add('selected');
              }
              if (isExam) answers[curIdx] = [...multiSelected];
              renderFooter(); // 更新提交按钮状态
            } else if (isExam) {
              userAnswer = letter;
              answers[curIdx] = letter;
              body.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
            } else {
              if (answered) return;
              userAnswer = letter;
              body.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
              renderFooter();
            }
          };
        });
      }

      // 底部按钮
      renderFooter();
    }

    function renderFooter() {
      const isFirst = curIdx === 0;
      const isLast = curIdx === questions.length - 1;
      const q = questions[curIdx];
      const isMulti = q?.type === '多选';

      if (isExam) {
        footer.innerHTML = `
          <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._prev()" style="${isFirst?'opacity:0.4':''}">上一题</button>
          ${isLast
            ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._submitExam()">提交考试</button>`
            : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._next()">下一题</button>`}
        `;
      } else {
        footer.innerHTML = `
          <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._prev()" style="padding:10px 10px;font-size:13px;flex:0 0 auto;white-space:nowrap;${isFirst?'opacity:0.4':''}">上题</button>
          ${!answered
            ? (q?.type === '填空'
                ? `<button class="btn btn-outline" onclick="this.closest('.page')._skipQ()" style="color:var(--warn);border-color:var(--warn);padding:10px 12px;white-space:nowrap;flex:0 0 auto;margin-left:6px">不会做</button>
                   <button class="btn btn-primary flex-1" style="margin-left:6px" onclick="this.closest('.page')._submitFill()">提交</button>`
                : isMulti
                  ? `<button class="btn btn-outline" onclick="this.closest('.page')._skipQ()" style="color:var(--warn);border-color:var(--warn);padding:10px 12px;white-space:nowrap;flex:0 0 auto;margin-left:6px">不会做</button>
                     <button class="btn btn-primary flex-1" style="margin-left:6px" onclick="this.closest('.page')._submitMulti()" ${multiSelected.length===0?'disabled style="opacity:0.4"':''}>提交</button>`
                  : `<button class="btn btn-outline" onclick="this.closest('.page')._skipQ()" style="color:var(--warn);border-color:var(--warn);padding:10px 12px;white-space:nowrap;flex:0 0 auto;margin-left:6px">不会做</button>
                     <button class="btn btn-primary flex-1" style="margin-left:6px" onclick="this.closest('.page')._submitSingle()" ${!userAnswer?'disabled style="opacity:0.4"':''}>提交</button>`)
            : `<button class="btn btn-primary flex-1" style="margin-left:6px" onclick="this.closest('.page').${isLast ? '_finish' : '_next'}()">${isLast ? '完成' : '下一题'}</button>`
          }
        `;

    // 统一判断是否正确（支持多答案 q.answers 数组 或 单答案 q.answer）
    function isCorrect(q, ua) {
      if (!ua && ua !== 0) return false;
      if (ua === '__skipped__') return false;
      const ans = q.answers && q.answers.length ? q.answers : q.answer;
      if (q.type === '填空') return Utils.matchFill(ua, ans, q.fillMode || 'fuzzy');
      if (q.type === '多选') {
        // ua 是排序后的字母数组，q.answer 是字母字符串如 "ABC"
        const correctLetters = Array.isArray(q.answer)
          ? [...q.answer].sort().join('')
          : (q.answer||'').split('').filter(c=>/[A-Z]/.test(c)).sort().join('');
        const userLetters = Array.isArray(ua)
          ? [...ua].sort().join('')
          : (ua||'').split('').filter(c=>/[A-Z]/.test(c)).sort().join('');
        return userLetters === correctLetters;
      }
      if (Array.isArray(ans)) return ans.some(a => ua === a);
      return ua === ans;
    }

    async function submitAnswer() {
      const q = questions[curIdx];
      answered = true;
      answers[curIdx] = userAnswer; // userAnswer 已在点击时转为原始字母

      const skipped = userAnswer === '__skipped__';
      const correct = !skipped && isCorrect(q, userAnswer);

      // SM-2 SRS 更新 + 统计
      if (!isExam) {
        const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
        // grade: 5=轻松答对, 4=正确, 3=勉强对, 0=跳过/答错
        const grade = skipped ? 0 : correct ? 5 : 0;  // grade5=轻松答对→EF增大
        const srsResult = Utils.srsUpdate(freshQ, grade);
        Object.assign(freshQ, srsResult);
        // 只把 SRS 字段同步回 q（不覆盖 type/answer/options，防止破坏困难模式转换）
        ['srsLevel','srsInterval','srsEase','srsLastReview','srsNextReview','wrongCount','rightCount'].forEach(k => { q[k] = freshQ[k]; });
        await DB.saveQuestion(freshQ);

        const totalAnswered = ((await DB.getMeta('totalAnswered')) || 0) + 1;
        const totalRight = ((await DB.getMeta('totalRight')) || 0) + (correct && !skipped ? 1 : 0);
        const totalWrong = ((await DB.getMeta('totalWrong')) || 0) + (!correct || skipped ? 1 : 0);
        await DB.setMeta('totalAnswered', totalAnswered);
        await DB.setMeta('totalRight', totalRight);
        await DB.setMeta('totalWrong', totalWrong);

        const pts = (correct && !skipped) ? 2 : (skipped ? 0 : 1);  // 答对+2，答错+1，不会做+0
        const points = ((await DB.getMeta('points')) || 0) + pts;
        State.points = points;
        await DB.setMeta('points', points);
        // 立即更新摘要栏积分（不等DB读取）
        const summaryBar = document.querySelector('#home-root .summary-bar, .summary-bar');
        if (summaryBar) {
          const ptsEl = summaryBar.querySelector('.points-badge span');
          if (ptsEl) ptsEl.textContent = points;
        }
        Nav.refreshHome();
        Nav.refreshMine().catch(() => {});
      }
      renderQ();
      preloadNextImage();
    }

    // 考试提交
    async function submitExam() {
      if (examTimer) clearInterval(examTimer);
      const timeTaken = Math.floor((Date.now() - examStartTime) / 1000);
      let right = 0;
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const ua = answers[i];
        const correct = isCorrect(q, ua);
        if (correct) right++;
        const freshQ = (await DB.getAllQuestions()).find(x => x.id === q.id) || q;
        if (ua !== null && ua !== undefined) {
          const grade = correct ? 5 : 0;
          Object.assign(freshQ, Utils.srsUpdate(freshQ, grade));
          await DB.saveQuestion(freshQ);
        }
      }
      // 积分（统一规则：答对+2，答错+1，不会做+0）
      const examPoints = right * 2 + (questions.length - right) * 1;
      const points = ((await DB.getMeta('points')) || 0) + examPoints;
      State.points = points;
      await DB.setMeta('points', points);
      // 更新总统计
      const ta = questions.length;
      await DB.setMeta('totalAnswered', ((await DB.getMeta('totalAnswered'))||0) + ta);
      await DB.setMeta('totalRight', ((await DB.getMeta('totalRight'))||0) + right);
      await DB.setMeta('totalWrong', ((await DB.getMeta('totalWrong'))||0) + (ta - right));
      Nav.refreshHome();
      Nav.refreshMine().catch(() => {});
      // 显示成绩页
      showResult(right, questions.length, timeTaken, examPoints);
    }

    async function showResult(right, total, timeSec, pts, isPractice = false) {
      Actions.syncStatsToCloud(true).catch(() => {});
      const pct = Math.round(right / total * 100);
      const grade = pct >= 90 ? '🎉 优秀' : pct >= 75 ? '👍 良好' : pct >= 60 ? '😊 及格' : '💪 继续加油';

        folderCount[fname] = (folderCount[fname] || 0) + 1;

      const COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
      const folderBars = folderEntries.map(([name, cnt], i) => {
        const pct2 = Math.round(cnt / total * 100);
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
            <span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${Utils.esc(name)}</span>
            <span style="color:var(--text3)">${cnt}题 ${pct2}%</span>
          </div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct2}%;background:${COLORS[i%COLORS.length]};border-radius:3px"></div>
          </div>
        </div>`;
      }).join('');

      body.innerHTML = `
        <div class="result-score">
          <div class="result-circle" style="--pct:${pct}%">
            <div class="result-circle-inner">
              <div class="result-score-num">${pct}%</div>

          <div class="result-sub">${right}/${total} 题正确 · 用时 ${Utils.fmtTime(timeSec)}</div>
        </div>
        <div class="stat-card" style="margin:0 0 12px">
          <div class="stat-row"><span class="stat-label">答对</span><span class="stat-val text-success">${right} 题</span></div>
          <div class="stat-row"><span class="stat-label">答错</span><span class="stat-val text-danger">${total - right - skipped - unanswered} 题</span></div>
          ${skipped > 0 ? `<div class="stat-row"><span class="stat-label">不会做</span><span class="stat-val" style="color:var(--warn)">${skipped} 题</span></div>` : ''}
          ${unanswered > 0 ? `<div class="stat-row"><span class="stat-label">未答</span><span class="stat-val">${unanswered} 题</span></div>` : ''}
          ${!isPractice ? `<div class="stat-row"><span class="stat-label">本次获得积分</span><span class="stat-val"><span class="points-badge" style="font-size:14px">${Icons.coin}+${pts}</span></span></div>` : ''}
        </div>
        ${folderEntries.length > 1 ? `
          <div class="stat-card" style="margin:0 0 12px">
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px">📁 题库来源占比</div>
            ${folderBars}
          </div>` : ''}
      `;
      footer.innerHTML = `
        <button class="btn btn-outline flex-1" onclick="this.closest('.page')._quit()">返回首页</button>
        ${isPractice ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._restart()">再来一轮</button>` : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._reviewExam()">逐题查看</button>`}
      `;
      el._reviewExam = () => {
        curIdx = 0;
        el._viewMode = true;
        renderQView();
      };
      el._restart = async () => {
        const rp = params._restartParams;
        let newQuestions;
        if (rp) {
          // 从数据库重新抽取最新题目状态（SRS数据已更新）
          const freshAll = await DB.getAllQuestions();
          let pool = rp.folderIds && rp.folderIds.length
            ? freshAll.filter(q => rp.folderIds.includes(q.folderId))
            : freshAll;
          if (!pool.length) { Utils.toast('题目池为空'); return; }
          if (rp.sampleMode === 'custom' && rp.customCfg) {
            let combined = [];
            rp.customCfg.forEach(({ type, n }) => {
              if (!n) return;
              const tKey = { '单选题':'单选','多选题':'多选','判断题':'判断','填空题':'填空' };
              const tp = pool.filter(q => q.type === type || q.type === tKey[type]);
              combined.push(...[...tp].sort(() => Math.random()-0.5).slice(0, Math.min(n, tp.length)));
            });
            newQuestions = combined;
          } else {
            const count = Math.min(rp.count || 20, pool.length);
            newQuestions = Utils.weightedSample(pool, count, rp.sampleMode || 'srs');
          }
        } else {
          newQuestions = [..._rawQuestions].sort(() => Math.random() - 0.5);

        if (!newQuestions || !newQuestions.length) { Utils.toast('无法抽取题目'); return; }
        // 替换当前页面（移除当前页再推新页，避免多个结算界面堆叠）
        const nextParams = {
          questions: newQuestions,
          startIdx: 0,
          mode: params.mode || 'review',
          hardMode: rp?.hardMode || hardMode || false,
          _restartParams: rp
        };
        if (examTimer) { clearInterval(examTimer); examTimer = null; }
        const nextPage = Pages.renderQuiz(nextParams);
        if (State.pageStack.length) {
          State.pageStack[State.pageStack.length - 1] = { type: 'quiz', params: nextParams };
        }
        el.replaceWith(nextPage);
      };
    }

    // 查看模式（考试后逐题）
    async function renderQView() {
      const q = questions[curIdx];
      const ua = answers[curIdx];
      const sh_v = shuffledOpts[curIdx];
      // 对单选/多选，ua是打乱后的字母，需换算回原始字母再比对
      const uaOriginal = (sh_v && ua && q.type === '单选') ? (
        Object.entries(sh_v.oldToNew).find(([k,v]) => v === ua)?.[0] || ua
      ) : ua;
      const correct = uaOriginal === q.answer ||
        (q.type === '填空' && ua && Utils.matchFill(ua, q.answer)) ||
        (q.type === '多选' && sh_v && (() => {
          const origLetters = (Array.isArray(q.answer)?q.answer:(q.answer||'').split('').filter(c=>/[A-Z]/.test(c))).sort().join('');
          const uaLetters = (Array.isArray(ua)?ua:(ua||'').split('').filter(c=>/[A-Z]/.test(c)))
            .map(l => Object.entries(sh_v.oldToNew).find(([k,v])=>v===l)?.[0]||l).sort().join('');
          return origLetters === uaLetters;
        })());
      // 用 el.querySelector 避免 document.getElementById 在离屏时失效
      const pf = el.querySelector('#quiz-progress');
      const ce = el.querySelector('#quiz-count');
      if (pf) pf.style.width = `${(curIdx+1)/questions.length*100}%`;
      if (ce) ce.textContent = `${curIdx+1}/${questions.length}`;

      let qBody = '';
      if (q.type === '单选' || q.type === '判断') {
        // 用答题时的打乱顺序显示，保持和答题时一致
        const sh = shuffledOpts[curIdx];
        const rawOpts = q.type === '单选' ? (q.options || []) : ['正确', '错误'];
        const opts = (sh && q.type === '单选') ? sh.options : rawOpts;
        // 正确答案：转换成打乱后的字母
        const correctLetter = q.type === '判断' ? q.answer
          : (sh ? (sh.oldToNew[q.answer] || q.answer) : q.answer);
        qBody = `<div class="option-list">
          ${opts.map((o, i) => {
            const letter = q.type === '单选' ? String.fromCharCode(65+i) : o;
            let cls = '';
            if (letter === correctLetter) cls = 'correct';
            else if (letter === ua && ua !== correctLetter) cls = 'wrong';
            return `<div class="option-item ${cls}" style="pointer-events:none">
              <div class="option-letter">${q.type === '单选' ? letter : (o === '正确' ? '✓' : '✗')}</div>
              <div class="option-text">${AI.renderFull(o)}</div>
              ${letter === correctLetter ? `<div style="margin-left:auto;color:var(--success)">${Icons.check}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      } else {
        qBody = `
          <div style="margin-bottom:10px">
            <div class="tag ${correct ? 'tag-success' : (ua ? 'tag-danger' : 'tag-warn')}">
              ${ua ? (correct ? '✓ 正确' : '✗ 错误') : '未作答'}
            </div>
            ${ua ? `<div style="margin-top:8px;padding:12px;background:var(--bg2);border-radius:10px;font-size:15px">你的答案：${Utils.esc(ua)}</div>` : ''}
          </div>
          <div style="background:var(--success-light);border-radius:10px;padding:12px">
            <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:4px">正确答案</div>
            <div style="font-size:15px;color:var(--text)">${AI.renderFull(q.answer)}</div>
          </div>
        `;
      }

      const hasNote = q.note && q.note.trim();
      const viewAiCfg = await AI.getConfig();
      const showViewAI = AI.isConfigured(viewAiCfg);
      body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="quiz-type-badge" style="margin-bottom:0">${q.type}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
            <button id="view-note-btn" style="display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:12px;border:1px solid ${hasNote?'var(--warn)':'var(--border)'};background:${hasNote?'var(--warn-light)':'var(--surface2)'};color:${hasNote?'var(--warn)':'var(--text3)'}">✏️ ${hasNote?'查看笔记':'记笔记'}</button>
            <button id="view-search-btn" style="display:flex;align-items:center;gap:3px;color:var(--accent);font-size:12px;padding:3px 8px;border:1px solid var(--accent-light);border-radius:12px;background:var(--accent-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>&nbsp;搜题</button>
            ${showViewAI ? `<button id="view-ai-btn" style="display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;border-radius:12px;border:1px solid #8b5cf6;background:#f5f3ff;color:#7c3aed">🤖&nbsp;问AI</button>` : ''}
          </div>

        <div class="quiz-question">${AI.renderFull(q.question)}</div>
        ${q.image && Utils.getImageSrc(q.image) ? `<div style="margin:6px 0 12px;text-align:center"><img src="${Utils.getImageSrc(q.image)}" onclick="Utils.showImageFullscreen(this.src)" style="max-width:100%;max-height:260px;border-radius:10px;object-fit:contain;cursor:zoom-in"></div>` : ''}
        ${qBody}
        ${q.explanation ? `<div class="explanation-box"><div class="explanation-title">💡 解析</div><div class="explanation-text rendered-content">${AI.renderFull(q.explanation)}</div></div>` : ''}
      `;
      body.querySelector('#view-search-btn')?.addEventListener('click', () => {
        window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(q.question), '_blank');

      body.querySelector('#view-note-btn')?.addEventListener('click', () => {
        Actions._showNoteEditor(q, () => renderQView());

      if (showViewAI) {
        body.querySelector('#view-ai-btn')?.addEventListener('click', () => AI.showModal(q));
      }

      const isFirst = curIdx === 0, isLast = curIdx === questions.length - 1;
      footer.innerHTML = `
        <button class="btn btn-outline" ${isFirst?'disabled':''} onclick="this.closest('.page')._viewPrev()" style="${isFirst?'opacity:0.4':''}">上题</button>
        ${isLast
          ? `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._quit()">完成</button>`
          : `<button class="btn btn-primary flex-1" onclick="this.closest('.page')._viewNext()">下题</button>`}
      `;
      el._viewPrev = () => { if (curIdx > 0) { curIdx--; renderQView(); } };
      el._viewNext = () => { if (curIdx < questions.length - 1) { curIdx++; renderQView(); } };
    }

    // 方法绑定
    el._quit = () => {
      // 弹出确认对话框
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay center';
      overlay.innerHTML = `
        <div class="modal-dialog" style="max-width:300px;text-align:center">

          <div class="modal-title" style="margin-bottom:6px">退出做题？</div>

          <div style="display:flex;gap:10px">
            <button class="btn btn-outline flex-1" onclick="Utils.closeModal(this.closest('.modal-overlay'))">继续做题</button>

          </div>

      overlay.querySelector('#confirm-quit-btn').onclick = () => {
        // 直接执行页面移除，不走 Nav.pop()，避免弹窗关闭动画期间再次触发 _quit
        StudyTimer.stop();
        if (examTimer) clearInterval(examTimer);
        overlay.remove();
        // 直接触发页面退出动画
        const app = document.getElementById('app');
        const pages = app.querySelectorAll('.page');
        if (pages.length <= 1) return;
        State.pageStack.pop();
        const topEl = pages[pages.length - 1];
        const belowEl = pages[pages.length - 2];
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            topEl.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
            topEl.style.transform = 'translateX(100%)';
            // 恢复所有下层页面（不只是 belowEl），防止多级页面叠加时首页半透明
            const allPages = app.querySelectorAll('.page');
            allPages.forEach((p, i) => {
              if (p === topEl) return;
              p.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1)';
              p.style.transform = i === allPages.length - 2 ? 'translateX(0) scale(1)' : 'translateX(0) scale(1)';
              p.style.opacity = '1';
            });
            setTimeout(() => {
              topEl.remove();
              app.querySelectorAll('.page').forEach(p => { p.style.transition = ''; });
              Nav.refreshHome();
            }, 320);
          });
        });
      };
      document.body.appendChild(overlay);
    };
    el._prev = () => { if (curIdx > 0) { curIdx--; multiSelected = []; renderQ(); } };
    el._next = () => { if (curIdx < questions.length - 1) { const q = questions[curIdx]; if(q) delete q._aiHistory; curIdx++; multiSelected = []; renderQ(); } };
    // 预加载下一题图片，避免切题后才开始加载
    function preloadNextImage() {
      const nxt = questions[curIdx + 1];
      if (nxt && nxt.image) Utils.preloadImage(nxt.image).catch(()=>{});
    }
    el._submitFill = () => {
      const inp = el.querySelector('#fill-answer');
      if (!inp) return;
      userAnswer = inp.value.trim();
      if (!userAnswer) { Utils.toast('请输入答案'); return; }
      submitAnswer();
    };
    el._skipQ = () => {
      // 不会做 = 用空字符串作答，走 submitAnswer 流程显示解析，权重增加在 submitAnswer 里处理
      userAnswer = '__skipped__';
      submitAnswer();
    };
    el._submitSingle = () => {
      if (!userAnswer) { Utils.toast('请先选择答案'); return; }
      submitAnswer();
    };
    el._submitMulti = () => {
      if (!multiSelected.length) { Utils.toast('请至少选择一个选项'); return; }
      userAnswer = [...multiSelected].sort();
      submitAnswer();
    };
    el._submitExam = () => submitExam();
    el._finish = async () => {
      StudyTimer.stop();
      const timeTaken = Math.floor((Date.now() - examStartTime) / 1000);
      const right = answers.filter((a, i) => isCorrect(questions[i], a)).length;
      const pts = (await DB.getMeta('points')) || 0;
      showResult(right, questions.length, timeTaken, 0, true);
      // 自动尝试上传成绩到排行榜
      Actions.trySubmitScore().catch(() => {});
    };
    // 修正当前题目的答案（做题中发现答案有误时用）
    el._editAnswer = () => {
      const q = questions[curIdx];
      Actions.editAnswerInQuiz(q, () => {
        // 回调：刷新题目显示（用更新后的答案重新判断）
        const allDBQs = DB.getAllQuestions();
        allDBQs.then(dbqs => {
          const fresh = dbqs.find(x => x.id === q.id);
          if (fresh) Object.assign(q, fresh);
          renderQ();
        });
      });
    };

    // 考试计时器
    if (isExam && timeLimit > 0) {
      examTimer = setInterval(() => {
        examSecLeft--;
        const el2 = el.querySelector('#timer-text');
        if (el2) el2.textContent = Utils.fmtTime(examSecLeft);
        if (examSecLeft <= 0) { clearInterval(examTimer); submitExam(); }
      }, 1000);
    }

    // 暴露给外部（AI保存解析后立即刷新当前题）
    window._currentRenderQ = renderQ;
    renderQ();
    return el;
  },

  renderChecker(params) {
    const el = Pages.createPage('题库体检');
    const wrap = document.createElement('div');
    wrap.className = 'page-content';
    wrap.style.cssText = 'padding-bottom:40px';
    el.appendChild(wrap);

    // ── Drop zone ──
    wrap.innerHTML = `
      <div id="ck-dropzone" style="border:1.5px dashed var(--border);border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;background:var(--card);margin-bottom:4px;transition:border-color .2s;position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(129,140,248,.07) 0%,transparent 70%);pointer-events:none"></div>
        <div style="font-size:36px;margin-bottom:10px">🩺</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">拖拽题库文件到这里</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:18px">支持 .json 格式和带图题库 .zip 格式</div>
        <label style="display:inline-block;padding:9px 22px;border-radius:8px;background:#818cf8;color:#fff;font-size:14px;font-weight:600;cursor:pointer">
          选择文件 <input type="file" accept=".json,.zip" id="ck-file-input" style="display:none">
        </label>
      </div>
      <div id="ck-results"></div>`;

    const dropzone = wrap.querySelector('#ck-dropzone');
    const fileInput = wrap.querySelector('#ck-file-input');
    const results   = wrap.querySelector('#ck-results');

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor = 'var(--accent)'; });
    dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = ''; });
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.style.borderColor = '';
      if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

    async function processFile(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith('.zip')) {
        // zip 格式：解压找 data.json
        if (!window.JSZip) {
          Utils.toast('正在加载解压库...');
          await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
        }
        try {
          const zip = await JSZip.loadAsync(file);
          const paths = Object.keys(zip.files);
          const topNames = [...new Set(paths.map(p=>p.split('/')[0]))];
          let prefix = '';
          if (topNames.length===1 && zip.files[topNames[0]+'/']) prefix = topNames[0]+'/';
          const jsonEntry = zip.file(prefix+'data.json');
          if (!jsonEntry) { Utils.toast('zip 中未找到 data.json'); return; }
          const jsonText = await jsonEntry.async('text');
          // 收集图片文件名
          const imgPfx = prefix+'images/';
          const zipImgs = new Set(paths.filter(p=>!zip.files[p].dir&&p.startsWith(imgPfx)).map(p=>p.slice(imgPfx.length)).filter(Boolean));
          await analyze(JSON.parse(jsonText), file.name, file.size, zipImgs);
        } catch(e) { Utils.toast('zip 解析失败：'+e.message); }
      } else {
        const reader = new FileReader();
        reader.onload = async ev => {
          try { await analyze(JSON.parse(ev.target.result), file.name, file.size, null); }
          catch(e) { Utils.toast('JSON 解析失败，请确认文件格式'); }
        };
        reader.readAsText(file);
      }
    }

    function escH(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderIssueCard(issue) {
      const badgeClass = { red: 'ck-badge-red', yellow: 'ck-badge-yellow' }[issue.level] || 'ck-badge-yellow';
      const levelText  = { red: '错误', yellow: '警告' }[issue.level] || '';
      const uid = 'ckb' + Math.random().toString(36).slice(2);
      const preview = issue.items.slice(0, 150);
      const actionHtml = issue.actionHtml || '';
      return `
        <div class="ck-issue-card">
          <div class="ck-issue-header" data-body="${uid}">
            <span class="ck-badge ${badgeClass}">${levelText}</span>
            <span class="ck-issue-name">${escH(issue.name)}</span>
            ${actionHtml}
            <span style="font-family:monospace;font-size:13px;color:var(--text3)">${issue.count}</span>
            <span class="ck-chevron" data-chev="${uid}">›</span>
          </div>
          <div class="ck-issue-body" id="${uid}">
            <div class="ck-q-item" style="background:var(--surface2)" style="font-size:12px;color:var(--text2)">${escH(issue.desc)}</div>
            ${preview.map(item => `
              <div class="ck-q-item">
                <div class="ck-q-folder">${escH(item.folder||'')}</div>
                <div class="ck-q-text">${escH((item.text||'').length>80?(item.text||'').slice(0,80)+'…':(item.text||''))}</div>
                ${item.detail ? `<div class="ck-q-detail">${escH(item.detail)}</div>` : ''}
                <div>${(item.tags||[]).map(t=>`<span class="ck-tag ck-tag-${t.cls}">${escH(t.text)}</span>`).join('')}</div>
              </div>`).join('')}
            ${issue.items.length > 150 ? `<div class="ck-q-item" style="color:var(--text3);font-size:12px">…还有 ${issue.items.length-150} 条</div>` : ''}
          </div>
        </div>`;
    }

    async function analyze(data, filename, filesize, zipImgs = null) {
      let allQs = [];
      const folders = data.folders || (data.questions ? [{ name:'（默认）', questions: data.questions }] : []);
      for (const f of folders)
        for (const q of (f.questions||[]))
          allQs.push({...q, _folder: f.name});

      const total = allQs.length;
      const issues = [];

      // 1. 缺失答案
      const missingAnswer = allQs.filter(q => !q.answer || String(q.answer).trim() === '');
      if (missingAnswer.length) issues.push({
        id:'missing-answer', level:'red', name:'缺失答案', count:missingAnswer.length,
        desc:'这些题目的 answer 字段为空，将无法正常答题。',
        items: missingAnswer.map(q=>({ folder:q._folder, text:q.question, detail:'类型：'+(q.type||'未知'), tags:[{text:'无答案',cls:'red'}] }))
      });

      // 2. 题目文本为空
      const missingQuestion = allQs.filter(q => !q.question || String(q.question).trim() === '');
      if (missingQuestion.length) issues.push({
        id:'missing-question', level:'red', name:'题目文本为空', count:missingQuestion.length,
        desc:'题目 question 字段为空，通常是格式转换有误。',
        items: missingQuestion.map(q=>({ folder:q._folder, text:'（题目内容为空）', detail:'答案：'+(q.answer||'—'), tags:[{text:'无题目',cls:'red'}] }))
      });

      // 3. 选择题缺选项
      const missingOptions = allQs.filter(q =>
        (q.type==='单选'||q.type==='多选') && (!q.options||!Array.isArray(q.options)||q.options.length<2));
      if (missingOptions.length) issues.push({
        id:'missing-options', level:'red', name:'选择题缺少选项', count:missingOptions.length,
        desc:'单选题和多选题必须有至少 2 个选项。',
        items: missingOptions.map(q=>({ folder:q._folder, text:q.question, detail:'当前选项数：'+((q.options||[]).length), tags:[{text:q.type,cls:'yellow'},{text:'选项不足',cls:'red'}] }))
      });

      // 4. 答案字母越界
      const answerOutOfRange = allQs.filter(q => {
        if ((q.type!=='单选'&&q.type!=='多选')||!q.options) return false;
        const letters = (Array.isArray(q.answer)?q.answer:(q.answer||'').split('')).filter(c=>/[A-Z]/.test(c));
        return letters.some(l => l.charCodeAt(0)-65 >= q.options.length);
      });
      if (answerOutOfRange.length) issues.push({
        id:'answer-range', level:'red', name:'答案字母超出选项范围', count:answerOutOfRange.length,
        desc:'答案字母超过了实际选项数量，题目将永远答不对。',
        items: answerOutOfRange.map(q=>({ folder:q._folder, text:q.question, detail:'答案：'+q.answer+'，选项数：'+(q.options||[]).length, tags:[{text:q.type,cls:'yellow'},{text:'答案越界',cls:'red'}] }))
      });

      // 5. 判断题答案异常
      const JUDGE_OK = ['正确','错误','对','错','true','false','True','False'];
      const badJudge = allQs.filter(q => q.type==='判断' && q.answer && !JUDGE_OK.includes(String(q.answer).trim()));
      if (badJudge.length) issues.push({
        id:'bad-judge', level:'yellow', name:'判断题答案不规范', count:badJudge.length,
        desc:'判断题的 answer 建议为「正确」或「错误」。',
        items: badJudge.map(q=>({ folder:q._folder, text:q.question, detail:'当前答案：「'+q.answer+'」', tags:[{text:'判断',cls:'blue'},{text:'答案异常',cls:'yellow'}] }))
      });

      // 6. 题型异常
      const VALID_TYPES = ['单选','多选','判断','填空'];
      const badType = allQs.filter(q => !q.type || !VALID_TYPES.includes(q.type));
      if (badType.length) issues.push({
        id:'bad-type', level:'yellow', name:'题型字段缺失或未知', count:badType.length,
        desc:'题型（type）应为：单选、多选、判断、填空之一。',
        items: badType.map(q=>({ folder:q._folder, text:q.question, detail:'当前type：「'+(q.type||'（空）')+'」', tags:[{text:q.type||'无类型',cls:'yellow'}] }))
      });

      // 7. 重复题（每组只显示1条代表）
      const dupMap = new Map();
      for (const q of allQs) {
        const key = String(q.question).trim() + '|||' + String(q.answer).trim();
        if (!dupMap.has(key)) dupMap.set(key, []);
        dupMap.get(key).push(q);
      }
      const dupGroups = [...dupMap.values()].filter(g => g.length > 1);
      if (dupGroups.length) {
        const dupCount = dupGroups.reduce((s,g) => s+g.length-1, 0);
        window._ckDupGroups = dupGroups;
        window._ckData = data;
        window._ckFilename = filename;
        issues.push({
          id:'duplicate', level:'yellow',
          name:'重复题目', count:dupGroups.length,
          desc:'每组只展示代表题，括号内为多余条数。可点击右侧按钮一键导出去重文件。',
          actionHtml: `<button onclick="event.stopPropagation();Pages._checkerDeleteDups()" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--success);color:var(--success);background:transparent;cursor:pointer;flex-shrink:0;font-family:inherit">🗑️ 删重 (${dupCount}条)</button>`,
          items: dupGroups.map(g=>({ folder:g[0]._folder, text:g[0].question, detail:g.length+'条重复，多余'+(g.length-1)+'条', tags:[{text:g[0]._folder,cls:'gray'}] }))
        });
      }

      // 8. 题目过长
      const tooLong = allQs.filter(q => q.question && q.question.length > 500);
      if (tooLong.length) issues.push({
        id:'too-long', level:'yellow', name:'题目文本过长', count:tooLong.length,
        desc:'题目超过500字，可能混入了解析内容。',
        items: tooLong.map(q=>({ folder:q._folder, text:q.question.slice(0,60)+'…', detail:'字符数：'+q.question.length, tags:[{text:q.question.length+'字',cls:'yellow'}] }))
      });

      // 9. 选项内容为空
      const emptyOption = allQs.filter(q => q.options&&Array.isArray(q.options)&&q.options.some(o=>!o||String(o).trim()===''));
      if (emptyOption.length) issues.push({
        id:'empty-option', level:'yellow', name:'选项内容为空', count:emptyOption.length,
        desc:'部分选择题存在空字符串选项。',
        items: emptyOption.map(q=>({ folder:q._folder, text:q.question, detail:'选项：['+(q.options||[]).map(o=>o||'（空）').join(' / ')+']', tags:[{text:'空选项',cls:'yellow'}] }))
      });

      // 图片题检测
      const imgQs = allQs.filter(q => q.image);
      if (imgQs.length > 0) {
        const referencedImgs = new Set(imgQs.map(q => q.image));
        // 带图题总览（始终显示）
        issues.push({ id:'img-count', level:'yellow', name:'带图题统计',
          count: imgQs.length,
          desc: '共 ' + imgQs.length + ' 道带图题，引用了 ' + referencedImgs.size + ' 张不同图片' +
            (zipImgs !== null ? '；压缩包 images/ 目录共 ' + zipImgs.size + ' 张。' : '。'),
          items: imgQs.slice(0,50).map(q => ({ folder:q._folder, text:q.question, detail:'图片：'+q.image, tags:[{text:'带图',cls:'blue'}] }))
        });
        if (zipImgs !== null) {
          // zip 文件体检：与压缩包内的图片对比
          const missingImg = imgQs.filter(q => !zipImgs.has(q.image));
          if (missingImg.length) issues.push({
            id:'missing-img', level:'red', name:'zip 中图片文件缺失', count:missingImg.length,
            desc:'这些带图题在压缩包 images/ 目录中找不到对应图片。',
            items: missingImg.map(q=>({ folder:q._folder, text:q.question, detail:'图片名：'+q.image, tags:[{text:'图片缺失',cls:'red'}] }))
          });
          const unusedImgs = [...zipImgs].filter(n => !referencedImgs.has(n));
          if (unusedImgs.length) issues.push({
            id:'unused-img', level:'yellow', name:'zip 中多余图片', count:unusedImgs.length,
            desc:'压缩包 images/ 中有题目未引用的图片文件。',
            items: unusedImgs.map(n=>({ folder:'—', text:n, detail:'无题目引用', tags:[{text:'多余图片',cls:'yellow'}] }))
          });
        } else {
          // json 文件体检：与 IndexedDB 对比
          const allStoredImages = await DB.getAllImageNames();
          const storedSet = new Set(allStoredImages);
          const missingImg = imgQs.filter(q => !storedSet.has(q.image));
          if (missingImg.length) issues.push({
            id:'missing-img', level:'red', name:'图片文件缺失（DB）', count:missingImg.length,
            desc:'这些带图题在本地数据库中找不到对应图片，可重新导入 zip 恢复。',
            items: missingImg.map(q=>({ folder:q._folder, text:q.question, detail:'图片名：'+q.image, tags:[{text:'图片缺失',cls:'red'}] }))
          });
          const unusedImgs = allStoredImages.filter(n => !referencedImgs.has(n));
          if (unusedImgs.length) issues.push({
            id:'unused-img', level:'yellow', name:'数据库中多余图片', count:unusedImgs.length,
            desc:'数据库存储的图片文件没有任何题目引用，可以清理。',
            items: unusedImgs.map(n=>({ folder:'—', text:n, detail:'无题目引用', tags:[{text:'多余图片',cls:'yellow'}] }))
          });
        }
      }

      // 无解析（统计用）
      const noExp = allQs.filter(q => !q.explanation || !String(q.explanation).trim());

      const errorIssues = issues.filter(i=>i.level==='red').reduce((s,i)=>s+i.count,0);
      const warnIssues  = issues.filter(i=>i.level==='yellow').reduce((s,i)=>s+i.count,0);
      const score = total===0 ? 100 : Math.max(0, Math.round(100-(errorIssues/total*60)-(warnIssues/total*20)));
      const scoreColor = score>=90 ? '#22c55e' : score>=70 ? '#eab308' : '#ef4444';
      const scoreText  = score>=90 ? '健康' : score>=70 ? '需要关注' : '问题较多';
      const kb = filesize ? (filesize/1024).toFixed(1)+'KB' : '';

      // ── Render ──
      dropzone.style.display = 'none';
      results.innerHTML = `
        <div class="ck-file-bar">
          <span style="font-size:22px">📄</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(filename)}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:1px">${folders.length}个文件夹 · ${total}道题${kb?' · '+kb:''}</div>
          </div>
          <button onclick="this.closest('#ck-results').innerHTML='';document.getElementById('ck-dropzone').style.display=''"
            style="padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0">
            重新上传
          </button>
        </div>

        <div class="ck-summary-grid">
          <div class="ck-summary-card"><div class="ck-summary-num" style="color:var(--text)">${total}</div><div class="ck-summary-label">题目总数</div></div>
          <div class="ck-summary-card"><div class="ck-summary-num" style="color:#ef4444">${errorIssues}</div><div class="ck-summary-label">严重问题</div></div>
          <div class="ck-summary-card"><div class="ck-summary-num" style="color:#eab308">${warnIssues}</div><div class="ck-summary-label">警告</div></div>
          <div class="ck-summary-card"><div class="ck-summary-num" style="color:#3b82f6">${imgQs.length}</div><div class="ck-summary-label">带图题</div></div>
        </div>

        <div class="ck-health-wrap">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:14px;font-weight:600">题库健康度</span>
            <span style="font-family:monospace;font-size:22px;font-weight:700;color:${scoreColor}">${score}分</span>
          </div>
          <div class="ck-health-bar">
            <div class="ck-health-fill" id="ck-hfill" style="width:0%;background:${scoreColor}"></div>
          </div>
          <div style="font-size:12px;color:var(--text2)">${scoreText} · ${issues.length===0?'未发现任何问题':'发现'+issues.length+'类问题，共影响'+(errorIssues+warnIssues)+'道题'}</div>
        </div>

        ${issues.length===0 ? `
          <div style="text-align:center;padding:36px 16px;color:var(--text2)">
            <div style="font-size:44px;margin-bottom:10px">✅</div>
            <div style="font-size:17px;font-weight:700;color:#22c55e;margin-bottom:6px">题库状态良好！</div>
            <div style="font-size:13px">未发现任何格式或数据异常，可以放心使用。</div>
          </div>` : `
          <div class="ck-section-label">严重问题</div>
          ${issues.filter(i=>i.level==='red').map(renderIssueCard).join('')||'<div style="font-size:13px;color:var(--text3);padding:4px 0 8px">无严重问题 🎉</div>'}
          <div class="ck-section-label">警告</div>
          ${issues.filter(i=>i.level==='yellow').map(renderIssueCard).join('')||'<div style="font-size:13px;color:var(--text3);padding:4px 0 8px">无警告</div>'}
        `}

        <div class="ck-section-label">信息统计</div>
        <div class="ck-issue-card">
          <div class="ck-q-item" style="display:flex;justify-content:space-between">
            <span style="color:var(--text2)">无解析题目</span>
            <span style="font-family:monospace;color:var(--text3)">${noExp.length} / ${total}</span>
          </div>
          ${folders.map(f => {
            const fqs = allQs.filter(q=>q._folder===f.name);
            const types = {};
            fqs.forEach(q=>{ types[q.type||'未知']=(types[q.type||'未知']||0)+1; });
            return `<div class="ck-q-item">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="color:var(--text2)">${escH(f.name)}</span>
                <span style="font-family:monospace;color:var(--text3)">${fqs.length}题</span>
              </div>
              <div>${Object.entries(types).map(([t,n])=>`<span class="ck-tag ck-tag-gray">${t} ×${n}</span>`).join('')}</div>
            </div>`;
          }).join('')}
        </div>`;

      setTimeout(() => {
        const fill = results.querySelector('#ck-hfill');
        if (fill) fill.style.width = score + '%';
      }, 80);

      // Accordion toggles
      results.querySelectorAll('.ck-issue-header').forEach(header => {
        header.addEventListener('click', () => {
          const bodyId = header.dataset.body;
          const body   = results.querySelector('#' + bodyId);
          const chev   = header.querySelector('.ck-chevron');
          if (body)  body.classList.toggle('open');
          if (chev) chev.classList.toggle('open');
        });
      });
    }

    return el;
  },

  async _checkerDeleteDups() {
    const groups = window._ckDupGroups;
    const data   = window._ckData;
    if (!groups || !data) return;
    const dupCount = groups.reduce((s,g)=>s+g.length-1, 0);
    const ok = await Utils.confirm('一键删重',
      '将保留每组重复题的第1条，共删除 '+dupCount+' 条多余题目，导出为新文件。\n\n注意：此操作不修改当前题库，只生成新文件。',
      '导出去重后文件', false);
    if (!ok) return;
    const seenKeys = new Set();
    const cleanedData = {
      ...data,
      folders: (data.folders||[]).map(f => ({
        ...f,
        questions: (f.questions||[]).filter(q => {
          const key = String(q.question||'').trim()+'|||'+String(q.answer||'').trim();
          if (seenKeys.has(key)) return false;
          seenKeys.add(key); return true;
        })
      }))
    };
    const json = JSON.stringify(cleanedData, null, 2);
    const fname = (window._ckFilename||'题库').replace('.json','')+'-去重.json';
    const blob = new Blob([json], {type:'application/json'});
    if (navigator.share && navigator.canShare) {
      try {
        const file = new File([blob], fname, {type:'application/json'});
        if (navigator.canShare({files:[file]})) { await navigator.share({files:[file]}); return; }
      } catch(e) { if (e.name==='AbortError') return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    Utils.toast('✅ 已导出去重后的题库文件');
  },

};

  async _doLocalImportFile(file) {
    try {
      const text = await file.text();
      await Actions._processJsonImport(JSON.parse(text));
    } catch(e) { Utils.toast('导入失败，请检查文件格式'); console.error(e); }
