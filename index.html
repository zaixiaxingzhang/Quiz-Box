    const collapsedFolders = new Set(); // 记录折叠的父文件夹ID

    async function refresh() {
      const folders = await DB.getFolders();
      if (!folders.length) {
        content.innerHTML = `
          <div class="empty-state">
            ${Icons.folder.replace('width="24" height="24"','width="48" height="48"').replace('currentColor','var(--text3)')}
            <div class="empty-title">暂无文件夹</div>
            <div class="empty-sub">点击右下角 + 创建文件夹</div>
          </div>`;
        return;
      }
      const PRESET_COLORS = ['#EEF2FF','#F0FDF4','#FFF7ED','#FDF2F8','#F0FDFA','#FEF9C3','#F1F5F9'];
      const PRESET_DARK   = ['#1E1B4B','#052E16','#431407','#3B0764','#042F2E','#422006','#1E293B'];
      const allQsAll = await DB.getAllQuestions();

      // 构建树：parentId 为 null/undefined 是根，否则是子
      const rootFolders = folders.filter(f => !f.parentId);
      const childrenOf  = (pid) => folders.filter(f => f.parentId === pid);

      function renderFolderItem(f, depth) {
        const ci = folders.indexOf(f) % PRESET_COLORS.length;
        const bgLight = f.color || PRESET_COLORS[ci];
        const bgDark  = f.colorDark || PRESET_DARK[ci];
        const iconChar = f.icon || '';
        const qs = allQsAll.filter(q => q.folderId === f.id);
        const children = childrenOf(f.id);
        const hasChildren = children.length > 0;
        const collapsed = collapsedFolders.has(f.id);
        const isChild = depth > 0;

        function countAllQs(fid) {
          let n = allQsAll.filter(q => q.folderId === fid).length;
          childrenOf(fid).forEach(c => { n += countAllQs(c.id); });
          return n;
        }
        const childTotal = countAllQs(f.id) - qs.length;

        // 所有子文件夹统一缩进一次，不随深度叠加
        let html = `
          <div style="margin-bottom:6px;${isChild ? 'margin-left:18px;' : ''}">
            <div class="card" data-fid="${f.id}">
              <div class="card-row" onclick="Nav.push('folder',{folderId:${f.id}})" style="border-top:none">
                <div class="card-row-icon" style="background:${bgLight}" data-dark-bg="${bgDark}">
                  ${iconChar ? `<span style="font-size:18px;line-height:1">${Utils.esc(iconChar)}</span>`
                    : `<span style="color:${bgLight==='#F0FDF4'?'#16A34A':bgLight==='#FFF7ED'?'#EA580C':bgLight==='#FDF2F8'?'#A21CAF':bgLight==='#F0FDFA'?'#0D9488':'#4F46E5'}">${Icons.folder}</span>`}
                </div>
                <div class="card-row-content">
                  <div class="card-row-title">${Utils.esc(f.name)}${hasChildren ? `<span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:5px">(${children.length}子)</span>` : ''}</div>
                  <div class="card-row-sub">${qs.length} 题${childTotal > 0 ? ` · 子共 ${childTotal} 题` : ''}</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                  ${hasChildren ? `<button onclick="event.stopPropagation();window._bankToggle&&window._bankToggle(${f.id})" id="bank-tog-${f.id}" style="padding:4px;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:transform .2s;transform:rotate(${collapsed?'0deg':'90deg'})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>` : ''}
                  <button class="appbar-btn" style="width:36px;height:36px" data-fid="${f.id}" data-fname="${Utils.esc(f.name)}" onclick="event.stopPropagation();Actions.folderMenu(+this.dataset.fid,this.dataset.fname)">
                    ${Icons.more}
                  </button>
                  <div class="card-row-arrow">${Icons.chevron}</div>
                </div>
              </div>
            </div>
          </div>`;
        if (hasChildren) {
          html += `<div id="bank-children-${f.id}" style="display:${collapsed ? 'none' : 'block'}">`;
          for (const child of children) html += renderFolderItem(child, depth + 1);
          html += `</div>`;
        }
        return html;
      }

      let html = '<div class="section-title">所有文件夹</div>';
      for (const f of rootFolders) html += renderFolderItem(f, 0);
      // 孤立子文件夹（parentId 指向不存在的文件夹）
      const orphans = folders.filter(f => f.parentId && !folders.find(x => x.id === f.parentId));
      if (orphans.length) {
        html += '<div class="section-title" style="margin-top:12px">未分组</div>';
        for (const f of orphans) html += renderFolderItem(f, 0);
      }

      content.innerHTML = html;
      el._toggleFolder = window._bankToggle = (fid) => {
        const childWrap = document.getElementById(`bank-children-${fid}`);
        const tog = document.getElementById(`bank-tog-${fid}`);
        if (!childWrap) return;
        const hide = childWrap.style.display !== 'none';
        childWrap.style.display = hide ? 'none' : 'block';
        if (hide) collapsedFolders.add(fid); else collapsedFolders.delete(fid);
        if (tog) tog.style.transform = hide ? 'rotate(0deg)' : 'rotate(90deg)';
      };
      setTimeout(() => {
        document.querySelectorAll('[data-dark-bg]').forEach(el2 => {
          if (State.darkMode) el2.style.background = el2.dataset.darkBg;
        });
      }, 0);
    }
    el._refreshFn = refresh;
    refresh();
    return el;
  },

  /* =====================================================
     文件夹内容（题目列表）
     ===================================================== */
  renderFolder(params) {
    const { folderId } = params;
    const el = Pages.createPage('加载中...');
    let filterType = 'all'; // all / wrong / fav / 单选 / 判断 / 填空
    let batchMode = false;
    let batchSet = new Set();

    // 搜索栏
    const searchDiv = document.createElement('div');
    searchDiv.className = 'search-bar';
    searchDiv.innerHTML = `
      <div class="search-input-wrap">
        ${Icons.search}
        <input type="text" placeholder="搜索本文件夹..." id="folder-search">
        <button class="search-clear" id="search-clear-btn" style="display:none">${Icons.close}</button>
      </div>
      <div style="display:flex;gap:6px;padding:6px 0 2px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch">
        <button class="filter-chip active" data-ff="all" style="flex-shrink:0">全部</button>
        <button class="filter-chip" data-ff="question" style="flex-shrink:0">题目</button>
        <button class="filter-chip" data-ff="option" style="flex-shrink:0">选项</button>
        <button class="filter-chip" data-ff="explanation" style="flex-shrink:0">解析</button>
        <button class="filter-chip" data-ff="note" style="flex-shrink:0">笔记</button>
      </div>`;
    el.appendChild(searchDiv);

    // 过滤条
    const filterBar = document.createElement('div');
    filterBar.className = 'filter-bar';
    filterBar.id = 'folder-filter';
    el.appendChild(filterBar);

    // 批量操作栏（初始隐藏）
    const batchBarEl = document.createElement('div');
    batchBarEl.className = 'batch-bar';
    batchBarEl.style.display = 'none';
    el.appendChild(batchBarEl);

    // 内容
    const content = document.createElement('div');
    content.className = 'page-content';
    content.style.paddingBottom = '80px';
    el.appendChild(content);

    // FAB 添加题目
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = Icons.plus;
    fab.style.bottom = '24px';
    fab.style.zIndex = '100';
    fab.onclick = () => Nav.push('editQ', { folderId, qId: null });
    el.appendChild(fab);

    let allQs = [];
    let searchQuery = '';

    async function refresh() {
      // 获取文件夹信息
      const folders = await DB.getFolders();
      const folder = folders.find(f => f.id === folderId) || { name: '文件夹' };
      el.querySelector('.appbar-title').textContent = folder.name;

      allQs = await DB.getQuestions(folderId);
      render();
    }

    let displayLimit = 50; // 虚拟分页：每次最多显示50条

    function render() {
      // 过滤条渲染
      const filters = [
        { key: 'all', label: '全部' },
        { key: 'wrong', label: '错题' },
        { key: 'fav', label: '收藏' },
        { key: '单选', label: '单选' },
        { key: '判断', label: '判断' },
        { key: '填空', label: '填空' },
        { key: '多选', label: '多选' },
      ];
      filterBar.innerHTML = filters.map(f => `
        <div class="filter-chip${filterType===f.key?' active':''}" onclick="this.closest('.page')._setFilter('${f.key}')">
          ${f.label}
        </div>`).join('');

      // 过滤题目
      let qs = [...allQs];
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        qs = qs.filter(x => {
          try {
            if (folderSearchField === 'question')    return x.question && x.question.toLowerCase().includes(q);
            if (folderSearchField === 'option')      return x.options && x.options.some(o => o && o.toLowerCase().includes(q));
            if (folderSearchField === 'explanation') return x.explanation && x.explanation.toLowerCase().includes(q);
            if (folderSearchField === 'note')        return x.note && x.note.toLowerCase().includes(q);
            return (x.question && x.question.toLowerCase().includes(q)) ||
              (x.answer && String(x.answer).toLowerCase().includes(q)) ||
              (x.explanation && x.explanation.toLowerCase().includes(q)) ||
              (x.note && x.note && x.note.toLowerCase().includes(q)) ||
              (x.options && x.options.some(o => o && o.toLowerCase().includes(q)));
          } catch(e) { return false; }
        });
      }
      if (filterType === 'wrong') qs = qs.filter(x => (x.wrongCount||0) > 0 && !Pages._isMastered(x));
      else if (filterType === 'fav') qs = qs.filter(x => x.starred);
      else if (['单选','判断','填空','多选'].includes(filterType)) qs = qs.filter(x => x.type === filterType);

      // 批量模式操作栏
      if (batchMode) {
        fab.style.display = 'none';
        batchBarEl.style.display = 'flex';
        batchBarEl.innerHTML = `
          <span class="batch-bar-text">已选 ${batchSet.size} 题</span>
          <button class="batch-action-btn" onclick="this.closest('.page')._batchAll()">全选</button>
          <button class="batch-action-btn" onclick="this.closest('.page')._batchAction()">操作</button>
          <button class="batch-action-btn" onclick="this.closest('.page')._batchOff()">取消</button>
        `;
      } else {
        fab.style.display = '';
        batchBarEl.style.display = 'none';
      }

      if (!qs.length) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-title">${allQs.length?'无匹配题目':'暂无题目'}</div>
            <div class="empty-sub">${allQs.length?'尝试其他筛选条件':'点击右下角 + 添加题目'}</div>
          </div>`;
        return;
      }

      const shown = qs.slice(0, displayLimit);
      const hasMore = qs.length > displayLimit;

      // 用 innerHTML 渲染，但限制最多 displayLimit 条，避免大列表卡顿
      content.innerHTML = `
        <div class="flex-row" style="margin-bottom:10px">
          <span class="fs-13" style="color:var(--text3)">${qs.length} 题${hasMore?' · 显示前'+displayLimit+'条':''}</span>
          <div style="flex:1"></div>
          <button id="folder-batch-btn" style="font-size:13px;color:var(--accent);padding:4px 8px">批量操作</button>
          <button id="folder-startall-btn"
            style="font-size:13px;color:var(--accent2);padding:4px 8px;margin-left:4px">全部练习</button>
        </div>
        ${shown.map(q => Pages.renderQCard(q, batchMode, batchSet.has(q.id))).join('')}
        ${hasMore ? `<div id="load-more-btn" style="text-align:center;padding:14px;color:var(--accent);font-size:14px;cursor:pointer">显示更多（还有 ${qs.length - displayLimit} 条）</div>` : ''}
      `;

      const batchBtn = content.querySelector('#folder-batch-btn');
      if (batchBtn) batchBtn.onclick = () => { batchMode = true; render(); };
      const startAllBtn = content.querySelector('#folder-startall-btn');
      if (startAllBtn) startAllBtn.onclick = () => {
        if (qs.length) Nav.push('quiz', { questions: qs, startIdx: 0, mode: 'practice' });
      };
      const loadMoreBtn = content.querySelector('#load-more-btn');
      if (loadMoreBtn) loadMoreBtn.onclick = () => { displayLimit += 50; render(); };

      // 绑定点击事件
      content.querySelectorAll('.q-card').forEach(card => {
        const qid = +card.dataset.qid;
        card.onclick = (e) => {
          if (e.target.closest('.star-btn') || e.target.closest('[onclick]')) return;
          if (batchMode) {
            if (batchSet.has(qid)) batchSet.delete(qid); else batchSet.add(qid);
            render();
          } else {
            const q = allQs.find(x => x.id === qid);
            if (q) Actions._showQDetail(q, () => render());
          }
        };
        const starBtn = card.querySelector('.star-btn');
        if (starBtn) starBtn.onclick = async (e) => {
          e.stopPropagation();
          const q = allQs.find(x => x.id === qid);
          if (!q) return;
          q.starred = !q.starred;
          await DB.saveQuestion(q);
          starBtn.innerHTML = q.starred ? Icons.starFill : Icons.star;
          starBtn.className = 'star-btn' + (q.starred ? ' starred' : '');
          Utils.toast(q.starred ? '已收藏' : '已取消收藏');
        };
        let longPressTimer;
        card.addEventListener('touchstart', () => { longPressTimer = setTimeout(() => { batchMode = true; batchSet.add(qid); render(); }, 500); });
        card.addEventListener('touchend', () => clearTimeout(longPressTimer));
        card.addEventListener('touchmove', () => clearTimeout(longPressTimer));
      });
    }

    // 挂载方法供内联事件调用
    el._setFilter = (f) => { filterType = f; displayLimit = 50; render(); };
    el._batchOn = () => { batchMode = true; render(); };
    el._batchOff = () => { batchMode = false; batchSet.clear(); render(); };
    el._batchAll = () => { allQs.forEach(q => batchSet.add(q.id)); render(); };
    el._startAll = (ids) => {
      const qs = allQs.filter(q => ids.includes(q.id));
      if (qs.length) Nav.push('quiz', { questions: qs, startIdx: 0, mode: 'practice' });
    };
    el._batchAction = () => Actions.batchAction(folderId, [...batchSet], () => { batchMode = false; batchSet.clear(); refresh(); });
    el._refreshFn = refresh;

    // 搜索
    const searchInput = searchDiv.querySelector('#folder-search');
    const clearBtn = searchDiv.querySelector('#search-clear-btn');
    let folderSearchField = 'all';
    searchDiv.querySelectorAll('[data-ff]').forEach(btn => {
      btn.onclick = () => {
        searchDiv.querySelectorAll('[data-ff]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        folderSearchField = btn.dataset.ff;
        displayLimit = 50;
        render();
      };
    });
    searchInput.oninput = Utils.debounce((e) => {
      searchQuery = e.target.value.trim();
      displayLimit = 50;
      clearBtn.style.display = searchQuery ? '' : 'none';
      render();
    }, 300);
    clearBtn.onclick = () => { searchInput.value = ''; searchQuery = ''; displayLimit = 50; clearBtn.style.display = 'none'; render(); };
    searchDiv.querySelectorAll('[data-ff]').forEach(btn => {
      btn.onclick = () => {
        searchDiv.querySelectorAll('[data-ff]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        folderSearchField = btn.dataset.ff;
        displayLimit = 50;
        render();
      };
    });

    refresh();
    return el;
  },

  // 渲染题目卡片（列表中）
  renderQCard(q, batchMode = false, checked = false) {
    const typeColors = { '单选': 'tag-accent', '判断': 'tag-success', '填空': 'tag-warn' };
    return `
      <div class="q-card" data-qid="${q.id}">
        <div class="q-card-top">
          ${batchMode ? `<div class="checkbox-wrap${checked?' checked':''}"></div>` : ''}
          <div class="q-card-text">${Utils.esc(q.question)}</div>
          <button class="star-btn${q.starred?' starred':''}">
            ${q.starred ? Icons.starFill : Icons.star}
          </button>
        </div>
        <div class="q-card-footer">
          <div style="display:flex;gap:6px;align-items:center">
            <span class="tag ${typeColors[q.type]||'tag-neutral'}">${q.type}</span>
            ${q.wrongCount>0?`<span class="tag tag-danger">错${q.wrongCount}次</span>`:''}
            ${q.rightCount>0?`<span class="tag tag-success">对${q.rightCount}次</span>`:''}
            ${q.note?`<span class="tag tag-warn">✏️笔记</span>`:''}
            ${q.image?`<span class="tag tag-neutral">🖼️图片</span>`:''}
            ${q.srsLastReview?`<span class="tag tag-neutral" style="font-size:10px">上次:${new Date(q.srsLastReview).toLocaleDateString('zh')}</span>`:''}
          </div>
            
        </div>
      </div>`;
  },

  /* =====================================================
     编辑/新增题目
     ===================================================== */
  renderEditQ(params) {
    const { folderId, qId } = params;
    const el = Pages.createPage(qId ? '编辑题目' : '新增题目');
    const content = document.createElement('div');
    content.className = 'page-content';
    el.appendChild(content);

    let q = null;
    let qType = '填空';

    async function load() {
      if (qId) {
        const qs = await DB.getAllQuestions();
        q = qs.find(x => x.id === qId) || null;
        if (q) qType = q.type;
      }
      render();
    }

    function render() {
      // 题型列表，新增多选
      const types = ['单选', '多选', '判断', '填空'];
      const opts = q?.options || ['', ''];

      content.innerHTML = `
        <div class="card" style="padding:16px">
          <div class="form-group">
            <label class="form-label">题目类型</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${types.map(t => `
                <div class="filter-chip${qType===t?' active':''}" data-type="${t}">${t}</div>
              `).join('')}
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">题目内容</label>
            <textarea class="form-input form-textarea" id="q-question" placeholder="输入题目内容">${Utils.esc(q?.question||'')}</textarea>
          </div>

          ${qType === '单选' || qType === '多选' ? `
            <div class="form-group">
              <label class="form-label">
                选项
                <span style="color:var(--text3);font-weight:400;font-size:12px">（最多26个）</span>
              </label>
              <div id="options-list">
                ${opts.slice(0,26).map((o, i) => `
                  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px" data-opt-row="${i}">
                    <span style="width:22px;font-size:14px;color:var(--text3);font-weight:600;flex-shrink:0">${String.fromCharCode(65+i)}</span>
                    <input class="form-input" style="flex:1" placeholder="选项${String.fromCharCode(65+i)}" value="${Utils.esc(o)}" data-opt="${i}">
                    <button data-del-opt="${i}" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--danger);background:transparent;color:var(--danger);flex-shrink:0;display:flex;align-items:center;justify-content:center;${opts.length<=2?'opacity:0.3;pointer-events:none':''}">${Icons.close}</button>
                  </div>`).join('')}
              </div>
              <button id="add-opt-btn" style="color:var(--accent);font-size:14px;padding:4px 0${opts.length>=26?' ;opacity:0.3;pointer-events:none':''}">+ 添加选项</button>
            </div>
            <div class="form-group">
              <label class="form-label">
                正确答案
                ${qType==='多选'?'<span style="color:var(--text3);font-weight:400;font-size:12px">（可多选）</span>':''}
              </label>
              <div id="answer-options" style="display:flex;gap:8px;flex-wrap:wrap">
                ${opts.slice(0,26).map((_, i) => {
                  const letter = String.fromCharCode(65+i);
                  const sel = qType==='多选'
                    ? (Array.isArray(q?.answer) ? q.answer.includes(letter) : (q?.answer||'').split('').includes(letter))
                    : q?.answer === letter;
                  return `<div data-ans-letter="${letter}" class="filter-chip${sel?' active':''}" style="min-width:36px;text-align:center">${letter}</div>`;
                }).join('')}
              </div>
            </div>
          ` : qType === '判断' ? `
            <div class="form-group">
              <label class="form-label">正确答案</label>
              <div style="display:flex;gap:8px">
                <div data-judge="正确" class="filter-chip${q?.answer==='正确'?' active':''}" style="flex:1;justify-content:center">✓ 正确</div>
                <div data-judge="错误" class="filter-chip${q?.answer==='错误'?' active':''}" style="flex:1;justify-content:center">✗ 错误</div>
              </div>
            </div>
          ` : `
            <div class="form-group">
              <label class="form-label">正确答案 <span style="color:var(--text3);font-weight:400;font-size:12px">（可添加多个，任意匹配即算对）</span></label>
              <div id="fill-answers-list"></div>
              <button id="add-fill-ans-btn" style="color:var(--accent);font-size:14px;padding:4px 0;margin-top:4px">+ 添加备选答案</button>
            </div>
            <div class="form-group">
              <label class="form-label">判题方式</label>
              <div style="display:flex;gap:8px">
                <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer" id="fill-mode-fuzzy-row">
                  <input type="radio" name="fill-mode" value="fuzzy" ${(q?.fillMode||'fuzzy')==='fuzzy'?'checked':''} style="accent-color:var(--accent)">
                  <div>
                    <div style="font-size:13px;font-weight:500;color:var(--text)">关键词匹配</div>
                    <div style="font-size:11px;color:var(--text3)">允许标点/顺序差异</div>
                  </div>
                </label>
                <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer" id="fill-mode-exact-row">
                  <input type="radio" name="fill-mode" value="exact" ${q?.fillMode==='exact'?'checked':''} style="accent-color:var(--accent)">
                  <div>
                    <div style="font-size:13px;font-weight:500;color:var(--text)">精准匹配</div>
                    <div style="font-size:11px;color:var(--text3)">必须完全一致</div>
                  </div>
                </label>
              </div>
            </div>
          `}

          <div class="form-group">
            <label class="form-label">解析（选填）</label>
            <textarea class="form-input form-textarea" id="q-explanation" placeholder="输入解析说明">${Utils.esc(q?.explanation||'')}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">题目图片（选填）</label>
            ${q?.image ? `<div style="margin-bottom:8px;text-align:center"><img id="q-img-preview" src="${Utils.getImageSrc(q.image)}" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:contain"></div>` : '<div id="q-img-preview" style="display:none"></div>'}
            <div style="display:flex;gap:8px;align-items:center">
              <input class="form-input" id="q-image-name" placeholder="图片文件名（如 pic_01.jpg）" value="${Utils.esc(q?.image||'')}" style="flex:1">
              <button type="button" id="q-img-upload-btn" class="btn btn-outline" style="flex-shrink:0;padding:8px 12px;font-size:13px">📷 上传</button>
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:4px">上传后自动填写文件名，或手动输入已有图片名</div>
          </div>
          <div style="display:flex;gap:10px;margin-top:8px">
            <button class="btn btn-primary flex-1" id="save-q-btn">保存</button>
            ${qId ? `<button class="btn btn-danger" id="del-q-btn" style="padding:10px 16px">${Icons.trash}</button>` : ''}
          </div>
        </div>
      `;

      // ---- 绑定事件（全部用 addEventListener，不用 inline onclick）----

      // 切换题型
      content.querySelectorAll('[data-type]').forEach(chip => {
        chip.onclick = () => { qType = chip.dataset.type; render(); };
      });

      // 保存 / 删除
      content.querySelector('#save-q-btn').onclick = () => el._save();
      const delBtn = content.querySelector('#del-q-btn');
      if (delBtn) delBtn.onclick = () => el._delete();

      // ===== 单选/多选 =====
      if (qType === '单选' || qType === '多选') {
        const optList = content.querySelector('#options-list');
        const addOptBtn = content.querySelector('#add-opt-btn');
        const answerArea = content.querySelector('#answer-options');

        // 重新渲染答案选项区
        function refreshAnswerChips() {
          const inputs = [...optList.querySelectorAll('[data-opt]')];
          const n = inputs.length;
          answerArea.innerHTML = inputs.map((_, i) => {
            const letter = String.fromCharCode(65+i);
            return `<div data-ans-letter="${letter}" class="filter-chip" style="min-width:36px;text-align:center">${letter}</div>`;
          }).join('');
          // 重新绑定答案选择
          bindAnswerChips();
        }

        function bindAnswerChips() {
          answerArea.querySelectorAll('[data-ans-letter]').forEach(chip => {
            chip.onclick = () => {
              if (qType === '多选') {
                chip.classList.toggle('active');
              } else {
                answerArea.querySelectorAll('[data-ans-letter]').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
              }
            };
          });
        }
        bindAnswerChips();

        // 重新编号所有行
        function renumberOpts() {
          const rows = [...optList.querySelectorAll('[data-opt-row]')];
          rows.forEach((row, idx) => {
            row.setAttribute('data-opt-row', idx);
            row.querySelector('span').textContent = String.fromCharCode(65+idx);
            const inp = row.querySelector('[data-opt]');
            inp.setAttribute('data-opt', idx);
            inp.placeholder = `选项${String.fromCharCode(65+idx)}`;
            const delBtnOpt = row.querySelector('[data-del-opt]');
            delBtnOpt.setAttribute('data-del-opt', idx);
            delBtnOpt.style.opacity = rows.length <= 2 ? '0.3' : '1';
            delBtnOpt.style.pointerEvents = rows.length <= 2 ? 'none' : '';
          });
          addOptBtn.style.opacity = rows.length >= 26 ? '0.3' : '1';
          addOptBtn.style.pointerEvents = rows.length >= 26 ? 'none' : '';
          refreshAnswerChips();
        }

        // 删除选项
        optList.addEventListener('click', e => {
          const btn = e.target.closest('[data-del-opt]');
          if (!btn) return;
          const rows = optList.querySelectorAll('[data-opt-row]');
          if (rows.length <= 2) return;
          btn.closest('[data-opt-row]').remove();
          renumberOpts();
        });

        // 添加选项
        addOptBtn.onclick = () => {
          const rows = [...optList.querySelectorAll('[data-opt-row]')];
          if (rows.length >= 26) return;
          const n = rows.length;
          const div = document.createElement('div');
          div.setAttribute('data-opt-row', n);
          div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
          div.innerHTML = `
            <span style="width:22px;font-size:14px;color:var(--text3);font-weight:600;flex-shrink:0">${String.fromCharCode(65+n)}</span>
            <input class="form-input" style="flex:1" placeholder="选项${String.fromCharCode(65+n)}" data-opt="${n}">
            <button data-del-opt="${n}" style="color:var(--danger);padding:4px;flex-shrink:0">${Icons.close}</button>`;
          optList.appendChild(div);
          renumberOpts();
        };
      }

      // ===== 判断题 =====
      if (qType === '判断') {
        content.querySelectorAll('[data-judge]').forEach(chip => {
          chip.onclick = () => {
            content.querySelectorAll('[data-judge]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
          };
        });
      }

      // ===== 填空题 =====
      if (qType === '填空') {
        const fillList = content.querySelector('#fill-answers-list');
        const addFillBtn = content.querySelector('#add-fill-ans-btn');

        // 渲染已有答案行
        const initAnswers = q?.answers && q.answers.length ? q.answers : [q?.answer || ''];
        initAnswers.forEach((a, i) => addFillRow(a, i === 0));

        function addFillRow(val = '', isFirst = false) {
          const n = fillList.querySelectorAll('[data-fill-row]').length;
          const div = document.createElement('div');
          div.setAttribute('data-fill-row', n);
          div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
          div.innerHTML = `
            <input class="form-input" style="flex:1" placeholder="${n===0?'主答案':'备选答案'}" data-fill-ans="${n}" value="${Utils.esc(val)}">
            <button data-del-fill style="color:var(--danger);padding:4px;flex-shrink:0;${n===0?'opacity:0.3;pointer-events:none':''}">${Icons.close}</button>`;
          fillList.appendChild(div);
          // 删除按钮
          div.querySelector('[data-del-fill]').onclick = () => {
            if (n === 0) return;
            div.remove();
          };
        }

        addFillBtn.onclick = () => addFillRow();
      }
    }

    // 图片上传 — 持久隐藏 input，兼容 WebView 和浏览器
    const imgFileInput = document.createElement('input');
    imgFileInput.type = 'file';
    imgFileInput.accept = 'image/*';
    imgFileInput.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;width:1px;height:1px;pointer-events:none';
    el.appendChild(imgFileInput);
    imgFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      imgFileInput.value = '';
      if (!file) return;
      const imgName = file.name;
      await DB.saveImage(imgName, file);
      if (!State.imageCache) State.imageCache = new Map();
      if (State.imageCache.has(imgName)) URL.revokeObjectURL(State.imageCache.get(imgName));
      State.imageCache.set(imgName, URL.createObjectURL(file));
      const nameInput = content.querySelector('#q-image-name');
      if (nameInput) nameInput.value = imgName;
      const preview = content.querySelector('#q-img-preview');
      if (preview) { preview.src = State.imageCache.get(imgName); preview.style.display = 'block'; }
      Utils.toast('图片已上传：' + imgName);
    });
    // 每次 render() 后重新绑定上传按钮（因为 render 会重建 DOM）
    function bindImgUpload() {
      const btn = content.querySelector('#q-img-upload-btn');
      if (btn) btn.onclick = (e) => { e.stopPropagation(); e.preventDefault(); imgFileInput.click(); };
    }
    const _origRender = render;
    render = function() { _origRender(); bindImgUpload(); };

    el._setType = (t) => { qType = t; render(); };
    el._save = async () => {
      const question = content.querySelector('#q-question')?.value.trim();
      if (!question) { Utils.toast('请输入题目内容'); return; }

      let answer = '';
      let options = undefined;
      const explanation = content.querySelector('#q-explanation')?.value.trim() || '';

      if (qType === '单选' || qType === '多选') {
        options = [...content.querySelectorAll('[data-opt]')].map(i => i.value.trim()).filter(Boolean);
        if (options.length < 2) { Utils.toast('至少需要2个选项'); return; }
        const selected = [...content.querySelectorAll('[data-ans-letter].active')].map(c => c.dataset.ansLetter);
        if (!selected.length) { Utils.toast('请选择正确答案'); return; }
        answer = qType === '多选' ? selected.join('') : selected[0];
      } else if (qType === '判断') {
        const active = content.querySelector('[data-judge].active');
        if (!active) { Utils.toast('请选择正确答案'); return; }
        answer = active.dataset.judge;
      } else {
        // 填空题：读取多答案
        const fillAnswers = [...content.querySelectorAll('[data-fill-ans]')].map(i => i.value.trim()).filter(Boolean);
        if (!fillAnswers.length) { Utils.toast('请输入答案'); return; }
        const fillModeEl = content.querySelector('input[name="fill-mode"]:checked');
        const fillMode = fillModeEl ? fillModeEl.value : 'fuzzy';
        const fillData = {
          ...(q || { wrongCount: 0, rightCount: 0, weight: 1, starred: false }),
          folderId, type: qType, question,
          options: undefined, answer: fillAnswers[0], answers: fillAnswers,
          fillMode, explanation, image: (content.querySelector('#q-image-name')?.value.trim()||null), updatedAt: Date.now(),
        };
        if (qId) fillData.id = qId;
        await DB.saveQuestion(fillData);
        Utils.toast(qId ? '已保存' : '已添加');
        await Nav.pop(); return;
      }
      const saveData = {
        ...(q || { wrongCount: 0, rightCount: 0, weight: 1, starred: false }),
        folderId, type: qType, question,
        options, answer, explanation,
        image: (content.querySelector('#q-image-name')?.value.trim() || null),
        updatedAt: Date.now(),
      };
      if (qId) saveData.id = qId;
      await DB.saveQuestion(saveData);
      Utils.toast(qId ? '已保存' : '已添加');
      await Nav.pop();
    };
    el._delete = async () => {
      const qDelOk = await Utils.confirm('删除题目', '确定删除这道题目？不可恢复', '确认删除', true);
      if (!qDelOk) return;
      await DB.deleteQuestion(qId);
      Utils.toast('已删除');
      await Nav.pop();
    };

    load();
    return el;
  },

  /* =====================================================
     错题页
     ===================================================== */
  renderWrong(params) {
    const el = Pages.createPage('错题练习');
    const content = document.createElement('div');
    content.className = 'page-content';
    content.style.paddingBottom = '80px';
    el.appendChild(content);

    async function refresh() {
      const qs = await DB.getAllQuestions();
      // 错题：有过错误记录 且 未通过连续答对2次恢复
      const wrongQs = qs.filter(q => (q.wrongCount||0) > 0 && !Pages._isMastered(q))
        .sort((a,b) => b.wrongCount - a.wrongCount);
      if (!wrongQs.length) {
        content.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <div class="empty-title">太棒了！暂无错题</div>
            <div class="empty-sub">继续保持好成绩</div>
          </div>`;
        return;
      }
      content.innerHTML = `
        <div class="flex-row" style="margin-bottom:12px">
          <span class="fs-13" style="color:var(--text3)">${wrongQs.length} 道错题</span>
          <div style="flex:1"></div>
          <button class="btn btn-primary" style="padding:8px 16px;font-size:14px" id="wrong-start-btn">
            开始练习
          </button>
        </div>
        ${wrongQs.map(q => Pages.renderQCard(q)).join('')}
      `;
      // 用事件监听器而非内联JSON onclick（避免数据转义问题）
      const wrongStartBtn = content.querySelector('#wrong-start-btn');
      if (wrongStartBtn) wrongStartBtn.onclick = () => Nav.push('quiz', { questions: wrongQs, startIdx: 0, mode: 'wrong' });
      content.querySelectorAll('.q-card').forEach(card => {
        card.onclick = () => {
          const qid = +card.dataset.qid;
          const idx = wrongQs.findIndex(q => q.id === qid);
          Nav.push('quiz', { questions: wrongQs, startIdx: idx, mode: 'wrong' });
        };
      });
    }
    el._refreshFn = refresh;
    refresh();
    return el;
  },

  /* =====================================================
     复习模式设置页
     ===================================================== */
  renderReview(params) {
    const el = Pages.createPage('学习模式');
    const content = document.createElement('div');
    content.className = 'page-content';
    el.appendChild(content);

    // 全局引用仅用于兼容其他可能的调用，不依赖它启动
    window.addTypeRow = null;

    async function load() {
      const folders = await DB.getFolders();
      const allQs = await DB.getAllQuestions();
      content.innerHTML = `
        <div class="stat-card">
          ${(() => {
            const now = Date.now();
            const due = allQs.filter(q => q.srsNextReview && q.srsNextReview <= now).length;
            const fresh = allQs.filter(q => !q.srsNextReview).length;
            return `
              <div class="stat-row"><span class="stat-label">总题数</span><span class="stat-val">${allQs.length}</span></div>
              <div class="stat-row"><span class="stat-label">今日待复习</span><span class="stat-val text-danger">${due}</span></div>
              <div class="stat-row"><span class="stat-label">新题（未做过）</span><span class="stat-val">${fresh}</span></div>
              <div class="stat-row"><span class="stat-label">错题数</span><span class="stat-val text-danger">${allQs.filter(q=>q.wrongCount>0).length}</span></div>`;
          })()}
        </div>
        <div class="card">
          <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
            <span class="card-title">选择范围</span>
            <span style="font-size:13px;color:var(--accent);display:flex;gap:12px">
              <span style="cursor:pointer" onclick="document.querySelectorAll('[id^=fcb-]').forEach(cb=>{cb.classList.add('checked');window.reviewSelected.add(+cb.id.replace('fcb-',''))})">全选</span>
              <span style="cursor:pointer" onclick="document.querySelectorAll('[id^=fcb-]').forEach(cb=>{cb.classList.remove('checked');window.reviewSelected.delete(+cb.id.replace('fcb-',''))})">全不选</span>
            </span>
          </div>
          <div id="folder-select-list">
            ${(() => {
              function renderSelFolder(f, depth) {
                const kids = folders.filter(x => x.parentId === f.id);
                const hasKids = kids.length > 0;
                const qs = allQs.filter(q => q.folderId === f.id);
                const ci = folders.indexOf(f) % 5;
                const isChild = depth > 0;
                function totalKidsQs(fid) {
                  let n = allQs.filter(q => q.folderId === fid).length;
                  folders.filter(x => x.parentId === fid).forEach(c => { n += totalKidsQs(c.id); });
                  return n;
                }
                const childQs = totalKidsQs(f.id) - qs.length;
                return `
                  <div style="${isChild ? 'margin-left:18px;' : ''}">
                    <div class="card-row" style="padding-top:10px;padding-bottom:10px" onclick="window.toggleFolder(${f.id})">
                      ${Pages._renderFolderIcon(f, folders)}
                      <div class="card-row-content">
                        <div class="card-row-title">${Utils.esc(f.name)}${hasKids ? `<span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:5px">(${kids.length}子)</span>` : ''}</div>
                        <div class="card-row-sub">${qs.length} 题${childQs > 0 ? ` · 子共 ${childQs} 题` : ''}</div>
                      </div>
                      ${hasKids ? `<button onclick="event.stopPropagation();window.toggleSelCollapse(${f.id})" id="sel-tog-${f.id}" style="padding:4px;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:transform .2s;transform:rotate(0deg);margin-right:6px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>` : ''}
                      <div class="checkbox-wrap checked" id="fcb-${f.id}"></div>
                    </div>
                  </div>
                  ${hasKids ? `<div id="sel-children-${f.id}" style="display:none">${kids.map(k => renderSelFolder(k, depth + 1)).join('')}</div>` : ''}
                `;
              }
              return folders.filter(f => !f.parentId).map(f => renderSelFolder(f, 0)).join('');
            })()}
          </div>
        </div>
        <div class="card" style="padding:16px">
          <div class="form-group">
            <label class="form-label">每次题数</label>
            <input class="form-input" type="number" id="review-count" value="${await DB.getMeta('lastReviewCount') || 20}" min="1" max="9999">
          </div>
          <div class="form-group">
            <label class="form-label">抽题模式</label>
            <div style="display:flex;flex-direction:column;gap:8px">
              <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius3);cursor:pointer" id="mode-weighted-row">
                <input type="radio" name="sample-mode" value="srs" ${(await DB.getMeta('lastSampleMode')||'srs')==='srs'?'checked':''} style="margin-top:2px;accent-color:var(--accent)">
                <div>
                  <div style="font-size:14px;font-weight:500;color:var(--text)">SRS（间隔重复）</div>
                  <div style="font-size:12px;color:var(--text3);margin-top:2px">答错多的题优先出现，已学会的题少出现</div>
                </div>
              </label>
              <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius3);cursor:pointer" id="mode-unseen-row">
                <input type="radio" name="sample-mode" value="unseen" ${(await DB.getMeta('lastSampleMode')||'srs')==='unseen'?'checked':''} style="margin-top:2px;accent-color:var(--accent)">
                <div>
                  <div style="font-size:14px;font-weight:500;color:var(--text)">新题优先</div>
                  <div style="font-size:12px;color:var(--text3);margin-top:2px">未做过的题优先出现，保证覆盖所有题目</div>
                </div>
              </label>
              <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius3);cursor:pointer" id="mode-custom-row">
                <input type="radio" name="sample-mode" value="custom" ${(await DB.getMeta('lastSampleMode')||'srs')==='custom'?'checked':''} style="margin-top:2px;accent-color:var(--accent)">
                <div>
                  <div style="font-size:14px;font-weight:500;color:var(--text)">自定义题型</div>
                  <div style="font-size:12px;color:var(--text3);margin-top:2px">按题型指定数量，随机抽取</div>
                </div>
              </label>
            </div>
          </div>
          <!-- 自定义题型配置（仅在选择"自定义题型"时显示） -->
          <div id="custom-type-config" style="display:none;margin-top:-4px">
            <div id="type-rows" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px"></div>
            <button onclick="window.addTypeRow&&window.addTypeRow()" style="width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:10px;background:transparent;color:var(--accent);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              添加题型
            </button>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px">
            <div>
              <div style="font-size:14px;font-weight:500;color:var(--text)">困难模式</div>
              <div style="font-size:12px;color:var(--text3);margin-top:2px">单选题变填空，需精准输入选项内容</div>
            </div>
            <div id="hard-mode-toggle" data-on="0" onclick="(function(t){const on=t.dataset.on!=='1';t.dataset.on=on?'1':'0';t.style.background=on?'var(--danger)':'var(--border)';t.querySelector('div').style.left=on?'21px':'3px'})(this)" style="width:44px;height:26px;border-radius:13px;background:var(--border);position:relative;transition:background 0.2s;flex-shrink:0;cursor:pointer">
              <div style="width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left 0.2s;pointer-events:none"></div>
            </div>
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:4px" id="start-review-btn">开始学习</button>
        </div>
      `;
      setTimeout(() => {
        content.querySelectorAll('[data-dark-bg]').forEach(el2 => {
          if (State.darkMode) el2.style.background = el2.dataset.darkBg;
        });
      }, 0);

      window.reviewSelected = new Set();
      // 默认全选
      folders.forEach(f => window.reviewSelected.add(f.id));
      window._reviewFolders = folders;
      window.toggleFolder = (id) => {
        const cb = document.getElementById(`fcb-${id}`);
        const nowSelected = !window.reviewSelected.has(id);
        if (nowSelected) { window.reviewSelected.add(id); cb && cb.classList.add('checked'); }
        else { window.reviewSelected.delete(id); cb && cb.classList.remove('checked'); }
        function syncDesc(pid) {
          (window._reviewFolders||[]).filter(f => f.parentId === pid).forEach(ch => {
            const ccb = document.getElementById(`fcb-${ch.id}`);
            if (nowSelected) { window.reviewSelected.add(ch.id); ccb && ccb.classList.add('checked'); }
            else { window.reviewSelected.delete(ch.id); ccb && ccb.classList.remove('checked'); }
            syncDesc(ch.id);
          });
        }
        syncDesc(id);
      };
      window.toggleSelCollapse = (fid) => {
        const ch = document.getElementById(`sel-children-${fid}`);
        const tog = document.getElementById(`sel-tog-${fid}`);
        if (!ch) return;
        const hide = ch.style.display !== 'none';
        ch.style.display = hide ? 'none' : '';
        if (tog) tog.style.transform = hide ? 'rotate(0deg)' : 'rotate(90deg)';
      };
      // 显示/隐藏自定义题型配置，自定义模式时隐藏"每次题数"
      content.querySelectorAll('input[name="sample-mode"]').forEach(r => {
        r.addEventListener('change', () => {
          const cfg = content.querySelector('#custom-type-config');
          const countGroup = content.querySelector('#review-count')?.closest('.form-group');
          if (!cfg) return;
          const isCustom = r.value === 'custom';
          cfg.style.display = isCustom ? 'block' : 'none';
          if (countGroup) countGroup.style.display = isCustom ? 'none' : '';
          // 默认加一行
          if (isCustom && content.querySelectorAll('.type-row').length === 0) window.addTypeRow && window.addTypeRow();
        });
      });
      // [restore block moved below]

      // 获取当前选题池里各题型数量
      function getPoolCounts() {
        const pool = (window.reviewSelected && window.reviewSelected.size) ? allQs.filter(q => window.reviewSelected.has(q.folderId)) : allQs;
        const types = ['单选题','多选题','判断题','填空题'];
        const counts = {};
        const typeMap = {'单选题':'单选','多选题':'多选','判断题':'判断','填空题':'填空'};
        types.forEach(t => counts[t] = pool.filter(q => q.type === t || q.type === typeMap[t]).length);
        return counts;
      }

      // 添加一行题型配置
      // 用 app 内置 bottom-sheet 弹窗替代系统 select
      function showTypeSheet(currentType, callback) {
        const counts = getPoolCounts();
        const types = ['单选题','多选题','判断题','填空题'];
        const ov = document.createElement('div');
        ov.className = 'modal-overlay';
        ov.innerHTML = `
          <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title" style="margin-bottom:12px">选择题型</div>
            ${types.map(t => `
              <div class="card-row" data-type="${t}" style="padding:14px 0;cursor:pointer;border-bottom:1px solid var(--border)">
                <div class="card-row-content">
                  <div class="card-row-title">${t}</div>
                  <div class="card-row-sub">共 ${counts[t]} 题</div>
                </div>
                ${t === currentType ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              </div>`).join('')}
          </div>`;
        ov.querySelectorAll('[data-type]').forEach(row => {
          row.onclick = () => { Utils.closeModal(ov); callback(row.dataset.type); };
        });
        ov.onclick = e => { if (e.target === ov) Utils.closeModal(ov); };
        document.body.appendChild(ov);
        requestAnimationFrame(() => ov.classList.add('active'));
      }

      window.addTypeRow = function(defaultType, defaultCount) {
        const counts = getPoolCounts();
        const initialType = defaultType || '单选题';
        const container = content.querySelector('#type-rows');
        const row = document.createElement('div');
        row.className = 'type-row';
        row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 0;background:transparent;border-radius:0';

        // 题型选择按钮（点击弹内置 sheet）
        const typeBtn = document.createElement('button');
        typeBtn.dataset.selectedType = initialType;
        typeBtn.style.cssText = 'flex:1;text-align:left;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:4px;min-width:0';
        typeBtn.innerHTML = `<span class="type-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${initialType}</span><span class="type-count" style="font-size:11px;color:var(--text3);flex-shrink:0">${counts[initialType]}题</span>`;
        typeBtn.onclick = () => {
          showTypeSheet(typeBtn.dataset.selectedType, chosen => {
            typeBtn.dataset.selectedType = chosen;
            typeBtn.querySelector('.type-label').textContent = chosen;
            typeBtn.querySelector('.type-count').textContent = counts[chosen] + '题';
          });
        };

        const minus = document.createElement('button');
        minus.textContent = '−';
        minus.style.cssText = 'width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:16px;cursor:pointer;color:var(--text);flex-shrink:0';
        const numInput = document.createElement('input');
        numInput.type = 'number'; numInput.value = defaultCount != null ? String(defaultCount) : '10'; numInput.min = '1';
        numInput.className = 'type-count-input';
        numInput.style.cssText = 'width:52px;text-align:center;border:1px solid var(--border);border-radius:8px;padding:4px;font-size:14px;background:var(--card);color:var(--text);flex-shrink:0';
        const plus = document.createElement('button');
        plus.textContent = '+';
        plus.style.cssText = 'width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:16px;cursor:pointer;color:var(--text);flex-shrink:0';
        const del = document.createElement('button');
        del.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        del.style.cssText = 'width:28px;height:28px;border-radius:8px;border:none;background:transparent;cursor:pointer;color:var(--danger);flex-shrink:0;display:flex;align-items:center;justify-content:center';

        minus.onclick = () => { numInput.value = Math.max(1, (parseInt(numInput.value)||1) - 1); };
        plus.onclick  = () => { numInput.value = (parseInt(numInput.value)||0) + 1; };
        del.onclick   = () => row.remove();

        row.appendChild(typeBtn); row.appendChild(minus); row.appendChild(numInput);
        row.appendChild(plus);    row.appendChild(del);
        container.appendChild(row);
      };

      window.startReview = async () => {
        let pool = window.reviewSelected.size
          ? allQs.filter(q => window.reviewSelected.has(q.folderId))
          : allQs;
        if (!pool.length) { Utils.toast('所选范围无题目'); return; }
        const modeEl = content.querySelector('input[name="sample-mode"]:checked');
        const sampleMode = modeEl ? modeEl.value : 'srs';
        await DB.setMeta('lastSampleMode', sampleMode);
        let questions;
        let customCfg = null; // 声明在外层，避免 restartParams 引用时报错
        if (sampleMode === 'custom') {
          const rows = content.querySelectorAll('.type-row');
          if (!rows.length) { Utils.toast('请先添加题型'); return; }
          let combined = [];
          customCfg = [];
          rows.forEach(row => {
            const type = row.querySelector('[data-selected-type]').dataset.selectedType;
            const n = Math.max(0, parseInt(row.querySelector('.type-count-input').value) || 0);
            customCfg.push({ type, n });
            if (n > 0) {
              const tKey = {'单选题':'单选','多选题':'多选','判断题':'判断','填空题':'填空'};
              const typePool = pool.filter(q => q.type === type || q.type === tKey[type]);
              const picked = [...typePool].sort(() => Math.random()-0.5).slice(0, Math.min(n, typePool.length));
              combined.push(...picked);
            }
          });
          await DB.setMeta('lastCustomTypes', JSON.stringify(customCfg));
          if (!combined.length) { Utils.toast('未能抽到题目，请检查数量设置'); return; }
          questions = combined;
        } else {
          const count = Math.min(parseInt(content.querySelector('#review-count').value)||20, pool.length);
          await DB.setMeta('lastReviewCount', count);
          questions = Utils.weightedSample(pool, count, sampleMode);
        }
        const hardMode = document.getElementById('hard-mode-toggle')?.dataset.on === '1';
        const folderIds = [...(window.reviewSelected || new Set())];
        const restartParams = {
          folderIds,
          sampleMode,
          count: sampleMode !== 'custom' ? (parseInt(content.querySelector('#review-count')?.value)||20) : null,
          customCfg: sampleMode === 'custom' ? customCfg : null,
          hardMode,
        };
        // 保存本次选择，下次恢复
        try {
          localStorage.setItem('quiz_review_prefs', JSON.stringify({
            folderIds: [...folderIds],
            sampleMode,
            count: restartParams.count,
            savedAt: Date.now()
          }));
        } catch(e) {}
        Nav.push('quiz', { questions, startIdx: 0, mode: 'review', hardMode, _restartParams: restartParams });
      };
      // 直接绑定按钮，避免任何全局竞态问题
      const startBtn = content.querySelector('#start-review-btn');
      if (startBtn) startBtn.onclick = window.startReview;

      // 恢复上次文件夹选择和抽题模式
      (async () => {
        try {
          const raw = localStorage.getItem('quiz_review_prefs');
          if (raw) {
            const prefs = JSON.parse(raw);
            // 7天内有效
            if (Date.now() - (prefs.savedAt || 0) < 7 * 86400000 && prefs.folderIds?.length) {
              // 先全不选，再按记录勾选
              window.reviewSelected.clear();
              document.querySelectorAll('[id^=fcb-]').forEach(cb => cb.classList.remove('checked'));
              prefs.folderIds.forEach(id => {
                if (folders.find(f => f.id === id)) {
                  window.reviewSelected.add(id);
                  const cb = document.getElementById(`fcb-${id}`);
                  if (cb) cb.classList.add('checked');
                }
              });
              // 恢复抽题模式
              if (prefs.sampleMode) {
                const radio = content.querySelector(`input[name="sample-mode"][value="${prefs.sampleMode}"]`);
                if (radio) { radio.checked = true; radio.dispatchEvent(new Event('change')); }
              }
              // 恢复题数
              if (prefs.count) {
                const countEl = content.querySelector('#review-count');
                if (countEl) countEl.value = prefs.count;
              }
            }
          }
        } catch(e) {}
      })();

      // 恢复上次自定义题型配置（必须在 addTypeRow/startReview 定义之后）
      (async () => {
        const lastMode = await DB.getMeta('lastSampleMode') || 'srs';
        if (lastMode === 'custom') {
          const cfg = content.querySelector('#custom-type-config');
          const countGroup = content.querySelector('#review-count')?.closest('.form-group');
          if (cfg) cfg.style.display = 'block';
          if (countGroup) countGroup.style.display = 'none';
          try {
            const saved = JSON.parse(await DB.getMeta('lastCustomTypes') || '[]');
            if (saved.length) {
              saved.forEach(({ type, n }) => window.addTypeRow(type, n));
            } else { window.addTypeRow(); }
          } catch(e) { window.addTypeRow(); }
        }
      })();
    }
    load();
    return el;
  },

                      </div>
                      ${hasKids ? `<button onclick="event.stopPropagation();window.toggleExamCollapse(${f.id})" id="etog-${f.id}" style="padding:4px;width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text3);display:flex;align-items:center;justify-content:center;transition:transform .2s;transform:rotate(0deg);margin-right:6px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>` : ''}
                      <div class="checkbox-wrap checked" id="efcb-${f.id}"></div>

                }

            </div>

          <div class="form-group">

          </div>
          <div class="form-group">
            <label class="form-label">抽题模式</label>
            <div style="display:flex;flex-direction:column;gap:10px">
              <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer">
                <input type="radio" name="exam-sample-mode" value="random" checked style="margin-top:2px;accent-color:var(--accent)">

                  <div style="font-size:14px;font-weight:500;color:var(--text)">随机抽题</div>
                  <div style="font-size:12px;color:var(--text3);margin-top:2px">按题目数量从当前范围随机抽取</div>
                </div>
              </label>
              <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer">

                  <div style="font-size:14px;font-weight:500;color:var(--text)">自定义抽题</div>

            typeBtn.querySelector('.type-label').textContent = chosen;
            typeBtn.querySelector('.type-count').textContent = counts[chosen] + '题';
          });
        };
        const minus = document.createElement('button');
        minus.textContent = '−';
        minus.style.cssText = 'width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:16px;cursor:pointer;color:var(--text);flex-shrink:0';
        const numInput = document.createElement('input');
        numInput.type = 'number';
        numInput.value = defaultCount != null ? String(defaultCount) : '10';
        numInput.min = '1';
        numInput.className = 'type-count-input';
        numInput.style.cssText = 'width:52px;text-align:center;border:1px solid var(--border);border-radius:8px;padding:4px;font-size:14px;background:var(--card);color:var(--text);flex-shrink:0';
        const plus = document.createElement('button');
        plus.textContent = '+';
        plus.style.cssText = 'width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:16px;cursor:pointer;color:var(--text);flex-shrink:0';
        const del = document.createElement('button');
        del.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        del.style.cssText = 'width:28px;height:28px;border-radius:8px;border:none;background:transparent;cursor:pointer;color:var(--danger);flex-shrink:0;display:flex;align-items:center;justify-content:center';
        minus.onclick = () => { numInput.value = Math.max(1, (parseInt(numInput.value)||1) - 1); };
        plus.onclick = () => { numInput.value = (parseInt(numInput.value)||0) + 1; };
        del.onclick = () => row.remove();
        row.appendChild(typeBtn);
        row.appendChild(minus);
        row.appendChild(numInput);
        row.appendChild(plus);
        row.appendChild(del);
        container.appendChild(row);
      };
      content.querySelector('#exam-add-type-btn')?.addEventListener('click', () => window.addExamTypeRow?.());
      window.startExam = async () => {
        let pool = window.examSelected.size ? allQs.filter(q => window.examSelected.has(q.folderId)) : allQs;
        if (!pool.length) { Utils.toast('所选范围无题目'); return; }
        const sampleMode = content.querySelector('input[name="exam-sample-mode"]:checked')?.value || 'random';
        const timeLimit = parseInt(content.querySelector('#exam-time').value)||0;
        await DB.setMeta('lastExamSampleMode', sampleMode);
        await DB.setMeta('lastExamTime', timeLimit);
        let count = null;
        let questions = [];
        let customCfg = null;
        if (sampleMode === 'custom') {
          const rows = content.querySelectorAll('#exam-type-rows .type-row');
          if (!rows.length) { Utils.toast('请先添加题型'); return; }
          const typeMap = {'单选题':'单选','多选题':'多选','判断题':'判断','填空题':'填空'};
          const combined = [];
          customCfg = [];
          rows.forEach(row => {
            const type = row.querySelector('[data-selected-type]')?.dataset.selectedType;
            const n = Math.max(0, parseInt(row.querySelector('.type-count-input')?.value) || 0);
            if (!type) return;
            customCfg.push({ type, n });
            if (n > 0) {
              const typePool = pool.filter(q => q.type === type || q.type === typeMap[type]);
              combined.push(...[...typePool].sort(() => Math.random()-0.5).slice(0, Math.min(n, typePool.length)));
            }
          });
          await DB.setMeta('lastExamCustomTypes', JSON.stringify(customCfg));
          if (!combined.length) { Utils.toast('未能抽到题目，请检查题型与数量设置'); return; }
          questions = combined;
        } else {
          count = Math.min(parseInt(content.querySelector('#exam-count').value)||20, pool.length);
          await DB.setMeta('lastExamCount', count);
          questions = pool.sort(() => Math.random()-0.5).slice(0, count);
        }
        // 保存记忆
        try { localStorage.setItem('quiz_exam_prefs', JSON.stringify({ folderIds: [...window.examSelected], count, time: timeLimit, sampleMode, customCfg, savedAt: Date.now() })); } catch(_) {}
        Nav.push('quiz', { questions, startIdx: 0, mode: 'exam', timeLimit });
      };
      (async () => {
        const lastMode = await DB.getMeta('lastExamSampleMode') || 'random';
        const radio = content.querySelector(`input[name="exam-sample-mode"][value="${lastMode}"]`);
        if (radio) {
          radio.checked = true;
          radio.dispatchEvent(new Event('change'));
        }
        if (lastMode === 'custom') {
          try {
            const saved = JSON.parse(await DB.getMeta('lastExamCustomTypes') || '[]');
            if (!content.querySelector('#exam-type-rows .type-row')) {
              if (saved.length) saved.forEach(({ type, n }) => window.addExamTypeRow(type, n));
              else window.addExamTypeRow();
            }
          } catch(e) {
            if (!content.querySelector('#exam-type-rows .type-row')) window.addExamTypeRow();
          }
        }
      })();
    }
    load();
    return el;
  },

  /* =====================================================
     SRS 分析页
     ===================================================== */
  renderSrsAnalysis(params) {
    const folderId = params?.folderId ?? null;
    const presetTitle = params?.folderName ? `${params.folderName} · SRS` : 'SRS 算法分析';
    const el = Pages.createPage(presetTitle);

    // ── Tab bar（固定在顶部，不随内容滚动）──────────────────────────
    const tabWrap = document.createElement('div');
    tabWrap.style.cssText = 'padding:10px 14px 0;background:var(--bg);flex-shrink:0;';
    tabWrap.innerHTML = `
      <div style="display:flex;background:var(--surface2);border-radius:12px;padding:3px;gap:2px" id="srs-tabbar">
        <button data-tab="struggling" style="flex:1;padding:9px 0;border-radius:9px;font-size:14px;font-weight:600;transition:all .2s;background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.1)">
          学习中 <span id="cnt-struggling" style="font-size:12px;font-weight:400"></span>
        </button>
        <button data-tab="mastered" style="flex:1;padding:9px 0;border-radius:9px;font-size:14px;font-weight:600;transition:all .2s;color:var(--text3);background:transparent">
          已掌握 <span id="cnt-mastered" style="font-size:12px;font-weight:400"></span>
        </button>
      </div>
      <div id="srs-indicator" style="display:flex;gap:4px;justify-content:center;margin-top:8px">
        <div style="width:20px;height:3px;border-radius:2px;background:var(--accent);transition:all .3s" id="dot-0"></div>
        <div style="width:8px;height:3px;border-radius:2px;background:var(--border);transition:all .3s" id="dot-1"></div>
      </div>`;
    el.appendChild(tabWrap);

    // ── Swipe container ────────────────────────────────────────────
    const swipeWrap = document.createElement('div');
    swipeWrap.style.cssText = 'flex:1;overflow:hidden;position:relative;';

    const track = document.createElement('div');
    track.style.cssText = 'display:flex;width:200%;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform;';

    const panel0 = document.createElement('div'); // 学习中
    panel0.style.cssText = 'width:50%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 30px;box-sizing:border-box;';
    const panel1 = document.createElement('div'); // 已掌握
    panel1.style.cssText = 'width:50%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 30px;box-sizing:border-box;';

    track.appendChild(panel0);
    track.appendChild(panel1);
    swipeWrap.appendChild(track);
    el.appendChild(swipeWrap);

    let curTab = 0; // 0=学习中, 1=已掌握

    function switchTab(idx, animate = true) {
      curTab = idx;
      if (!animate) track.style.transition = 'none';
      track.style.transform = `translateX(${idx === 0 ? '0' : '-50%'})`;
      if (!animate) requestAnimationFrame(() => { track.style.transition = 'transform .28s cubic-bezier(.4,0,.2,1)'; });

      // Tab bar 样式
      tabWrap.querySelectorAll('[data-tab]').forEach((btn, i) => {
        const active = i === idx;
        btn.style.background = active ? 'var(--card)' : 'transparent';
        btn.style.boxShadow = active ? '0 1px 4px rgba(0,0,0,.1)' : 'none';
        btn.style.color = active ? (idx === 0 ? 'var(--accent)' : 'var(--success)') : 'var(--text3)';
      });

      // 指示点
      document.getElementById('dot-0').style.cssText = `width:${curTab===0?'20px':'8px'};height:3px;border-radius:2px;background:${curTab===0?'var(--accent)':'var(--border)'};transition:all .3s`;
      document.getElementById('dot-1').style.cssText = `width:${curTab===1?'20px':'8px'};height:3px;border-radius:2px;background:${curTab===1?'var(--success)':'var(--border)'};transition:all .3s`;
    }

    // Tab 点击
    tabWrap.querySelectorAll('[data-tab]').forEach((btn, i) => {
      btn.onclick = () => switchTab(i);
    });

    // Touch swipe
    let tx0 = 0, ty0 = 0, swiping = false;
    swipeWrap.addEventListener('touchstart', e => {
      tx0 = e.touches[0].clientX;
      ty0 = e.touches[0].clientY;
      swiping = false;
    }, { passive: true });
    swipeWrap.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - tx0;
      const dy = e.touches[0].clientY - ty0;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
        swiping = true;
      }
      // 只在确认横向滑动且事件可取消时才阻止默认行为
      if (swiping && e.cancelable) e.preventDefault();
    }, { passive: false });
    swipeWrap.addEventListener('touchend', e => {
      if (!swiping) return;
      const dx = e.changedTouches[0].clientX - tx0;
      if (dx < -40 && curTab === 0) switchTab(1);
      else if (dx > 40 && curTab === 1) switchTab(0);
    });

    const qMap = {};
    function card(q) {
      qMap[q.id] = q;
      const ivlMin = q.srsInterval || 0;
      const ivlStr = ivlMin < 60 ? `${ivlMin}分钟`
        : ivlMin < 1440 ? `${(ivlMin/60).toFixed(1)}小时`
        : `${(ivlMin/1440).toFixed(1)}天`;
      const ef = (q.srsEase||2.5).toFixed(2);
      const efColor = (q.srsEase||2.5) < 2.0 ? 'tag-danger' : (q.srsEase||2.5) < 2.4 ? 'tag-warn' : 'tag-success';
      return `<div class="q-card" data-qid="${q.id}" style="margin-bottom:8px;cursor:pointer">
        <div class="q-card-text" style="font-size:13px;margin-bottom:6px">${Utils.esc(q.question.slice(0,80))}${q.question.length>80?'…':''}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="tag tag-neutral" style="font-size:10px">Lv.${q.srsLevel||0}</span>
          <span class="tag tag-neutral" style="font-size:10px">间隔 ${ivlStr}</span>
          <span class="tag ${efColor}" style="font-size:10px">难度 ${ef}</span>
          ${(q.rightCount||0)>0?`<span class="tag tag-success" style="font-size:10px">✓ ${q.rightCount}</span>`:''}
          ${(q.wrongCount||0)>0?`<span class="tag tag-danger" style="font-size:10px">✗ ${q.wrongCount}</span>`:''}
        </div>
      </div>`;
    }

    async function load() {
      const allQs = await DB.getAllQuestions();
      const folders = await DB.getFolders();
      const folder = folderId ? folders.find(f => f.id === folderId) : null;
      const qs = folderId ? allQs.filter(q => q.folderId === folderId) : allQs;
      const titleEl = el.querySelector('.appbar-title');
      if (titleEl) titleEl.textContent = folder ? `${folder.name} · SRS` : presetTitle;
      const buckets = Pages._calcSrsBuckets(qs);
      const mastered = buckets.masteredList
        .sort((a,b) => (b.rightCount||0) - (a.rightCount||0));
      const struggling = buckets.learningList
        .sort((a,b) => (a.srsEase||2.5) - (b.srsEase||2.5));

      document.getElementById('cnt-struggling').textContent = `(${struggling.length})`;
      document.getElementById('cnt-mastered').textContent = `(${mastered.length})`;

      // 渐进加载：先显示前50条，滚动到底部时继续加载
      function renderPanelWithInfiniteLoad(panel, items, emptyMsg) {
        if (!items.length) {
          panel.innerHTML = `<div class="empty-state"><div class="empty-sub">${emptyMsg}</div></div>`;
          return;
        }
        let shown = Math.min(50, items.length);
        function renderMore() {
          const hasMore = shown < items.length;
          panel.innerHTML = items.slice(0, shown).map(card).join('') +
            (hasMore ? `<div id="srs-load-more" style="padding:14px;text-align:center;color:var(--accent);font-size:13px;cursor:pointer;border-top:1px solid var(--border)">加载更多（已显示 ${shown}/${items.length}）</div>` : `<div style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">共 ${items.length} 道</div>`);
          if (hasMore) {
            const sentinel = panel.querySelector('#srs-load-more');
            if (sentinel) sentinel.onclick = () => { shown = Math.min(shown + 50, items.length); renderMore(); };
          }
        }
        // 滚动到底部自动加载
        panel.onscroll = () => {
          if (panel.scrollTop + panel.clientHeight >= panel.scrollHeight - 60 && shown < items.length) {
            shown = Math.min(shown + 50, items.length);
            renderMore();
          }
        };
        renderMore();
      }

      renderPanelWithInfiniteLoad(panel0, struggling, '暂无学习中的题目 🎉');
      renderPanelWithInfiniteLoad(panel1, mastered, '还没有已掌握的题目，加油！');

      switchTab(0, false);
    }
    load();

    // 点击题目卡片显示详情
    [panel0, panel1].forEach(panel => {
      panel.addEventListener('click', e => {
        const card = e.target.closest('[data-qid]');
        if (!card) return;
        const q = qMap[+card.dataset.qid];
        if (q) Actions._showQDetail(q, async (updated) => {
          Object.assign(q, updated);
          await DB.saveQuestion(updated);
          load();
        });
      });
    });

    return el;
  },
